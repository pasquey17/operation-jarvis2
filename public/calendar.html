<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>CALENDAR · JARVIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* ── Page shell (match analytics / journal HUD) ── */
      html,
      body {
        overflow: auto !important;
        height: auto !important;
        min-height: 100dvh !important;
        background: #050a14 !important;
      }

      /* ═══════════════════ NAV BAR (inlined) ═══════════════════ */
      .jv-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 0;
      }
      .jv-nav__brand {
        color: #00d4ff !important;
        font-family: "Share Tech Mono", "Courier New", monospace !important;
        font-size: 15px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
        text-decoration: none;
      }
      .jv-nav__links {
        display: flex;
        align-items: center;
        gap: 32px;
        list-style: none;
        margin: 0 auto;
        padding: 0;
      }
      .jv-nav__links a {
        color: rgba(255, 255, 255, 0.5) !important;
        text-decoration: none;
        font-family: "Share Tech Mono", "Courier New", monospace !important;
        font-size: 11px;
        font-variant: small-caps;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__links a:hover {
        color: rgba(255, 255, 255, 0.85) !important;
      }
      .jv-nav__links a.jv-nav--active,
      .jv-nav__links a[aria-current="page"] {
        color: #00d4ff !important;
        border-bottom: 1px solid #00d4ff;
      }
      .jv-nav__user {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.06em;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .jv-nav__logout {
        margin-left: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.25);
        background: rgba(0, 212, 255, 0.06);
        color: rgba(0, 212, 255, 0.85) !important;
        font-family: "Share Tech Mono", "Courier New", monospace !important;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .jv-nav__logout:hover {
        background: rgba(0, 212, 255, 0.14);
        border-color: rgba(0, 212, 255, 0.55);
      }
      .jv-nav__hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .jv-nav__hamburger span {
        display: block;
        width: 20px;
        height: 1.5px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 2px;
        transition: background 0.2s;
      }
      .jv-nav__hamburger:hover span {
        background: #00d4ff;
      }
      .jv-nav__dropdown {
        display: none;
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        z-index: 999;
        flex-direction: column;
        padding: 8px 0;
      }
      .jv-nav__dropdown.jv-nav--open {
        display: flex;
      }
      .jv-nav__dropdown a {
        color: rgba(255, 255, 255, 0.5) !important;
        text-decoration: none;
        font-family: "Share Tech Mono", "Courier New", monospace !important;
        font-size: 12px;
        font-variant: small-caps;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 12px 24px;
        border-left: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__dropdown a:hover {
        color: rgba(255, 255, 255, 0.85) !important;
      }
      .jv-nav__dropdown a.jv-nav--active,
      .jv-nav__dropdown a[aria-current="page"] {
        color: #00d4ff !important;
        border-left-color: #00d4ff;
      }
      @media (max-width: 768px) {
        .jv-nav__links,
        .jv-nav__user {
          display: none;
        }
        .jv-nav__hamburger {
          display: flex;
        }
        .jv-nav__brand {
          font-size: 13px;
        }
      }

      /* ═══════════════════ CALENDAR PAGE ═══════════════════ */
      .cal-viewport {
        position: relative;
        z-index: 1;
        padding: 76px 0 80px;
      }
      .cal-shell {
        width: min(1320px, calc(100vw - 40px));
        margin: 0 auto;
      }
      @media (max-width: 768px) {
        .cal-shell {
          width: min(1280px, calc(100vw - 24px));
        }
      }

      .cal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
        padding-top: 12px;
      }
      .cal-header__left {
        flex: 1;
        min-width: 0;
      }
      .cal-header__right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
        flex-shrink: 0;
      }
      .cal-title {
        margin: 0 0 6px;
        font-family: "Outfit", system-ui, sans-serif;
        font-weight: 200;
        font-size: clamp(2rem, 5vw, 52px);
        color: #ffffff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-shadow: 0 0 60px rgba(255, 255, 255, 0.12), 0 0 120px rgba(0, 212, 255, 0.08);
      }
      .cal-subtitle {
        margin: 0;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .cal-live-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.2);
        background: rgba(0, 212, 255, 0.06);
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(0, 212, 255, 0.85);
        white-space: nowrap;
      }
      .cal-live-badge__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(0, 212, 255, 0.9);
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        animation: calPulse 1.7s ease-in-out infinite;
      }

      .cal-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }
      @keyframes calPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.65;
        }
        50% {
          transform: scale(1.18);
          opacity: 1;
        }
      }

      .cal-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.55);
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          transform 0.25s var(--ease-out),
          border-color 0.25s var(--ease-out),
          background 0.25s var(--ease-out),
          color 0.25s var(--ease-out);
        user-select: none;
      }
      .cal-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 212, 255, 0.35);
        background: rgba(0, 212, 255, 0.06);
        color: rgba(255, 255, 255, 0.82);
      }
      .cal-btn:active {
        transform: translateY(0);
      }
      .cal-btn.cal-btn--active {
        border-color: rgba(0, 212, 255, 0.5);
        background: rgba(0, 212, 255, 0.1);
        color: #00d4ff;
      }
      .cal-btn.cal-btn--icon {
        width: 42px;
        padding: 10px 0;
        border-radius: 12px;
      }

      .cal-board {
        position: relative;
        border-radius: 20px;
        border: 1px solid rgba(0, 212, 255, 0.13);
        background: rgba(4, 9, 18, 0.88);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 60px rgba(0, 0, 0, 0.5);
        transition: border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        min-height: min(52vh, 560px);
        display: flex;
        flex-direction: column;
      }
      .cal-board .cal-grid {
        flex: 1;
        min-height: 240px;
      }
      .cal-board:hover {
        border-color: rgba(0, 212, 255, 0.26);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 24px 72px rgba(0, 0, 0, 0.55),
          0 0 36px rgba(0, 191, 255, 0.05);
      }
      .cal-board__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid rgba(0, 212, 255, 0.08);
      }
      .cal-range {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
      }
      .cal-nav {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1px;
        background: rgba(0, 212, 255, 0.1);
      }
      .cal-colhead {
        padding: 12px 12px 10px;
        background: rgba(2, 6, 12, 0.92);
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(0, 212, 255, 0.85);
      }
      .cal-cell {
        min-height: 188px;
        padding: 12px 12px 14px;
        background: rgba(2, 6, 12, 0.94);
        cursor: pointer;
        transition:
          background 0.25s var(--ease-out),
          transform 0.25s var(--ease-out),
          box-shadow 0.25s var(--ease-out);
        position: relative;
        overflow: hidden;
      }
      .cal-cell:hover {
        background: rgba(0, 212, 255, 0.06);
        transform: translateY(-1px);
      }
      .cal-cell.cal-cell--muted {
        background: rgba(2, 6, 12, 0.72);
        opacity: 0.78;
      }
      .cal-cell.cal-cell--selected {
        outline: 1px solid rgba(0, 212, 255, 0.55);
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.12) inset,
          0 0 24px rgba(0, 191, 255, 0.14);
      }
      .cal-cell.cal-cell--today {
        border: 1px solid rgba(0, 212, 255, 0.55);
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.14) inset,
          0 0 28px rgba(0, 212, 255, 0.16);
      }
      .cal-cell.cal-cell--today .cal-date__num {
        color: #00d4ff;
      }
      .cal-cell.cal-cell--has-trades {
        background: rgba(2, 6, 12, 0.94);
      }
      .cal-cell.cal-cell--has-trades:not(.cal-cell--muted) {
        box-shadow: inset 3px 0 0 rgba(0, 212, 255, 0.35);
      }

      /* Pill badges for WIN/LOSS count */
      .cal-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 8px;
      }
      .cal-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 7px;
        border-radius: 999px;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .cal-chip--win {
        background: rgba(0, 255, 136, 0.1);
        border-color: rgba(0, 255, 136, 0.3);
        color: rgba(0, 255, 136, 0.9);
      }
      .cal-chip--loss {
        background: rgba(255, 68, 102, 0.1);
        border-color: rgba(255, 68, 102, 0.3);
        color: rgba(255, 68, 102, 0.9);
      }
      .cal-chip--be {
        background: rgba(192, 192, 192, 0.07);
        border-color: rgba(192, 192, 192, 0.2);
        color: rgba(192, 192, 192, 0.75);
      }
      .cal-chip--netr {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.45);
        margin-left: auto;
      }
      .cal-chip--netr.positive { color: rgba(0, 255, 136, 0.75); border-color: rgba(0, 255, 136, 0.2); }
      .cal-chip--netr.negative { color: rgba(255, 68, 102, 0.75); border-color: rgba(255, 68, 102, 0.2); }
      .cal-date {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }
      .cal-date__num {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: clamp(14px, 1.35vw, 17px);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
      }
      .cal-date__when {
        margin-top: 6px;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(0, 212, 255, 0.55);
        line-height: 1.35;
      }
      .cal-date__meta {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        white-space: nowrap;
      }

      .cal-dots {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      .dot--win {
        background: #00ff88;
        box-shadow: 0 0 12px rgba(0, 255, 136, 0.35);
      }
      .dot--loss {
        background: #ff5050;
        box-shadow: 0 0 12px rgba(255, 80, 80, 0.35);
      }
      .dot--be {
        background: rgba(192, 192, 192, 0.9);
        box-shadow: 0 0 12px rgba(192, 192, 192, 0.25);
      }
      .dot--unk {
        background: rgba(255, 255, 255, 0.35);
      }

      .cal-panel {
        margin-top: 18px;
        position: relative;
        border-radius: 20px;
        border: 1px solid rgba(0, 212, 255, 0.13);
        background: rgba(4, 9, 18, 0.88);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 60px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .cal-panel.cal-panel--visible {
        opacity: 1;
        transform: translateY(0);
      }
      .cal-panel.cal-panel--visible:hover {
        border-color: rgba(0, 212, 255, 0.24);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 24px 72px rgba(0, 0, 0, 0.55),
          0 0 36px rgba(0, 191, 255, 0.05);
      }
      .cal-panel.cal-panel--day-loaded {
        border-color: rgba(0, 212, 255, 0.22);
      }
      .cal-panel__top {
        padding: 14px 14px 12px;
        border-bottom: 1px solid rgba(0, 212, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .cal-panel__title {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(0, 212, 255, 0.85);
      }
      .cal-panel__hint {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        white-space: nowrap;
      }
      .cal-list {
        padding: 12px 12px 14px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .cal-trade {
        border-radius: 14px;
        border: 1px solid rgba(0, 212, 255, 0.1);
        background: rgba(4, 9, 18, 0.55);
        padding: 12px 12px;
        transition:
          transform 0.25s var(--ease-out),
          border-color 0.25s var(--ease-out),
          background 0.25s var(--ease-out);
        overflow: hidden;
      }
      .cal-trade:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 212, 255, 0.22);
        background: rgba(0, 212, 255, 0.05);
      }
      .cal-trade__row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .cal-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.12);
        background: rgba(4, 9, 18, 0.65);
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        white-space: nowrap;
      }
      .cal-badge__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }
      .cal-badge--win {
        border-color: rgba(0, 255, 136, 0.35);
        color: rgba(0, 255, 136, 0.95);
      }
      .cal-badge--win .cal-badge__dot {
        background: #00ff88;
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.35);
      }
      .cal-badge--loss {
        border-color: rgba(255, 80, 80, 0.35);
        color: rgba(255, 80, 80, 0.92);
      }
      .cal-badge--loss .cal-badge__dot {
        background: #ff5050;
        box-shadow: 0 0 10px rgba(255, 80, 80, 0.35);
      }
      .cal-badge--be {
        border-color: rgba(192, 192, 192, 0.22);
        color: rgba(192, 192, 192, 0.92);
      }
      .cal-badge--be .cal-badge__dot {
        background: rgba(192, 192, 192, 0.95);
        box-shadow: 0 0 10px rgba(192, 192, 192, 0.22);
      }
      .cal-kv {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .cal-k {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
      }
      .cal-v {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.06em;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cal-trade[data-trade-index] {
        cursor: pointer;
      }
      .cal-trade[data-trade-index]:focus-visible {
        outline: 2px solid rgba(0, 212, 255, 0.55);
        outline-offset: 3px;
      }

      /* ── Trade detail modal + charts (match journal.html) ── */
      .jn-expand-inner {
        padding: 18px 20px 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background: rgba(4, 9, 18, 0.45);
      }
      .jn-trade-modal .jn-expand-inner {
        background: transparent;
      }
      .jn-detail {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .jn-detail__label {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #00d4ff;
      }
      .jn-detail__value {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.5;
      }
      .jn-detail__notes {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
      }
      .jn-trade-photos {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 18px;
        margin-top: 4px;
        align-items: flex-start;
      }
      .jn-photo-item {
        display: flex;
        flex-direction: column;

    <script>
      (function () {
        "use strict";

        var DEFAULT_USER_ID = "aidenpasque11@gmail.com";
        var currentUserId = DEFAULT_USER_ID;
        var TZ = "Australia/Adelaide";
        var viewMode = "week"; // week | month
        var anchorDate = new Date(); // used for current view range
        var selectedKey = ""; // YYYY-MM-DD

        var trades = [];
        var byDay = Object.create(null);
        /** Trade shown in modal — used by Ask Jarvis when opened from calendar */
        var calendarModalTradeForAsk = null;

        function ensureUserId() {
          return new Promise(function (resolve) {
            var ju = (localStorage.getItem("jarvis_user") || "").trim();
            var uid = (localStorage.getItem("user_id") || "").trim();
            if (ju) {
              currentUserId = ju;
              if (uid !== ju) {
                try {
                  localStorage.setItem("user_id", ju);
                } catch (e) {}
              }
            } else if (uid) {
              currentUserId = uid;
            } else {
              currentUserId = DEFAULT_USER_ID;
              try {
                localStorage.setItem("user_id", DEFAULT_USER_ID);
                localStorage.setItem("jarvis_user", DEFAULT_USER_ID);
              } catch (e) {}
            }
            var navUser = document.getElementById("jv-nav-user");
            if (navUser) navUser.textContent = currentUserId;
            resolve(currentUserId);
          });
        }

        function getField(obj) {
          for (var i = 1; i < arguments.length; i++) {
            var v = obj[arguments[i]];
            if (v !== undefined && v !== null && v !== "") return v;
          }
          return "";
        }

        function normalizeOutcome(raw) {
          var v = String(raw || "").trim().toLowerCase();
          if (v === "win" || v === "w") return "win";
          if (v === "loss" || v === "l") return "loss";
          if (v === "be" || v === "breakeven" || v === "break even" || v === "break-even") return "be";
          return v || "unk";
        }

        function tradeDate(t) {
          return new Date(getField(t, "date", "traded_at", "Date") || "");
        }

        function partsYMD(d) {
          try {
            var f = new Intl.DateTimeFormat("en-CA", {
              timeZone: TZ,
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            });
            var p = f.formatToParts(d).reduce(function (acc, it) {
              acc[it.type] = it.value;
              return acc;
            }, {});
            return { y: p.year, m: p.month, d: p.day };
          } catch (e) {
            // fallback: local
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, "0");
            var dd = String(d.getDate()).padStart(2, "0");
            return { y: String(y), m: m, d: dd };
          }
        }

        function dayKey(d) {
          var p = partsYMD(d);
          return p.y + "-" + p.m + "-" + p.d;
        }

        function formatRangeLabelWeek(start, end) {
          try {
            var fmt = new Intl.DateTimeFormat("en-AU", { timeZone: TZ, day: "2-digit", month: "short", year: "numeric" });
            return fmt.format(start) + " → " + fmt.format(end);
          } catch (e) {
            return start.toDateString() + " → " + end.toDateString();
          }
        }

        function formatRangeLabelMonth(d) {
          try {
            return new Intl.DateTimeFormat("en-AU", { timeZone: TZ, month: "long", year: "numeric" }).format(d);
          } catch (e) {
            return d.toLocaleString("en-AU", { month: "long", year: "numeric" });
          }
        }

        function toUtcLikeMidnight(key) {
          // key is YYYY-MM-DD
          return new Date(key + "T00:00:00.000Z");
        }

        function mondayOfWeek(d) {
          // Use TZ-aware YMD then convert to UTC-like midnight and compute weekday
          var p = partsYMD(d);
          var x = new Date(p.y + "-" + p.m + "-" + p.d + "T00:00:00.000Z");
          var day = x.getUTCDay(); // 0 Sun..6 Sat
          var daysToMon = day === 0 ? 6 : day - 1;
          var mon = new Date(x);
          mon.setUTCDate(x.getUTCDate() - daysToMon);
          mon.setUTCHours(0, 0, 0, 0);
          return mon;
        }

        function addDaysUTC(d, n) {
          var x = new Date(d);
          x.setUTCDate(x.getUTCDate() + n);
          return x;
        }

        function normalizeTradesApiBody(data) {
          if (!data || typeof data !== "object") return { records: [] };
          var inner = data.payload && typeof data.payload === "object" ? data.payload : data;
          var tradesArr = Array.isArray(inner.trades) ? inner.trades : null;
          var recsArr = Array.isArray(inner.records) ? inner.records : null;
          return { records: tradesArr || recsArr || [] };
        }

        async function fetchAllTrades() {
          var userId = currentUserId || DEFAULT_USER_ID;
          var reqs = [
            fetch("/api/trades?user_id=eq." + encodeURIComponent(userId), { cache: "no-store" }).then(function (r) {
              return r.json();
            }),
            fetch("/api/journal-trades?user_id=eq." + encodeURIComponent(userId), { cache: "no-store" }).then(function (r) {
              return r.json();
            }),
          ];
          var res = await Promise.allSettled(reqs);
          var merged = [];
          if (res[0].status === "fulfilled") merged = merged.concat(normalizeTradesApiBody(res[0].value).records);
          if (res[1].status === "fulfilled" && Array.isArray(res[1].value)) merged = merged.concat(res[1].value);
          merged = merged.filter(function (t) {
            return !isNaN(tradeDate(t));
          });
          merged.sort(function (a, b) {
            return tradeDate(b) - tradeDate(a);
          });
          return merged;
        }

        function buildIndex(trs) {
          byDay = Object.create(null);
          trs.forEach(function (t) {
            var k = dayKey(tradeDate(t));
            if (!byDay[k]) byDay[k] = [];
            byDay[k].push(t);
          });
          Object.keys(byDay).forEach(function (k) {
            byDay[k].sort(function (a, b) {
              return tradeDate(a) - tradeDate(b);
            });
          });
        }

        function weekdayHeads() {
          return ["Mon", "Tue", "Wed", "Thu", "Fri"];
        }

        function setViewButtons() {
          var w = document.getElementById("view-week");
          var m = document.getElementById("view-month");
          if (w) w.classList.toggle("cal-btn--active", viewMode === "week");
          if (m) m.classList.toggle("cal-btn--active", viewMode === "month");
        }

        function renderGrid() {
          setViewButtons();
          var grid = document.getElementById("cal-grid");
          if (!grid) return;
          grid.innerHTML = "";

          // Column headers
          var heads = weekdayHeads();
          heads.forEach(function (h) {
            var el = document.createElement("div");
            el.className = "cal-colhead";
            el.textContent = h;
            grid.appendChild(el);
          });

          if (viewMode === "week") renderWeek(grid);
          else renderMonth(grid);
        }

        function renderWeek(grid) {
          var mon = mondayOfWeek(anchorDate);
          var fri = addDaysUTC(mon, 4);

          var rangeEl = document.getElementById("cal-range");
          if (rangeEl) rangeEl.textContent = formatRangeLabelWeek(mon, fri);

          for (var i = 0; i < 5; i++) {
            var d = addDaysUTC(mon, i);
            grid.appendChild(buildCell(d, false));
          }
        }

        function firstOfMonth(d) {
          var p = partsYMD(d);
          return new Date(p.y + "-" + p.m + "-01T00:00:00.000Z");
        }

        function renderMonth(grid) {
          var first = firstOfMonth(anchorDate);
          var p = partsYMD(anchorDate);
          var monthLabel = document.getElementById("cal-range");
          if (monthLabel) monthLabel.textContent = formatRangeLabelMonth(new Date(p.y + "-" + p.m + "-01T00:00:00.000Z"));

          // Find the Monday on or before the first day of month (based on UTC-like midnight of TZ date)
          var mon = mondayOfWeek(first);

          // Build 6 weeks max, weekdays only (Mon–Fri)
          var startKey = p.y + "-" + p.m + "-01";
          var monthNum = Number(p.m);
          var cursor = new Date(mon);
          for (var week = 0; week < 6; week++) {
            for (var col = 0; col < 5; col++) {
              var cellDate = addDaysUTC(cursor, week * 7 + col);
              var cellParts = partsYMD(cellDate);
              var cellMonth = Number(cellParts.m);
              var muted = cellMonth !== monthNum;
              grid.appendChild(buildCell(cellDate, muted));
            }
          }
        }

        var todayKey = (function () {
          try { return dayKey(new Date()); } catch (e) { return ""; }
        })();

        function firstTradeDayHint(list) {
          if (!list || !list.length) return "";
          var t = list[0];
          var d = tradeDate(t);
          if (isNaN(d)) return "";
          var sess = getField(t, "session", "Session", "SESSION");
          var timeStr = "";
          try {
            timeStr = d.toLocaleTimeString("en-AU", {
              timeZone: TZ,
              hour: "2-digit",
              minute: "2-digit",
              hour12: true,
            });
          } catch (e) {
            try {
              timeStr = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            } catch (e2) {
              timeStr = "";
            }
          }
          if (sess && timeStr) return String(sess).toUpperCase() + " · " + timeStr;
          if (timeStr) return timeStr;
          if (sess) return String(sess).toUpperCase();
          return "";
        }

        function buildCell(dUtcLike, muted) {
          var p = partsYMD(dUtcLike);
          var key = p.y + "-" + p.m + "-" + p.d;
          var list = byDay[key] || [];
          var isToday = key === todayKey;
          var hasTrades = list.length > 0;

          var cls = "cal-cell";
          if (muted) cls += " cal-cell--muted";
          if (key === selectedKey) cls += " cal-cell--selected";
          if (isToday) cls += " cal-cell--today";
          if (hasTrades && !muted) cls += " cal-cell--has-trades";

          var el = document.createElement("div");
          el.className = cls;
          el.dataset.key = key;

          var top = document.createElement("div");
          top.className = "cal-date";
          var left = document.createElement("div");
          left.className = "cal-date__num";
          left.textContent = p.d;
          var right = document.createElement("div");
          right.className = "cal-date__meta";
          right.textContent = isToday ? "TODAY" : (list.length ? list.length + " trades" : "—");
          top.appendChild(left);
          top.appendChild(right);
          el.appendChild(top);

          if (hasTrades) {
            var dayHint = firstTradeDayHint(list);
            if (dayHint) {
              var whenEl = document.createElement("div");
              whenEl.className = "cal-date__when";
              whenEl.textContent = dayHint;
              el.appendChild(whenEl);
            }
            var wins = 0, losses = 0, bes = 0, netR = 0;
            list.forEach(function (t) {
              var o = normalizeOutcome(getField(t, "outcome", "Outcome", "OUTCOME"));
              if (o === "win") wins++;
              else if (o === "loss") losses++;
              else if (o === "be") bes++;
              var rr = parseFloat(getField(t, "rr", "RR"));
              if (!isNaN(rr)) {
                if (o === "win") netR += rr;
                else if (o === "loss") netR -= Math.abs(rr);
              }
            });

            var pills = document.createElement("div");
            pills.className = "cal-pills";

            if (wins > 0) {
              var wc = document.createElement("span");
              wc.className = "cal-chip cal-chip--win";
              wc.textContent = "W " + wins;
              pills.appendChild(wc);
            }
            if (losses > 0) {
              var lc = document.createElement("span");
              lc.className = "cal-chip cal-chip--loss";
              lc.textContent = "L " + losses;
              pills.appendChild(lc);
            }
            if (bes > 0) {
              var bc = document.createElement("span");
              bc.className = "cal-chip cal-chip--be";
              bc.textContent = "BE " + bes;
              pills.appendChild(bc);
            }
            var netChip = document.createElement("span");
            var sign = netR > 0 ? "+" : "";
            netChip.className = "cal-chip cal-chip--netr" + (netR > 0 ? " positive" : netR < 0 ? " negative" : "");
            netChip.textContent = sign + netR.toFixed(1) + "R";
            pills.appendChild(netChip);

            el.appendChild(pills);
          }

          return el;
        }

        function setPanel(key) {
          selectedKey = key || "";
          renderGrid();

          var title = document.getElementById("panel-title");
          var hint = document.getElementById("panel-hint");
          var listEl = document.getElementById("panel-list");
          var panelEl = document.querySelector(".cal-panel");
          if (!title || !hint || !listEl) return;

          // Slide-in animation: reset then re-trigger
          if (panelEl) {
            panelEl.classList.remove("cal-panel--visible", "cal-panel--day-loaded");
            void panelEl.offsetWidth; // reflow
            panelEl.classList.add("cal-panel--visible");
          }

          if (!selectedKey) {
            title.textContent = "Select a day";
            hint.textContent = "—";
            listEl.innerHTML = "";
            return;
          }

          var d = toUtcLikeMidnight(selectedKey);
          try {
            title.textContent = new Intl.DateTimeFormat("en-AU", {
              timeZone: TZ,
              weekday: "long",
              year: "numeric",
              month: "long",
              day: "numeric",
            }).format(d);
          } catch (e) {
            title.textContent = selectedKey;
          }

          var dayTrades = byDay[selectedKey] || [];
          hint.textContent = dayTrades.length ? dayTrades.length + " trades" : "No trades logged";
          if (panelEl && dayTrades.length) panelEl.classList.add("cal-panel--day-loaded");

          if (!dayTrades.length) {
            listEl.innerHTML =
              '<div class="cal-trade" style="grid-column: 1 / -1; opacity: 0.72">' +
              '<div class="cal-trade__row">' +
              '<span class="cal-badge"><span class="cal-badge__dot" style="background:rgba(255,255,255,0.3)"></span>EMPTY</span>' +
              '<span class="cal-badge" style="opacity:0.8">NO TRADES</span>' +
              "</div>" +
              '<div class="cal-kv"><div class="cal-k">Tip</div><div class="cal-v">Use Journal → LOG TRADE</div></div>' +
              "</div>";
            return;
          }

          var frag = document.createDocumentFragment();
          dayTrades.forEach(function (t) {
            var o = normalizeOutcome(getField(t, "outcome", "Outcome", "OUTCOME"));
            var badgeCls = o === "win" ? "cal-badge--win" : o === "loss" ? "cal-badge--loss" : o === "be" ? "cal-badge--be" : "";
            var badgeText = o === "win" ? "WIN" : o === "loss" ? "LOSS" : o === "be" ? "BE" : "—";

            var pair = String(getField(t, "pair", "Pair", "PAIR", "instrument", "symbol") || "—").toUpperCase();
            var session = String(getField(t, "session", "Session", "SESSION") || "—");
            var model = String(getField(t, "model", "Model", "MODEL", "ENTRY MODEL") || "—");
            var account = String(getField(t, "account", "Account", "ACCOUNT") || "—");
            var rr = parseFloat(getField(t, "rr", "RR"));
            var rrStr = isNaN(rr) ? "—" : rr.toFixed(2) + "R";

            var card = document.createElement("div");
            card.className = "cal-trade";
            var ti = findTradeIndex(t);
            if (ti >= 0) {
              card.dataset.tradeIndex = String(ti);
              card.setAttribute("role", "button");
              card.setAttribute("tabindex", "0");
            }
            card.innerHTML =
              '<div class="cal-trade__row">' +
              '<span class="cal-badge ' +
              badgeCls +
              '"><span class="cal-badge__dot" aria-hidden="true"></span>' +
              badgeText +
              "</span>" +
              '<span class="cal-badge" style="opacity:0.9">' +
              pair +
              "</span>" +
              "</div>" +
              '<div class="cal-kv">' +
              '<div class="cal-k">Session</div><div class="cal-v">' +
              escapeHtml(session) +
              "</div>" +
              '<div class="cal-k">RR</div><div class="cal-v">' +
              escapeHtml(rrStr) +
              "</div>" +
              '<div class="cal-k">Model</div><div class="cal-v" title="' +
              escapeHtml(model) +
              '">' +
              escapeHtml(model) +
              "</div>" +
              '<div class="cal-k">Account</div><div class="cal-v" title="' +
              escapeHtml(account) +
              '">' +
              escapeHtml(account) +
              "</div>" +
              "</div>";

            frag.appendChild(card);
          });

          listEl.innerHTML = "";
          listEl.appendChild(frag);
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function escAttr(s) {
          return escapeHtml(s);
        }

        function normalizeDirection(raw) {
          var v = String(raw || "").trim().toLowerCase();
          if (v === "long" || v === "buy" || v === "bull") return "long";
          if (v === "short" || v === "sell" || v === "bear") return "short";
          return null;
        }

        function getTradeDirection(t) {
          var raw = getField(
            t,
            "direction",
            "Direction",
            "long_short",
            "side",
            "trade_direction",
            "POSITION TYPE",
            "Position Type",
            "position_type"
          );
          if (!raw) {
            var m = String(getField(t, "model", "Model", "MODEL", "ENTRY MODEL") || "").toLowerCase();
            if (m.includes("long")) raw = "long";
            else if (m.includes("short")) raw = "short";
          }
          return normalizeDirection(raw);
        }

        function formatDateShortCal(t) {
          var d = tradeDate(t);
          if (isNaN(d)) return "—";
          try {
            return d.toLocaleDateString("en-AU", {
              timeZone: TZ,
              day: "numeric",
              month: "short",
              year: "numeric",
            });
          } catch (e) {
            return d.toDateString();
          }
        }

        function formatDateFullCal(t) {
          var d = tradeDate(t);
          if (isNaN(d)) return "—";
          try {
            return d.toLocaleString("en-AU", {
              timeZone: TZ,
              weekday: "long",
              year: "numeric",
              month: "long",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
              hour12: true,
            });
          } catch (e2) {
            return d.toString();
          }
        }

        function tradeImageItems(trade) {
          if (!trade || typeof trade !== "object") return [];
          var v = trade.trade_images;
          if (v == null && trade.custom_data && typeof trade.custom_data === "object") {
            v = trade.custom_data.trade_images || trade.custom_data.photos || trade.custom_data.images;
          }
          if (v == null || v === "") return [];
          if (typeof v === "string") {
            try {
              v = JSON.parse(v);
            } catch (e) {
              return [];
            }
          }
          if (!Array.isArray(v)) return [];
          var out = [];
          for (var i = 0; i < v.length; i++) {
            var item = v[i];
            if (typeof item === "string") {
              var su = item.trim();
              if (/^https?:\/\//i.test(su)) out.push({ url: su, label: "" });
              continue;
            }
            if (item && typeof item === "object" && typeof item.url === "string") {
              var u = item.url.trim();
              if (!/^https?:\/\//i.test(u) && !/^data:/i.test(u)) continue;
              var lbl = typeof item.label === "string" ? item.label.trim() : "";
              out.push({ url: u, label: lbl });
            }
          }
          return out;
        }

        function normalizeCoverLabel(label) {
          return String(label || "")
            .replace(/\s*:\s*$/u, "")
            .trim()
            .toLowerCase()
            .replace(/\s+/g, " ");
        }

        function isTradePhotoCoverLabel(label) {
          var k = normalizeCoverLabel(label);
          if (!k) return false;
          if (k === "trade photo") return true;
          if (k.indexOf("trade photo") !== 0) return false;
          var rest = k.slice("trade photo".length);
          return rest === "" || /^[\s:\-–—]/.test(rest);
        }

        function tradeCardCoverItem(items) {
          if (!items || !items.length) return null;
          for (var i = 0; i < items.length; i++) {
            if (isTradePhotoCoverLabel(items[i].label)) return items[i];
          }
          return items[0];
        }

        function tradePhotosSectionHtml(trade) {
          var items = tradeImageItems(trade);
          if (!items.length) return "";
          var nid = escAttr(trade.notion_id || "");
          var thumbs = items
            .map(function (it, ix) {
              var cap = it.label ? it.label.replace(/\s*:+\s*$/, "").trim() : "";
              var lineLabel = cap || "Chart " + (ix + 1);
              var dataCap = cap;
              return (
                '<div class="jn-photo-item">' +
                '<span class="jn-photo-caption">' +
                escAttr(lineLabel) +
                "</span>" +
                '<button type="button" class="jn-photo-open" data-src="' +
                escAttr(it.url) +
                '" data-caption="' +
                escAttr(dataCap) +
                '" data-notion-id="' +
                nid +
                '" aria-label="Expand chart">' +
                '<img class="jn-photo-thumb" src="' +
                escAttr(it.url) +
                '" alt="' +
                escAttr(lineLabel) +
                '" data-notion-id="' +
                nid +
                '" data-img-idx="' +
                ix +
                '" loading="lazy" decoding="async" />' +
                "</button>" +
                "</div>"
              );
            })
            .join("");
          return (
            '<div class="jn-detail">' +
            '<span class="jn-detail__label">Charts</span>' +
            '<div class="jn-trade-photos">' +
            thumbs +
            "</div>" +
            "</div>"
          );
        }

        function tradeChartsSectionHtml(trade) {
          var photos = tradePhotosSectionHtml(trade);
          if (photos) return photos;
          var nu = getField(trade, "notion_url", "notionUrl", "NOTION_URL") || "";
          nu = String(nu).trim();
          if (nu && /^https?:\/\//i.test(nu)) {
            return (
              '<div class="jn-detail">' +
              '<span class="jn-detail__label">Charts</span>' +
              '<p class="jn-detail__value">' +
              '<a class="cal-notion-link" href="' +
              escAttr(nu) +
              '" target="_blank" rel="noopener noreferrer">Open in Notion for screenshots</a>' +
              "</p>" +
              "</div>"
            );
          }
          return "";
        }

        function tradeModalHeroHtml(trade) {
          var imgItems = tradeImageItems(trade);
          var coverItem = tradeCardCoverItem(imgItems);
          if (!coverItem || !coverItem.url) return "";
          var nid = escAttr(trade.notion_id || "");
          return (
            '<div class="jn-trade-modal__hero">' +
            '<img class="jn-trade-modal__hero-img" src="' +
            escAttr(coverItem.url) +
            '" alt="" data-notion-id="' +
            nid +
            '" data-img-idx="0" decoding="async" />' +
            "</div>"
          );
        }

        function tradeDetailPaneCalendarHtml(trade) {
          var pair = getField(trade, "pair", "Pair", "PAIR", "instrument", "symbol") || "";
          var session = getField(trade, "session", "Session", "SESSION") || "";
          var model = getField(trade, "model", "Model", "MODEL", "ENTRY MODEL") || "";
          var notes = getField(trade, "notes", "Notes", "NOTE", "TRADE SUMMARY") || "";
          var account = getField(trade, "account", "Account", "ACCOUNT") || "";
          var dateFull = formatDateFullCal(trade);
          var outcome = normalizeOutcome(getField(trade, "outcome", "Outcome", "OUTCOME"));
          var outcomeLabel =
            outcome === "win" ? "WIN" : outcome === "loss" ? "LOSS" : outcome === "be" ? "BE" : (outcome || "—").toUpperCase();
          var dir = getTradeDirection(trade);
          var dirLabel = dir ? dir.toUpperCase() : "—";
          var rrRaw = parseFloat(getField(trade, "rr", "RR"));
          var rrDisplay;
          if (!isNaN(rrRaw)) {
            rrDisplay = (rrRaw >= 0 ? "+" : "") + rrRaw.toFixed(2) + "R";
          } else if (outcome === "loss") {
            rrDisplay = "−1R";
          } else {
            rrDisplay = "—";
          }

          var parts = [];
          if (pair) {
            parts.push(
              '<div class="jn-detail"><span class="jn-detail__label">Pair</span><span class="jn-detail__value">' +
                escAttr(String(pair).toUpperCase()) +
                "</span></div>"
            );
          }
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">Direction</span><span class="jn-detail__value">' +
              escAttr(dirLabel) +
              "</span></div>"
          );
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">Outcome</span><span class="jn-detail__value">' +
              escAttr(outcomeLabel) +
              "</span></div>"
          );
          if (session) {
            parts.push(
              '<div class="jn-detail"><span class="jn-detail__label">Session</span><span class="jn-detail__value">' +
                escAttr(session) +
                "</span></div>"
            );
          }
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">R multiple</span><span class="jn-detail__value">' +
              escAttr(rrDisplay) +
              "</span></div>"
          );
          if (model) {
            parts.push(
              '<div class="jn-detail"><span class="jn-detail__label">Entry Model</span><span class="jn-detail__value">' +
                escAttr(model) +
                "</span></div>"
            );
          }
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">Date &amp; Time</span><span class="jn-detail__value">' +
              escAttr(dateFull) +
              "</span></div>"
          );
          if (account) {
            parts.push(
              '<div class="jn-detail"><span class="jn-detail__label">Account</span><span class="jn-detail__value">' +
                escAttr(account) +
                "</span></div>"
            );
          }
          if (notes) {
            parts.push(
              '<div class="jn-detail"><span class="jn-detail__label">Notes</span><p class="jn-detail__notes">' +
                escAttr(notes) +
                "</p></div>"
            );
          }
          parts.push(tradeChartsSectionHtml(trade));
          parts.push(
            '<button class="jn-ask-btn" type="button" data-cal-ask="1">Ask Jarvis about this trade</button>'
          );
          return '<div class="jn-expand-inner">' + parts.join("") + "</div>";
        }

        function openJnLightbox(src, caption) {
          var lb = document.getElementById("jn-lightbox");
          var imgEl = lb && lb.querySelector(".jn-lightbox__img");
          var capEl = document.getElementById("jn-lightbox-caption");
          if (!lb || !imgEl) return;
          imgEl.src = src || "";
          imgEl.alt = caption ? caption : "Chart";
          if (capEl) {
            var c = caption ? String(caption).trim() : "";
            if (c) {
              capEl.textContent = c;
              capEl.removeAttribute("hidden");
            } else {
              capEl.textContent = "";
              capEl.setAttribute("hidden", "");
            }
          }
          lb.removeAttribute("hidden");
          lb.setAttribute("aria-hidden", "false");
          try {
            document.body.style.overflow = "hidden";
          } catch (err) {}
          try {
            document.getElementById("jn-lightbox-close").focus();
          } catch (err2) {}
        }

        function closeJnLightbox() {
          var lb = document.getElementById("jn-lightbox");
          var imgEl = lb && lb.querySelector(".jn-lightbox__img");
          var modal = document.getElementById("jn-trade-modal");
          if (!lb) return;
          lb.setAttribute("hidden", "");
          lb.setAttribute("aria-hidden", "true");
          if (imgEl) imgEl.src = "";
          try {
            if (!modal || modal.hasAttribute("hidden")) {
              document.body.style.overflow = "";
            }
          } catch (e) {}
        }

        function closeCalendarTradeModal() {
          var modal = document.getElementById("jn-trade-modal");
          var lb = document.getElementById("jn-lightbox");
          if (!modal) return;
          modal.setAttribute("hidden", "");
          modal.setAttribute("aria-hidden", "true");
          calendarModalTradeForAsk = null;
          var scrollEl = document.getElementById("jn-trade-modal-scroll");
          if (scrollEl) scrollEl.innerHTML = "";
          try {
            if (!lb || lb.hasAttribute("hidden")) {
              document.body.style.overflow = "";
            }
          } catch (e2) {}
        }

        function openCalendarTradeModal(trade) {
          if (!trade) return;
          calendarModalTradeForAsk = trade;
          var modal = document.getElementById("jn-trade-modal");
          var scrollEl = document.getElementById("jn-trade-modal-scroll");
          var titleEl = document.getElementById("jn-trade-modal-title");
          var panel = document.getElementById("jn-trade-modal-panel");

          var outcome = normalizeOutcome(getField(trade, "outcome", "Outcome", "OUTCOME"));

          var dateShort = formatDateShortCal(trade);
          titleEl.textContent = pairRaw ? dateShort + " · " + String(pairRaw).toUpperCase() : dateShort;
          panel.setAttribute("data-outcome", outcome);

          try {
            document.getElementById("jn-trade-modal-close").focus();

        function buildAskJarvisPrompt(trade) {
          var pair = getField(trade, "pair", "Pair", "PAIR", "instrument", "symbol") || "—";
          var outcome = getField(trade, "outcome", "Outcome", "OUTCOME") || "—";
          var session = getField(trade, "session", "Session", "SESSION") || "—";
          var model = getField(trade, "model", "Model", "MODEL", "ENTRY MODEL") || "";
          var notes = getField(trade, "notes", "Notes", "NOTE", "TRADE SUMMARY") || "";
          var account = getField(trade, "account", "Account", "ACCOUNT") || "";
          var rrStr = (function () {
            var r = parseFloat(getField(trade, "rr", "RR"));
            return isNaN(r) ? "—" : r.toFixed(2) + "R";
          })();
          var dir = getTradeDirection(trade);
          var lines = [
            "I want your honest take on this single trade from my journal (focus on this setup only).",
            "Please give: (1) a brief rundown of the trade, (2) what was solid vs weak in the idea or execution, (3) one concrete lesson or tweak for next time. Be direct and supportive.",
            "",
            "--- TRADE ---",
            "Date/time: " + formatDateFullCal(trade),
            "Pair: " + pair,
            "Direction: " + (dir ? dir.toUpperCase() : "—"),
            "Outcome: " + outcome,
            "R multiple: " + rrStr,
            "Session: " + session,
          ];
          if (account) lines.push("Account: " + account);
          if (model) lines.push("Entry model: " + model);
          if (notes) lines.push("My notes: " + notes);
          return lines.join("\n");
        }

        function askJarvisAboutTrade(trade) {
          try {
            sessionStorage.setItem("jarvis_pending_message", buildAskJarvisPrompt(trade));
          } catch (e) {}
          window.location.href = "/index.html";
        }

        function findTradeIndex(t) {
          var i = trades.indexOf(t);
          if (i >= 0) return i;
          var nid = getField(t, "notion_id", "notionId");
          var jid = t && t.id != null ? String(t.id) : "";
          for (var j = 0; j < trades.length; j++) {
            var u = trades[j];
            if (nid && getField(u, "notion_id", "notionId") === nid) return j;
            if (jid && u && String(u.id) === jid) return j;
          }
          return -1;
        }

        var calendarImgRefreshBound = false;
        function bindCalendarImageRefreshOnce() {
          if (calendarImgRefreshBound) return;
          calendarImgRefreshBound = true;
          document.addEventListener(
            "error",
            function (e) {
              var img = e.target;
              if (img.tagName !== "IMG") return;
              var notionId = img.dataset.notionId;
              if (!notionId || img.dataset.imgRefreshed) return;
              document.querySelectorAll('img[data-notion-id="' + notionId + '"]').forEach(function (el) {
                el.dataset.imgRefreshed = "1";
              });
              var uid = currentUserId || DEFAULT_USER_ID;
              fetch(
                "/api/refresh-trade-image?notion_id=" +
                  encodeURIComponent(notionId) +
                  "&user_id=" +
                  encodeURIComponent(uid),
                { cache: "no-store" }
              )
                .then(function (r) {
                  return r.ok ? r.json() : Promise.reject(r.status);
                })
                .then(function (data) {
                  if (!Array.isArray(data.images) || !data.images.length) return;
                  document.querySelectorAll('img[data-notion-id="' + notionId + '"]').forEach(function (el) {
                    var idx = parseInt(el.dataset.imgIdx || "0", 10);
                    var row = data.images[idx] || data.images[0];
                    var freshUrl = row && row.url;
                    if (freshUrl) el.src = freshUrl;
                  });
                  document.querySelectorAll('[data-notion-id="' + notionId + '"][data-src]').forEach(function (btn, i) {
                    if (data.images[i]) btn.dataset.src = data.images[i].url;
                  });
                })
                .catch(function () {});
            },
            true
          );
        }

        function wireTradeDetailModal() {
          document.getElementById("jn-trade-modal-close").addEventListener("click", function () {
            closeCalendarTradeModal();
          });
          document.getElementById("jn-trade-modal-backdrop").addEventListener("click", function () {
            closeCalendarTradeModal();
          });
          document.getElementById("jn-lightbox-close").addEventListener("click", function () {
            closeJnLightbox();
          });
          document.getElementById("jn-lightbox-backdrop").addEventListener("click", function () {
            closeJnLightbox();
          });

          document.addEventListener("keydown", function (ev) {
            if (ev.key !== "Escape") return;
            var lb = document.getElementById("jn-lightbox");
            if (lb && !lb.hasAttribute("hidden")) {
              closeJnLightbox();
              return;
            }
            var modal = document.getElementById("jn-trade-modal");
            if (modal && !modal.hasAttribute("hidden")) {
              closeCalendarTradeModal();
            }
          });

          document.addEventListener("click", function (e) {
            var inModal = e.target.closest("#jn-trade-modal");
            if (!inModal) return;

            var photoBtn = e.target.closest(".jn-photo-open");
            if (photoBtn) {
              e.preventDefault();
              e.stopPropagation();
              openJnLightbox(
                photoBtn.getAttribute("data-src") || "",
                photoBtn.getAttribute("data-caption") || ""
              );
              return;
            }

            var askBtn = e.target.closest(".jn-ask-btn");
            if (askBtn && askBtn.getAttribute("data-cal-ask") === "1") {
              e.preventDefault();
              e.stopPropagation();
              if (calendarModalTradeForAsk) askJarvisAboutTrade(calendarModalTradeForAsk);
            }
          });
        }

        function initParticles() {
          var canvas = document.getElementById("particle-canvas");
          if (!canvas) return;
          var ctx = canvas.getContext("2d");
          var particles = [];
          var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var mobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
          var PARTICLE_COUNT = reduce ? 0 : mobile ? 220 : 340;
          if (!PARTICLE_COUNT) return;

          function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }
          resize();
          window.addEventListener("resize", resize);

          function Particle() {
            this.x = Math.random() * window.innerWidth;
            this.y = Math.random() * window.innerHeight;
            var speed = Math.random() * 0.3 + 0.04;
            var angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = Math.random() * 0.7 + 0.2;
            this.baseAlpha = Math.random() * 0.45 + 0.08;
            this.twinkle = Math.random() * Math.PI * 2;
            var r = Math.random();
            if (r < 0.65) {
              this.cr = 0;
              this.cg = 191;
              this.cb = 255;
            } else if (r < 0.93) {
              this.cr = 192;
              this.cg = 192;
              this.cb = 192;
            } else {
              this.cr = 255;
              this.cg = 255;
              this.cb = 255;
              this.size = Math.random() * 1.0 + 0.2;
              this.baseAlpha = Math.random() * 0.6 + 0.2;
            }
          }
          for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

          (function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var j = 0; j < particles.length; j++) {
              var p = particles[j];
              p.twinkle += 0.018;
              var a = p.baseAlpha * (0.72 + 0.28 * Math.sin(p.twinkle));
              p.vx *= 0.998;
              p.vy *= 0.998;
              p.vx += (Math.random() - 0.5) * 0.004;
              p.vy += (Math.random() - 0.5) * 0.004;
              p.x += p.vx;
              p.y += p.vy;
              var W = window.innerWidth,
                H = window.innerHeight;
              if (p.x < -20) p.x = W + 20;
              if (p.x > W + 20) p.x = -20;
              if (p.y < -20) p.y = H + 20;
              if (p.y > H + 20) p.y = -20;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.cr + "," + p.cg + "," + p.cb + "," + a + ")";
              ctx.fill();
            }
            requestAnimationFrame(loop);
          })();
        }

        function goToday() {
          anchorDate = new Date();
          var key = dayKey(new Date());
          // if today is weekend, select Monday of current week
          var mon = mondayOfWeek(anchorDate);
          var todayKey = dayKey(anchorDate);
          var day = mon.getUTCDay(); // mon is monday; but compute from today instead:
          var p = partsYMD(anchorDate);
          var x = new Date(p.y + "-" + p.m + "-" + p.d + "T00:00:00.000Z");
          var dow = x.getUTCDay();
          if (dow === 0 || dow === 6) {
            todayKey = dayKey(mon);
          }
          setPanel(todayKey);
        }

        function shiftRange(dir) {
          var delta = viewMode === "week" ? 7 : 30;
          // month shift should be by 1 month, not 30 days; handled below.
          if (viewMode === "week") {
            anchorDate = addDaysUTC(mondayOfWeek(anchorDate), dir * 7);
          } else {
            var p = partsYMD(anchorDate);
            var y = Number(p.y);
            var m = Number(p.m);
            m += dir;
            if (m <= 0) {
              m = 12;
              y -= 1;
            }
            if (m >= 13) {
              m = 1;
              y += 1;
            }
            var mm = String(m).padStart(2, "0");
            anchorDate = new Date(String(y) + "-" + mm + "-01T00:00:00.000Z");
          }
          renderGrid();
        }

        function wire() {
          var grid = document.getElementById("cal-grid");
          if (grid) {
            grid.addEventListener("click", function (e) {
              var cell = e.target.closest(".cal-cell");
              if (!cell) return;
              var key = cell.dataset.key || "";
              if (key) setPanel(key);
            });
          }

          var panelList = document.getElementById("panel-list");
          if (panelList) {
            panelList.addEventListener("click", function (e) {
              var row = e.target.closest(".cal-trade");
              if (!row || row.dataset.tradeIndex === undefined || row.dataset.tradeIndex === "") return;
              var ix = parseInt(row.dataset.tradeIndex, 10);
              if (isNaN(ix) || !trades[ix]) return;
              e.preventDefault();
              openCalendarTradeModal(trades[ix]);
            });
            panelList.addEventListener("keydown", function (e) {
              if (e.key !== "Enter" && e.key !== " ") return;
              var row = e.target.closest(".cal-trade");
              if (!row || row.dataset.tradeIndex === undefined || row.dataset.tradeIndex === "") return;
              var ix = parseInt(row.dataset.tradeIndex, 10);
              if (isNaN(ix) || !trades[ix]) return;
              e.preventDefault();
              openCalendarTradeModal(trades[ix]);
            });
          }

          wireTradeDetailModal();
          bindCalendarImageRefreshOnce();

          var prev = document.getElementById("btn-prev");
          var next = document.getElementById("btn-next");
          var today = document.getElementById("btn-today");
          var vw = document.getElementById("view-week");
          var vm = document.getElementById("view-month");

          prev && prev.addEventListener("click", function () { shiftRange(-1); });
          next && next.addEventListener("click", function () { shiftRange(1); });
          today && today.addEventListener("click", function () { goToday(); renderGrid(); });

          vw &&
            vw.addEventListener("click", function () {
              viewMode = "week";
              renderGrid();
            });
          vm &&
            vm.addEventListener("click", function () {
              viewMode = "month";
              renderGrid();
            });
        }

        async function boot() {
          initParticles();
          wire();
          await ensureUserId();

          var panelHint = document.getElementById("panel-hint");
          if (panelHint) panelHint.textContent = "Loading trades…";

          try {
            trades = await fetchAllTrades();
          } catch (e) {
            trades = [];
          }

          buildIndex(trades);
          var badgeEl = document.getElementById("cal-badge-text");
          if (badgeEl) {
            badgeEl.textContent = trades.length === 1 ? "1 trade loaded" : trades.length + " trades loaded";
          }

          todayKey = (function () {
            try { return dayKey(new Date()); } catch (e) { return ""; }
          })();
          goToday();
          renderGrid();
          // Reveal panel on initial load
          var panelEl = document.querySelector(".cal-panel");
          if (panelEl) {
            setTimeout(function () { panelEl.classList.add("cal-panel--visible"); }, 80);
          }
        }

        boot();
      })();
    </script>
  </body>
</html>
