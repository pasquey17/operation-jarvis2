<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>JOURNAL · JARVIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* ── Unlock scroll ── */
      html, body {
        overflow: auto !important;
        height: auto !important;
        min-height: 100dvh !important;
      }

      /* ═══════════ NAV BAR ═══════════ */
      .jv-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        z-index: 1000; background: rgba(0,0,0,0.85);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0,212,255,0.2);
        display: flex; align-items: center; padding: 0 24px; gap: 0;
      }
      .jv-nav__brand {
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
        white-space: nowrap; flex-shrink: 0; text-decoration: none;
      }
      .jv-nav__links {
        display: flex; align-items: center; gap: 32px; list-style: none;
        margin: 0 auto; padding: 0;
      }
      .jv-nav__links a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding-bottom: 2px; border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__links a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__links a.jv-nav--active,
      .jv-nav__links a[aria-current="page"] { color: #00d4ff; border-bottom: 1px solid #00d4ff; }
      .jv-nav__user {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        color: rgba(255,255,255,0.3); letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
      }
      .jv-nav__hamburger {
        display: none; flex-direction: column; justify-content: center; gap: 5px;
        background: none; border: none; cursor: pointer; padding: 4px;
        margin-left: auto; flex-shrink: 0;
      }
      .jv-nav__hamburger span {
        display: block; width: 20px; height: 1.5px;
        background: rgba(255,255,255,0.6); border-radius: 2px; transition: background 0.2s;
      }
      .jv-nav__hamburger:hover span { background: #00d4ff; }
      .jv-nav__dropdown {
        display: none; position: fixed; top: 52px; left: 0; right: 0;
        background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,212,255,0.15);
        z-index: 999; flex-direction: column; padding: 8px 0;
      }
      .jv-nav__dropdown.jv-nav--open { display: flex; }
      .jv-nav__dropdown a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding: 12px 24px; border-left: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__dropdown a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__dropdown a.jv-nav--active,
      .jv-nav__dropdown a[aria-current="page"] { color: #00d4ff; border-left-color: #00d4ff; }
      @media (max-width: 768px) {
        .jv-nav__links, .jv-nav__user { display: none; }
        .jv-nav__hamburger { display: flex; }
        .jv-nav__brand { font-size: 13px; }
      }

      /* ═══════════ Journal page layout ═══════════ */
      .jn-page {
        position: relative; z-index: 1; min-height: 100dvh;
        padding: 72px 24px 100px; max-width: 960px; margin: 0 auto;
      }

      /* ── Header ── */
      .jn-header {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 16px; margin-bottom: 32px; padding-top: 16px;
      }
      .jn-header__left { flex: 1; min-width: 0; }
      .jn-title {
        margin: 0 0 4px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: clamp(1.5rem,4vw,2.1rem); color: #00d4ff;
        letter-spacing: 0.24em; text-transform: uppercase;
        text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 70px rgba(0,212,255,0.18);
      }
      .jn-subtitle {
        margin: 0 0 20px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      /* ── Stat pills — bigger ── */
      .jn-week-pills { display: flex; flex-wrap: wrap; gap: 10px; }
      .jn-stat-pill {
        padding: 14px 20px; border-radius: 8px;
        border: 1px solid rgba(0,212,255,0.15); background: rgba(0,212,255,0.04);
        min-width: 110px;
      }
      .jn-stat-value {
        display: block; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 22px; color: #fff; font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em; line-height: 1.15;
      }
      .jn-stat-label {
        display: block; font-size: 9px; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(255,255,255,0.28); margin-top: 4px;
      }

      .jn-log-btn {
        flex-shrink: 0; padding: 10px 18px; border-radius: 6px;
        border: 1px solid #00d4ff; background: rgba(0,212,255,0.08);
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; cursor: pointer; white-space: nowrap;
        transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .jn-log-btn:hover {
        background: rgba(0,212,255,0.18); box-shadow: 0 0 24px rgba(0,212,255,0.25);
        transform: translateY(-1px);
      }
      .jn-log-btn:active { transform: translateY(0); }

      /* ── Header actions (FILTER + LOG TRADE buttons) ── */
      .jn-header__actions {
        display: flex; flex-direction: column; gap: 8px;
        align-items: flex-end; flex-shrink: 0;
      }

      /* ── FILTER + toggle button ── */
      .jn-filter-toggle {
        position: relative; padding: 10px 18px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.5); font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        cursor: pointer; white-space: nowrap;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .jn-filter-toggle:hover { border-color: rgba(0,212,255,0.4); color: rgba(255,255,255,0.85); }
      .jn-filter-toggle.jn-filter-toggle--open {
        border-color: rgba(0,212,255,0.5); color: #00d4ff; background: rgba(0,212,255,0.06);
      }
      .jn-filter-dot {
        display: none; position: absolute; top: 7px; right: 7px;
        width: 6px; height: 6px; border-radius: 50%; background: #00d4ff;
        box-shadow: 0 0 6px rgba(0,212,255,0.7);
      }
      .jn-filter-dot--visible { display: block; }

      /* ── Collapsible filter panel (grid clip — smoother than fixed max-height) ── */
      .jn-filter-panel {
        display: grid;
        grid-template-rows: 0fr;
        margin-bottom: 0;
        transition: grid-template-rows 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          margin-bottom 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .jn-filter-panel--open {
        grid-template-rows: 1fr;
        margin-bottom: 22px;
      }
      .jn-filter-panel-inner {
        min-height: 0;
        overflow: hidden;
        padding: 20px 22px 18px;
        background: linear-gradient(
          165deg,
          rgba(0, 212, 255, 0.06) 0%,
          rgba(0, 0, 0, 0.45) 100%
        );
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 12px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 16px 48px rgba(0, 0, 0, 0.35);
      }

      /* ── Filter grid — 3 columns ── */
      .jn-filter-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 24px;
      }
      .jn-filter-row {
        display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
      }
      /* Model pills span full width so long names don't force single-column stacking */
      #filter-model { grid-column: 1 / -1; }
      #filter-model .jn-filter-pill { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .jn-filter-label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.28);
      }
      .jn-filter-pills { display: flex; flex-wrap: wrap; gap: 5px; }
      .jn-filter-pill {
        padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
        background: transparent; color: rgba(255,255,255,0.35);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .jn-filter-pill:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
      .jn-filter-pill.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.08); }

      /* ── Panel footer (CLEAR ALL) ── */
      .jn-filter-panel-foot {
        display: flex; justify-content: flex-end;
        margin-top: 16px; padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .jn-filter-clear-btn {
        background: none; border: none; color: rgba(255,255,255,0.3);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; padding: 2px 0;
        transition: color 0.2s;
      }
      .jn-filter-clear-btn:hover { color: #00d4ff; }

      /* ── Trade list ── */
      .jn-list { display: flex; flex-direction: column; gap: 6px; }

      /* ── Card ── */
      .jn-card {
        position: relative;
        border-radius: 12px;
        border: 1px solid rgba(0, 212, 255, 0.12);
        border-left: 4px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.4);
        overflow: hidden;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition:
          border-color 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          background 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 12px 32px rgba(0, 0, 0, 0.32);
      }
      .jn-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          ellipse 120% 80% at 100% 0%,
          rgba(0, 212, 255, 0.08),
          transparent 55%
        );
        transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .jn-card:hover {
        background: rgba(0, 212, 255, 0.06);
        border-color: rgba(0, 212, 255, 0.22);
        transform: translateY(-2px);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.06) inset,
          0 20px 48px rgba(0, 0, 0, 0.4),
          0 0 40px rgba(0, 191, 255, 0.08);
      }
      .jn-card:hover::after {
        opacity: 1;
      }
      .jn-card[data-outcome="win"] {
        border-left-color: #00ff88;
      }
      .jn-card[data-outcome="loss"] {
        border-left-color: #ff5050;
      }
      .jn-card[data-outcome="be"] {
        border-left-color: rgba(192, 192, 192, 0.35);
      }

      /* ── Card top row ── */
      .jn-card__top {
        display: flex; align-items: center;
        padding: 18px 20px 18px 18px;
        min-height: 56px; gap: 0;
      }
      /* Left group: date + badges + pair + model — takes available space, clips */
      .jn-card__left {
        display: flex; align-items: center; gap: 10px;
        flex: 1; min-width: 0; overflow: hidden;
      }
      /* Right group: account + rr + chevron — never shrinks, always far right */
      .jn-card__right {
        display: flex; align-items: center; gap: 10px;
        flex-shrink: 0; margin-left: 14px;
      }

      .jn-card__date {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        color: rgba(255,255,255,0.38); letter-spacing: 0.05em; flex-shrink: 0;
        white-space: nowrap;
      }
      .jn-card__pair {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        color: #fff; letter-spacing: 0.06em; flex-shrink: 0; white-space: nowrap;
      }
      .jn-card__model {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        color: rgba(255,255,255,0.35); letter-spacing: 0.04em;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        min-width: 0; flex-shrink: 1;
      }
      .jn-card__rr {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 14px;
        color: #00d4ff; font-weight: 700; font-variant-numeric: tabular-nums;
        flex-shrink: 0; white-space: nowrap;
      }
      .jn-card__chevron {
        font-size: 10px; color: rgba(255,255,255,0.22); flex-shrink: 0;
        transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
      }
      .jn-card[data-expanded="true"] .jn-card__chevron { transform: rotate(180deg); }

      /* ── Badges ── */
      .jn-badge {
        display: inline-flex; align-items: center;
        padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        border: 1px solid transparent; white-space: nowrap;
      }
      .jn-badge--win   { background: #00ff88; color: #001a00; }
      .jn-badge--loss  { background: #ff4444; color: #fff; }
      .jn-badge--be    { background: rgba(255,255,255,0.16); color: #fff; }
      .jn-badge--long  { background: rgba(0,212,255,0.12); color: #00d4ff; border-color: rgba(0,212,255,0.35); }
      .jn-badge--short { background: rgba(255,140,0,0.12); color: #ff8c00; border-color: rgba(255,140,0,0.35); }
      .jn-badge--acct  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.38); border-color: rgba(255,255,255,0.1); font-weight: 400; font-size: 9px; }

      /* ── Expanded content (grid clip) ── */
      .jn-card__expand {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        border-top: 0 solid transparent;
      }
      .jn-card[data-expanded="true"] .jn-card__expand {
        grid-template-rows: 1fr;
        border-top: 1px solid rgba(0, 212, 255, 0.14);
      }
      .jn-card__expand > .jn-expand-inner {
        min-height: 0;
      }
      .jn-expand-inner {
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background: rgba(0, 0, 0, 0.25);
      }
      .jn-detail { display: flex; flex-direction: column; gap: 3px; }
      .jn-detail__label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: #00d4ff;
      }
      .jn-detail__value {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.65); line-height: 1.5;
      }
      .jn-detail__notes {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.5); line-height: 1.65; white-space: pre-wrap;
        word-break: break-word; margin: 0;
      }
      .jn-ask-btn {
        align-self: flex-start; padding: 8px 16px; border-radius: 6px;
        border: 1px solid rgba(0,212,255,0.35); background: rgba(0,212,255,0.06);
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
        cursor: pointer; transition: background 0.2s, border-color 0.2s;
      }
      .jn-ask-btn:hover { background: rgba(0,212,255,0.14); border-color: #00d4ff; }

      /* ── Load more ── */
      .jn-load-more-wrap { display: flex; justify-content: center; margin-top: 24px; }
      .jn-load-more {
        padding: 10px 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
        background: transparent; color: rgba(255,255,255,0.35);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .jn-load-more:hover { border-color: rgba(0,212,255,0.4); color: #00d4ff; }
      .jn-load-more:disabled { opacity: 0.3; cursor: not-allowed; }
      .jn-load-more.hidden { display: none; }

      /* ── State messages ── */
      .jn-state {
        padding: 48px 0; text-align: center;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.22);
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .jn-page { padding: 68px 14px 90px; }
        .jn-header { flex-direction: column; gap: 12px; align-items: stretch; }
        .jn-header__actions { flex-direction: column; align-items: stretch; width: 100%; }
        .jn-filter-toggle { text-align: center; min-height: 44px; }
        .jn-log-btn { text-align: center; min-height: 44px; }
        .jn-title { font-size: 1.5rem; }
        .jn-card__top { padding: 16px 14px; }
        .jn-card__date { font-size: 10px; }
        .jn-stat-pill { min-width: auto; }
        .jn-stat-value { font-size: 18px; }
        .jn-week-pills { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .jn-filter-grid { grid-template-columns: 1fr; }
        #filter-model { grid-column: 1; }
        .jn-card:hover { transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .jn-card,
        .jn-card__expand,
        .jn-filter-panel {
          transition-duration: 0.01ms !important;
        }
        .jn-card:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════ NAV BAR ═══════════════════ -->
    <nav class="jv-nav" aria-label="Main navigation">
      <a class="jv-nav__brand" href="/index.html">JARVIS</a>
      <ul class="jv-nav__links" role="list">
        <li><a href="/index.html" id="nav-home">Home</a></li>
        <li><a href="/journal.html" id="nav-journal" class="jv-nav--active" aria-current="page">Journal</a></li>
        <li><a href="/analytics.html" id="nav-analytics">Analytics</a></li>
        <li><a href="/history.html" id="nav-history">History</a></li>
        <li><a href="/calendar.html" id="nav-calendar">Calendar</a></li>
      </ul>
      <span class="jv-nav__user" id="jv-nav-user" aria-label="Current user"></span>
      <button class="jv-nav__hamburger" id="jv-nav-hamburger" aria-label="Toggle navigation"
              aria-expanded="false" aria-controls="jv-nav-dropdown">
        <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
      </button>
    </nav>

    <div class="jv-nav__dropdown" id="jv-nav-dropdown" aria-hidden="true">
      <a href="/index.html">Home</a>
      <a href="/journal.html" class="jv-nav--active" aria-current="page">Journal</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/history.html">History</a>
      <a href="/calendar.html">Calendar</a>
    </div>

    <script>
      (function () {
        var user = localStorage.getItem('jarvis_user') || localStorage.getItem('user_id');
        if (user) document.getElementById('jv-nav-user').textContent = user;
        var btn = document.getElementById('jv-nav-hamburger');
        var dd  = document.getElementById('jv-nav-dropdown');
        btn.addEventListener('click', function () {
          var open = dd.classList.toggle('jv-nav--open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
          dd.setAttribute('aria-hidden', open ? 'false' : 'true');
        });
        document.addEventListener('click', function (e) {
          if (!btn.contains(e.target) && !dd.contains(e.target)) {
            dd.classList.remove('jv-nav--open');
            btn.setAttribute('aria-expanded', 'false');
            dd.setAttribute('aria-hidden', 'true');
          }
        });
      })();
    </script>
    <!-- ═══════════════════ END NAV BAR ═══════════════════ -->

    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <!-- ═══════════════════ JOURNAL PAGE ═══════════════════ -->
    <main class="jn-page">
      <header class="jn-header">
        <div class="jn-header__left">
          <h1 class="jn-title">JOURNAL</h1>
          <p class="jn-subtitle">Every trade. Every lesson.</p>
          <div class="jn-week-pills">
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-total">—</span>
              <span class="jn-stat-label">Trades this week</span>
            </div>
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-winrate">—</span>
              <span class="jn-stat-label">Win rate this week</span>
            </div>
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-netr">—</span>
              <span class="jn-stat-label">Total R this week</span>
            </div>
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-bestrr" style="color:#00d4ff">—</span>
              <span class="jn-stat-label">Best RR this week</span>
            </div>
          </div>
        </div>
        <div class="jn-header__actions">
          <button class="jn-filter-toggle" id="jn-filter-toggle" type="button">
            <span id="jn-filter-toggle-label">FILTER +</span><span class="jn-filter-dot" id="jn-filter-dot"></span>
          </button>
          <button class="jn-log-btn" id="jn-log-btn" type="button">LOG TRADE +</button>
        </div>
      </header>

      <div class="jn-filter-panel" id="jn-filter-panel" aria-hidden="true">
        <div class="jn-filter-panel-inner">
          <div class="jn-filter-grid" id="jn-filters">
            <div class="jn-filter-row" id="filter-outcome">
              <span class="jn-filter-label">Outcome</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="outcome" data-value="all">All</button>
                <button class="jn-filter-pill" data-group="outcome" data-value="win">Win</button>
                <button class="jn-filter-pill" data-group="outcome" data-value="loss">Loss</button>
                <button class="jn-filter-pill" data-group="outcome" data-value="be">BE</button>
              </div>
            </div>
            <div class="jn-filter-row" id="filter-direction">
              <span class="jn-filter-label">Position</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="direction" data-value="all">All</button>
                <button class="jn-filter-pill" data-group="direction" data-value="long">Long</button>
                <button class="jn-filter-pill" data-group="direction" data-value="short">Short</button>
              </div>
            </div>
            <div class="jn-filter-row" id="filter-pair">
              <span class="jn-filter-label">Pair</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="pair" data-value="all">All</button>
                <button class="jn-filter-pill" data-group="pair" data-value="XAU/USD">XAU/USD</button>
                <button class="jn-filter-pill" data-group="pair" data-value="AUD/USD">AUD/USD</button>
              </div>
            </div>
            <div class="jn-filter-row" id="filter-model">
              <span class="jn-filter-label">Model</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="model" data-value="all">All</button>
              </div>
            </div>
            <div class="jn-filter-row" id="filter-account">
              <span class="jn-filter-label">Account</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="account" data-value="all">All</button>
              </div>
            </div>
            <div class="jn-filter-row" id="filter-sort">
              <span class="jn-filter-label">Sort</span>
              <div class="jn-filter-pills">
                <button class="jn-filter-pill active" data-group="sort" data-value="newest">Newest</button>
                <button class="jn-filter-pill" data-group="sort" data-value="oldest">Oldest</button>
                <button class="jn-filter-pill" data-group="sort" data-value="highestrr">Highest RR</button>
                <button class="jn-filter-pill" data-group="sort" data-value="lowestrr">Lowest RR</button>
              </div>
            </div>
          </div>
          <div class="jn-filter-panel-foot">
            <button class="jn-filter-clear-btn" id="jn-filter-clear" type="button">CLEAR ALL</button>
          </div>
        </div>
      </div>

      <div class="jn-list" id="jn-list">
        <div class="jn-state">Loading trades…</div>
      </div>

      <div class="jn-load-more-wrap">
        <button class="jn-load-more hidden" id="jn-load-more" type="button">Load more</button>
      </div>
    </main>

    <script>
    (function () {
      'use strict';

      /* ── Constants ── */
      const PAGE_SIZE   = 20;
      const CORE_FIELDS = new Set(['date','session','outcome','rr','pair','account']);

      /* ── State ── */
      let currentUserId  = 'aidenpasque11@gmail.com';
      let allTrades      = [];
      let filteredTrades = [];
      let displayedCount = 0;
      let activeFilters  = { outcome: 'all', direction: 'all', pair: 'all', model: 'all', account: 'all', sort: 'newest' };

      /* ── Helpers ── */
      function getField(obj) {
        for (var i = 1; i < arguments.length; i++) {
          var v = obj[arguments[i]];
          if (v !== undefined && v !== null && v !== '') return v;
        }
        return '';
      }

      function normalizeOutcome(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'win'  || v === 'w') return 'win';
        if (v === 'loss' || v === 'l') return 'loss';
        if (v === 'be'   || v === 'breakeven' || v === 'break even' || v === 'break-even') return 'be';
        return v;
      }

      function normalizeDirection(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'long'  || v === 'buy'  || v === 'bull') return 'long';
        if (v === 'short' || v === 'sell' || v === 'bear') return 'short';
        return null;
      }

      /* Extract direction from trade — checks explicit field then model name */
      function getTradeDirection(t) {
        var raw = getField(t, 'direction', 'Direction', 'long_short', 'side', 'trade_direction', 'POSITION TYPE', 'Position Type', 'position_type');
        if (!raw) {
          var m = String(getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '').toLowerCase();
          if (m.includes('long'))  raw = 'long';
          else if (m.includes('short')) raw = 'short';
        }
        return normalizeDirection(raw);
      }

      function tradeDate(t) {
        return new Date(getField(t, 'date', 'traded_at', 'Date') || '');
      }

      function formatDateShort(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleDateString('en-AU', {
            timeZone: 'Australia/Adelaide', day: 'numeric', month: 'short', year: 'numeric'
          });
        } catch (e) { return d.toDateString(); }
      }

      function formatDateFull(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleString('en-AU', {
            timeZone: 'Australia/Adelaide', weekday: 'long',
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
          });
        } catch (e) { return d.toString(); }
      }

      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function truncate(s, n) {
        var str = String(s || '');
        return str.length > n ? str.slice(0, n) + '…' : str;
      }

      function readApiError(data) {
        if (!data || typeof data !== 'object') return '';
        var e = data.error;
        if (typeof e === 'string') return e;
        if (e && typeof e.message === 'string') return e.message;
        return '';
      }

      /* ── Particle system ── */
      var PARTICLE_COUNT = 380;
      var particles = [];

      function Particle() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this._reset();
      }
      Particle.prototype._reset = function () {
        var speed = Math.random() * 0.3 + 0.04;
        var angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 0.7 + 0.2;
        this.baseAlpha = Math.random() * 0.45 + 0.08;
        this.alpha = this.baseAlpha;
        this.twinkle = Math.random() * Math.PI * 2;
        var r = Math.random();
        if (r < 0.65)      { this.cr = 0;   this.cg = 191; this.cb = 255; }
        else if (r < 0.93) { this.cr = 192; this.cg = 192; this.cb = 192; }
        else { this.cr = 255; this.cg = 255; this.cb = 255; this.size = Math.random() * 1.0 + 0.2; this.baseAlpha = Math.random() * 0.6 + 0.2; }
      };
      Particle.prototype.update = function () {
        this.twinkle += 0.018;
        this.vx *= 0.998; this.vy *= 0.998;
        this.vx += (Math.random() - 0.5) * 0.004; this.vy += (Math.random() - 0.5) * 0.004;
        this.alpha = this.baseAlpha * (0.72 + 0.28 * Math.sin(this.twinkle));
        this.x += this.vx; this.y += this.vy;
        var W = window.innerWidth, H = window.innerHeight;
        if (this.x < -20) this.x = W + 20; if (this.x > W + 20) this.x = -20;
        if (this.y < -20) this.y = H + 20; if (this.y > H + 20) this.y = -20;
      };
      Particle.prototype.draw = function (ctx) {
        var a = Math.max(0, Math.min(1, this.alpha));
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + this.cr + ',' + this.cg + ',' + this.cb + ',' + a + ')';
        ctx.fill();
      };
      function initParticles() {
        var canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        (function loop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (var j = 0; j < particles.length; j++) { particles[j].update(); particles[j].draw(ctx); }
          requestAnimationFrame(loop);
        })();
      }

      var DEFAULT_USER_ID = 'aidenpasque11@gmail.com';

      /** Match app.js: jarvis_user wins so mum’s profile overrides stale user_id. */
      function ensureUserId() {
        return new Promise(function (resolve) {
          var ju = (localStorage.getItem('jarvis_user') || '').trim();
          var uid = (localStorage.getItem('user_id') || '').trim();
          if (ju) {
            currentUserId = ju;
            if (uid !== ju) {
              try { localStorage.setItem('user_id', ju); } catch (e) {}
            }
          } else if (uid) {
            currentUserId = uid;
          } else {
            currentUserId = DEFAULT_USER_ID;
            try {
              localStorage.setItem('user_id', DEFAULT_USER_ID);
              localStorage.setItem('jarvis_user', DEFAULT_USER_ID);
            } catch (e) {}
          }
          var navUser = document.getElementById('jv-nav-user');
          if (navUser) navUser.textContent = currentUserId;
          resolve(currentUserId);
        });
      }

      function normalizeTradesApiBody(data) {
        if (!data || typeof data !== 'object') return { records: [] };
        var inner = data.payload && typeof data.payload === 'object' ? data.payload : data;
        return { records: Array.isArray(inner.records) ? inner.records : [] };
      }

      /* ── Data fetching ── */
      async function fetchAllTrades() {
        var userId = currentUserId || 'aidenpasque11@gmail.com';
        var [tradesRes, journalRes] = await Promise.allSettled([
          fetch('/api/trades?user_id=eq.' + encodeURIComponent(userId), { cache: 'no-store' }).then(function (r) { return r.json(); }),
          fetch('/api/journal-trades?user_id=eq.' + encodeURIComponent(userId), { cache: 'no-store' }).then(function (r) { return r.json(); })
        ]);
        var merged = [];
        if (tradesRes.status === 'fulfilled') {
          var data = tradesRes.value;
          var norm = normalizeTradesApiBody(data);
          var recs = norm.records;
          merged = merged.concat(recs);
        }
        if (journalRes.status === 'fulfilled' && Array.isArray(journalRes.value)) {
          merged = merged.concat(journalRes.value);
        }
        merged.sort(function (a, b) { return tradeDate(b) - tradeDate(a); });

        /* Debug: log first trade from each source so we can see exact field names */
        if (tradesRes.status === 'fulfilled') {
          var data = tradesRes.value;
          var n = normalizeTradesApiBody(data);
          if (n.records.length > 0) console.log('[JARVIS] First /api/trades record:', n.records[0]);
        }
        if (journalRes.status === 'fulfilled' && Array.isArray(journalRes.value) && journalRes.value.length > 0) {
          console.log('[JARVIS] First /api/journal-trades record:', journalRes.value[0]);
        }

        return merged;
      }

      /* ── Weekly stats ── */
      function getWeekStart() {
        var now = new Date();
        var day = now.getUTCDay();
        var daysToMon = day === 0 ? 6 : day - 1;
        var mon = new Date(now);
        mon.setUTCDate(now.getUTCDate() - daysToMon);
        mon.setUTCHours(0, 0, 0, 0);
        return mon;
      }

      function computeWeeklyStats(trades) {
        var weekStart  = getWeekStart();
        var weekTrades = trades.filter(function (t) {
          var d = tradeDate(t); return !isNaN(d) && d >= weekStart;
        });
        var total = weekTrades.length, wins = 0, losses = 0, netR = 0, bestRR = null;
        weekTrades.forEach(function (t) {
          var outcome = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var rr      = parseFloat(getField(t, 'rr', 'RR'));
          if (outcome === 'win') {
            wins++;
            if (!isNaN(rr)) {
              netR += rr;
              if (bestRR === null || rr > bestRR) bestRR = rr;
            }
          }
          if (outcome === 'loss') {
            losses++;
            netR -= (!isNaN(rr) ? rr : 1);
          }
        });
        return {
          total:   total,
          winRate: total > 0 ? Math.round(wins / total * 100) : null,
          netR:    total > 0 ? netR : null,
          bestRR:  bestRR
        };
      }

      function renderWeeklyStats(stats) {
        var elTotal   = document.getElementById('pill-total');
        var elWinrate = document.getElementById('pill-winrate');
        var elNetR    = document.getElementById('pill-netr');
        var elBestRR  = document.getElementById('pill-bestrr');

        if (elTotal)   elTotal.textContent  = stats.total;
        if (elWinrate) elWinrate.textContent = stats.winRate == null ? '—' : stats.winRate + '%';

        if (elNetR) {
          if (stats.netR == null) { elNetR.textContent = '—'; elNetR.style.color = ''; }
          else {
            var sign = stats.netR >= 0 ? '+' : '';
            elNetR.textContent = sign + stats.netR.toFixed(2) + 'R';
            elNetR.style.color = stats.netR >= 0 ? '#00ff88' : '#ff6b6b';
          }
        }
        if (elBestRR) {
          elBestRR.textContent = stats.bestRR == null ? '—' : stats.bestRR.toFixed(2) + 'R';
        }
      }

      /* ── Filter options — dynamic population ── */
      function buildFilterOptions(trades) {
        var pairs    = new Set();
        var accounts = new Set();
        var models   = new Set();

        trades.forEach(function (t) {
          var p = getField(t, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol');
          var a = getField(t, 'account', 'Account', 'ACCOUNT');
          var m = getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL');
          if (p) pairs.add(p.toUpperCase());
          if (a) accounts.add(a);
          if (m) models.add(m);
        });

        function addPills(rowId, group, values) {
          var row = document.getElementById(rowId);
          if (!row) return;
          var pillsWrap = row.querySelector('.jn-filter-pills') || row;
          /* remove previously added dynamic pills (keep static ones) */
          Array.from(row.querySelectorAll('.jn-filter-pill[data-dynamic]')).forEach(function(el){ el.remove(); });
          /* collect static pill values so we don't create duplicates */
          var staticVals = new Set(
            Array.from(row.querySelectorAll('.jn-filter-pill:not([data-dynamic])')).map(function(el){ return (el.dataset.value || '').toUpperCase(); })
          );
          values.forEach(function (val) {
            if (staticVals.has(val.toUpperCase())) return;
            var btn = document.createElement('button');
            btn.className = 'jn-filter-pill';
            btn.dataset.group   = group;
            btn.dataset.value   = val;
            btn.dataset.dynamic = '1';
            btn.textContent = val;
            pillsWrap.appendChild(btn);
          });
        }

        addPills('filter-pair',    'pair',    Array.from(pairs).sort());
        addPills('filter-model',   'model',   Array.from(models).sort());
        addPills('filter-account', 'account', Array.from(accounts).sort());
      }

      /* ── Apply all filters + sort ── */
      function applyFilters() {
        filteredTrades = allTrades.filter(function (t) {
          var outcome  = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var dir      = getTradeDirection(t);
          var pairRaw  = (getField(t, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '').toUpperCase();
          var modelRaw = (getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '').toLowerCase();
          var acctRaw  = (getField(t, 'account', 'Account', 'ACCOUNT') || '').toLowerCase();

          if (activeFilters.outcome !== 'all' && outcome !== activeFilters.outcome) return false;
          if (activeFilters.direction !== 'all' && dir !== activeFilters.direction) return false;
          if (activeFilters.pair    !== 'all' && pairRaw  !== activeFilters.pair.toUpperCase())   return false;
          if (activeFilters.model   !== 'all' && modelRaw !== activeFilters.model)  return false;
          if (activeFilters.account !== 'all' && acctRaw  !== activeFilters.account) return false;
          return true;
        });

        /* Sort */
        switch (activeFilters.sort) {
          case 'oldest':
            filteredTrades.sort(function (a, b) { return tradeDate(a) - tradeDate(b); });
            break;
          case 'highestrr':
            filteredTrades.sort(function (a, b) {
              var ra = parseFloat(getField(a, 'rr', 'RR')); ra = isNaN(ra) ? -Infinity : ra;
              var rb = parseFloat(getField(b, 'rr', 'RR')); rb = isNaN(rb) ? -Infinity : rb;
              return rb - ra;
            });
            break;
          case 'lowestrr':
            filteredTrades.sort(function (a, b) {
              var ra = parseFloat(getField(a, 'rr', 'RR')); ra = isNaN(ra) ? Infinity : ra;
              var rb = parseFloat(getField(b, 'rr', 'RR')); rb = isNaN(rb) ? Infinity : rb;
              return ra - rb;
            });
            break;
          default: /* newest */
            filteredTrades.sort(function (a, b) { return tradeDate(b) - tradeDate(a); });
        }

        displayedCount = 0;
        document.getElementById('jn-list').innerHTML = '';
        renderNextPage();
      }

      /* ── Card rendering ── */
      function outcomeBadgeHtml(outcome) {
        var cls   = { win: 'jn-badge--win', loss: 'jn-badge--loss', be: 'jn-badge--be' }[outcome] || '';
        var label = { win: 'WIN', loss: 'LOSS', be: 'BE' }[outcome] || outcome.toUpperCase() || '—';
        return '<span class="jn-badge ' + cls + '">' + esc(label) + '</span>';
      }

      function directionBadgeHtml(t) {
        var dir = getTradeDirection(t);
        if (!dir) return '';
        var cls = dir === 'long' ? 'jn-badge--long' : 'jn-badge--short';
        return '<span class="jn-badge ' + cls + '">' + dir.toUpperCase() + '</span>';
      }

      function renderCard(trade, idx) {
        var outcome   = normalizeOutcome(getField(trade, 'outcome', 'Outcome', 'OUTCOME'));
        var pair      = getField(trade, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '';
        var account   = getField(trade, 'account', 'Account', 'ACCOUNT') || '';
        var rrRaw     = parseFloat(getField(trade, 'rr', 'RR'));
        var rrDisplay, rrColor;
        if (!isNaN(rrRaw)) {
          rrDisplay = rrRaw.toFixed(2) + 'R';
          rrColor   = '';
        } else if (outcome === 'loss') {
          rrDisplay = '-1R';
          rrColor   = '#ff4444';
        } else {
          rrDisplay = '—';
          rrColor   = '';
        }
        var model     = getField(trade, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '';
        var notes     = getField(trade, 'notes', 'Notes', 'NOTE', 'TRADE SUMMARY') || '';
        var dateShort = formatDateShort(trade);
        var dateFull  = formatDateFull(trade);

        var modelDisplay  = model ? truncate(model, 30) : '';
        var acctBadge     = account ? '<span class="jn-badge jn-badge--acct">' + esc(account) + '</span>' : '';
        var pairHtml      = pair ? '<span class="jn-card__pair">' + esc(pair.toUpperCase()) + '</span>' : '';

        return [
          '<article class="jn-card" data-expanded="false" data-outcome="' + esc(outcome) + '" data-idx="' + idx + '">',
          '  <div class="jn-card__top">',
          '    <div class="jn-card__left">',
          '      <span class="jn-card__date">' + esc(dateShort) + '</span>',
          '      ' + outcomeBadgeHtml(outcome),
          '      ' + directionBadgeHtml(trade),
          '      ' + pairHtml,
          modelDisplay ? '      <span class="jn-card__model">' + esc(modelDisplay) + '</span>' : '',
          '    </div>',
          '    <div class="jn-card__right">',
          '      ' + acctBadge,
          '      <span class="jn-card__rr"' + (rrColor ? ' style="color:' + rrColor + '"' : '') + '>' + esc(rrDisplay) + '</span>',
          '      <span class="jn-card__chevron">&#9660;</span>',
          '    </div>',
          '  </div>',
          '  <div class="jn-card__expand">',
          '    <div class="jn-expand-inner">',
          model ? '      <div class="jn-detail"><span class="jn-detail__label">Entry Model</span><span class="jn-detail__value">' + esc(model) + '</span></div>' : '',
          '      <div class="jn-detail"><span class="jn-detail__label">Date &amp; Time</span><span class="jn-detail__value">' + esc(dateFull) + '</span></div>',
          notes ? '      <div class="jn-detail"><span class="jn-detail__label">Notes</span><p class="jn-detail__notes">' + esc(notes) + '</p></div>' : '',
          '      <button class="jn-ask-btn" data-idx="' + idx + '" type="button">Ask Jarvis about this trade</button>',
          '    </div>',
          '  </div>',
          '</article>'
        ].join('');
      }

      function renderNextPage() {
        var list = document.getElementById('jn-list');
        var btn  = document.getElementById('jn-load-more');

        if (filteredTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades match the current filters.</div>';
          btn.classList.add('hidden');
          return;
        }

        var from = displayedCount;
        var to   = Math.min(from + PAGE_SIZE, filteredTrades.length);
        var frag = '';
        for (var i = from; i < to; i++) frag += renderCard(filteredTrades[i], i);

        list.insertAdjacentHTML('beforeend', frag);
        displayedCount = to;

        if (displayedCount >= filteredTrades.length) {
          btn.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
          btn.disabled = false;
        }
      }

      /* ── Card interaction ── */
      document.getElementById('jn-list').addEventListener('click', function (e) {
        var askBtn = e.target.closest('.jn-ask-btn');
        if (askBtn) {
          e.stopPropagation();
          var trade = filteredTrades[parseInt(askBtn.dataset.idx, 10)];
          if (trade) askJarvisAboutTrade(trade);
          return;
        }
        var card = e.target.closest('.jn-card');
        if (card) card.dataset.expanded = card.dataset.expanded === 'true' ? 'false' : 'true';
      });

      function askJarvisAboutTrade(trade) {
        var parts = [
          'Tell me about this trade:',
          getField(trade, 'pair', 'Pair', 'PAIR') || '',
          getField(trade, 'outcome', 'Outcome', 'OUTCOME') || '',
          getField(trade, 'session', 'Session') || '',
          (function(){ var r = parseFloat(getField(trade,'rr','RR')); return isNaN(r) ? '' : r.toFixed(2)+'R'; })(),
          'on', formatDateFull(trade)
        ].filter(Boolean);
        sessionStorage.setItem('jarvis_pending_message', parts.join(' '));
        window.location.href = '/index.html';
      }

      /* ── Filter pill interaction ── */
      document.getElementById('jn-filters').addEventListener('click', function (e) {
        var pill = e.target.closest('.jn-filter-pill');
        if (!pill) return;
        var group = pill.dataset.group;
        var value = pill.dataset.value;
        pill.closest('.jn-filter-row').querySelectorAll('.jn-filter-pill')
            .forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        activeFilters[group] = value;
        applyFilters();
        updateFilterDot();
      });

      /* ── Filter panel toggle ── */
      function updateFilterDot() {
        var hasActive = activeFilters.outcome   !== 'all'    ||
                        activeFilters.direction !== 'all'    ||
                        activeFilters.pair      !== 'all'    ||
                        activeFilters.model     !== 'all'    ||
                        activeFilters.account   !== 'all'    ||
                        activeFilters.sort      !== 'newest';
        var dot = document.getElementById('jn-filter-dot');
        if (dot) dot.classList.toggle('jn-filter-dot--visible', hasActive);
      }

      (function () {
        var toggle  = document.getElementById('jn-filter-toggle');
        var panel   = document.getElementById('jn-filter-panel');
        var label   = document.getElementById('jn-filter-toggle-label');
        var isOpen  = false;

        toggle.addEventListener('click', function () {
          isOpen = !isOpen;
          panel.classList.toggle('jn-filter-panel--open', isOpen);
          panel.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
          toggle.classList.toggle('jn-filter-toggle--open', isOpen);
          label.textContent = isOpen ? 'FILTER −' : 'FILTER +';
        });

        document.getElementById('jn-filter-clear').addEventListener('click', function () {
          activeFilters = { outcome: 'all', direction: 'all', pair: 'all', model: 'all', account: 'all', sort: 'newest' };
          document.querySelectorAll('#jn-filters .jn-filter-pill').forEach(function (p) {
            var isDefault = p.dataset.value === 'all' ||
                            (p.dataset.group === 'sort' && p.dataset.value === 'newest');
            p.classList.toggle('active', isDefault);
          });
          updateFilterDot();
          applyFilters();
        });
      })();

      /* ── Load more ── */
      document.getElementById('jn-load-more').addEventListener('click', function () {
        this.disabled = true;
        renderNextPage();
      });

      /* ── LOG TRADE modal (adapted from app.js) ── */
      var tradeFormOpen = false;

      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function renderCustomField(f) {
        var id    = 'tf-' + f.field_name.toLowerCase().replace(/\s+/g,'-');
        var label = escHtml(f.field_name);
        var req   = f.is_required ? 'required' : '';
        var name  = escHtml(f.field_name);
        if (f.field_type === 'dropdown' || f.field_type === 'multiselect') {
          var opts = []; try { opts = JSON.parse(f.field_options || '[]'); } catch(e){}
          var multiple = f.field_type === 'multiselect' ? 'multiple' : '';
          var optsHtml = opts.map(function(o){ return '<option value="'+escHtml(o)+'">'+escHtml(o)+'</option>'; }).join('');
          return '<div class="trade-field trade-field--full"><label class="trade-label" for="'+id+'">'+label+'</label><select id="'+id+'" name="'+name+'" class="trade-input" data-custom="1" '+multiple+' '+req+'><option value="">— select —</option>'+optsHtml+'</select></div>';
        }
        if (f.field_type === 'number') {
          return '<div class="trade-field"><label class="trade-label" for="'+id+'">'+label+'</label><input id="'+id+'" type="number" name="'+name+'" class="trade-input" data-custom="1" step="0.01" '+req+'></div>';
        }
        return '<div class="trade-field trade-field--full"><label class="trade-label" for="'+id+'">'+label+'</label><textarea id="'+id+'" name="'+name+'" class="trade-input" data-custom="1" rows="3" '+req+'></textarea></div>';
      }

      async function openTradeForm() {
        if (tradeFormOpen) return;
        tradeFormOpen = true;
        var userId = currentUserId || localStorage.getItem('user_id') || 'aidenpasque11@gmail.com';
        var customFields = [];
        try {
          var r = await fetch('/api/journal-fields?user_id=' + encodeURIComponent(userId), { cache: 'no-store' });
          var data = await r.json().catch(function(){ return {}; });
          var all = Array.isArray(data.fields) ? data.fields : [];
          customFields = all.filter(function(f){ return !CORE_FIELDS.has(f.field_name.toLowerCase()); });
        } catch(e){}
        var today      = new Date().toISOString().slice(0,10);
        var customHtml = customFields.map(renderCustomField).join('');
        var overlay = document.createElement('div');
        overlay.className = 'trade-form-overlay';
        overlay.setAttribute('role','dialog'); overlay.setAttribute('aria-modal','true');
        overlay.innerHTML = [
          '<div class="trade-form-panel" id="trade-form-panel">',
          '<div class="trade-form-header"><span class="trade-form-title">LOG TRADE</span><button type="button" class="trade-form-close" aria-label="Close">&#x2715;</button></div>',
          '<div class="trade-form-body"><form id="trade-log-form" autocomplete="off" novalidate><div class="trade-form-grid">',
          '<div class="trade-field"><label class="trade-label" for="tf-date">Date</label><input id="tf-date" type="date" name="date" class="trade-input" value="'+escHtml(today)+'" required></div>',
          '<div class="trade-field"><label class="trade-label" for="tf-pair">Pair</label><input id="tf-pair" type="text" name="pair" class="trade-input" placeholder="e.g. XAUUSD"></div>',
          '<div class="trade-field"><label class="trade-label" for="tf-session">Session</label><select id="tf-session" name="session" class="trade-input" required><option value="">— select —</option><option value="Asia">Asia</option><option value="London">London</option><option value="New York">New York</option><option value="London/New York">London/New York</option></select></div>',
          '<div class="trade-field"><label class="trade-label" for="tf-outcome">Outcome</label><select id="tf-outcome" name="outcome" class="trade-input" required><option value="">— select —</option><option value="Win">Win</option><option value="Loss">Loss</option><option value="BE">BE</option></select></div>',
          '<div class="trade-field" id="tf-rr-field"><label class="trade-label" for="tf-rr">RR</label><input id="tf-rr" type="number" name="rr" class="trade-input" step="0.01" min="0" placeholder="e.g. 2.5"></div>',
          '<div class="trade-field"><label class="trade-label" for="tf-account">Account</label><input id="tf-account" type="text" name="account" class="trade-input" placeholder="e.g. Main"></div>',
          customHtml,
          '</div><div class="trade-form-actions"><button type="submit" class="trade-submit-btn">SAVE TRADE</button></div></form></div>',
          '</div>'
        ].join('');
        document.body.appendChild(overlay);
        requestAnimationFrame(function () {
          overlay.classList.add('trade-form-overlay--visible');
          var panel = document.getElementById('trade-form-panel');
          if (panel) panel.classList.add('trade-form-panel--visible');
        });
        function closeForm() {
          overlay.classList.remove('trade-form-overlay--visible');
          var panel = document.getElementById('trade-form-panel');
          if (panel) panel.classList.remove('trade-form-panel--visible');
          overlay.addEventListener('transitionend', function () { overlay.remove(); tradeFormOpen = false; }, { once: true });
        }
        overlay.addEventListener('click', function (e) { if (e.target === overlay) closeForm(); });
        overlay.querySelector('.trade-form-close').addEventListener('click', closeForm);
        var outcomeSelect = document.getElementById('tf-outcome');
        var rrField       = document.getElementById('tf-rr-field');
        outcomeSelect && outcomeSelect.addEventListener('change', function () {
          if (rrField) rrField.style.display = outcomeSelect.value === 'BE' ? 'none' : '';
        });
        var form = document.getElementById('trade-log-form');
        form.addEventListener('submit', async function (e) { e.preventDefault(); await submitTradeForm(form, customFields, closeForm); });
        var dateInput = document.getElementById('tf-date');
        if (dateInput) dateInput.focus();
      }

      async function submitTradeForm(form, customFields, closeForm) {
        var fd      = new FormData(form);
        var userId  = currentUserId || localStorage.getItem('user_id') || 'aidenpasque11@gmail.com';
        var dateVal = fd.get('date') || '';
        var pair    = (fd.get('pair') || '').trim();
        var session = fd.get('session') || '';
        var outcome = fd.get('outcome') || '';
        var rrRaw   = fd.get('rr');
        var rr      = (rrRaw !== '' && rrRaw !== null) ? Number(rrRaw) : null;
        var account = (fd.get('account') || '').trim();
        if (!dateVal || !session || !outcome) { showToast('Date, Session and Outcome are required.', true); return; }
        var custom_data = {};
        customFields.forEach(function(f) {
          var val = fd.get(f.field_name);
          if (val !== null && String(val).trim() !== '') custom_data[f.field_name] = val;
        });
        var submitBtn = form.querySelector('.trade-submit-btn');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
        try {
          var res = await fetch('/api/log-trade', {
            method: 'POST', cache: 'no-store', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, traded_at: dateVal + 'T00:00:00.000Z',
              pair: pair || null, outcome: outcome, rr: (rr !== null && !isNaN(rr)) ? rr : null,
              session: session, account: account || null, custom_data: custom_data })
          });
          if (!res.ok) {
            var d = await res.json().catch(function(){ return {}; });
            throw new Error(readApiError(d) || 'Save failed (' + res.status + ')');
          }
          closeForm(); showToast('Trade logged.'); refreshJournalData();
        } catch(e) {
          var msg = e instanceof Error ? e.message : 'Save failed.';
          showToast(msg, true);
          if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'SAVE TRADE'; }
        }
      }

      function showToast(message, isError) {
        var existing = document.getElementById('jn-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.id = 'jn-toast';
        toast.className = 'trade-toast' + (isError ? ' trade-toast--error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        requestAnimationFrame(function () { toast.classList.add('trade-toast--visible'); });
        setTimeout(function () {
          toast.classList.remove('trade-toast--visible');
          toast.addEventListener('transitionend', function () { toast.remove(); }, { once: true });
        }, 3000);
      }

      async function refreshJournalData() {
        try {
          allTrades = await fetchAllTrades();
          renderWeeklyStats(computeWeeklyStats(allTrades));
          buildFilterOptions(allTrades);
          applyFilters();
        } catch(e) { /* silent */ }
      }

      /* ── Boot ── */
      document.getElementById('jn-log-btn').addEventListener('click', openTradeForm);

      async function boot() {
        initParticles();
        await ensureUserId();
        var list = document.getElementById('jn-list');
        list.innerHTML = '<div class="jn-state">Loading trades…</div>';
        try { allTrades = await fetchAllTrades(); }
        catch(e) { list.innerHTML = '<div class="jn-state">Failed to load trades. Check your connection.</div>'; return; }
        if (allTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades found. Log your first trade above.</div>'; return;
        }
        renderWeeklyStats(computeWeeklyStats(allTrades));
        buildFilterOptions(allTrades);
        filteredTrades = allTrades.slice();
        list.innerHTML = '';
        renderNextPage();
      }

      boot();
    })();
    </script>
  </body>
</html>
