<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>JOURNAL · JARVIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* ── Unlock scroll (overrides style.css body lock) ── */
      html, body {
        overflow: auto !important;
        height: auto !important;
        min-height: 100dvh !important;
      }

      /* ═══════════ NAV BAR ═══════════ */
      .jv-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        z-index: 1000; background: rgba(0,0,0,0.85);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0,212,255,0.2);
        display: flex; align-items: center; padding: 0 24px; gap: 0;
      }
      .jv-nav__brand {
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
        white-space: nowrap; flex-shrink: 0; text-decoration: none;
      }
      .jv-nav__links {
        display: flex; align-items: center; gap: 32px; list-style: none;
        margin: 0 auto; padding: 0;
      }
      .jv-nav__links a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding-bottom: 2px; border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__links a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__links a.jv-nav--active,
      .jv-nav__links a[aria-current="page"] { color: #00d4ff; border-bottom: 1px solid #00d4ff; }
      .jv-nav__user {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        color: rgba(255,255,255,0.3); letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
      }
      .jv-nav__hamburger {
        display: none; flex-direction: column; justify-content: center; gap: 5px;
        background: none; border: none; cursor: pointer; padding: 4px;
        margin-left: auto; flex-shrink: 0;
      }
      .jv-nav__hamburger span {
        display: block; width: 20px; height: 1.5px;
        background: rgba(255,255,255,0.6); border-radius: 2px; transition: background 0.2s;
      }
      .jv-nav__hamburger:hover span { background: #00d4ff; }
      .jv-nav__dropdown {
        display: none; position: fixed; top: 52px; left: 0; right: 0;
        background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,212,255,0.15);
        z-index: 999; flex-direction: column; padding: 8px 0;
      }
      .jv-nav__dropdown.jv-nav--open { display: flex; }
      .jv-nav__dropdown a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding: 12px 24px; border-left: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__dropdown a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__dropdown a.jv-nav--active,
      .jv-nav__dropdown a[aria-current="page"] { color: #00d4ff; border-left-color: #00d4ff; }
      @media (max-width: 640px) {
        .jv-nav__links, .jv-nav__user { display: none; }
        .jv-nav__hamburger { display: flex; }
      }

      /* ═══════════ Journal page layout ═══════════ */
      .jn-page {
        position: relative; z-index: 1; min-height: 100dvh;
        padding: 72px 24px 100px; max-width: 960px; margin: 0 auto;
      }

      /* Header */
      .jn-header {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 16px; margin-bottom: 32px; padding-top: 16px;
      }
      .jn-header__left { flex: 1; min-width: 0; }
      .jn-title {
        margin: 0 0 4px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: clamp(1.5rem,4vw,2.1rem); color: #00d4ff;
        letter-spacing: 0.24em; text-transform: uppercase;
        text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 70px rgba(0,212,255,0.18);
      }
      .jn-subtitle {
        margin: 0 0 18px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .jn-week-pills { display: flex; flex-wrap: wrap; gap: 8px; }
      .jn-stat-pill {
        padding: 10px 14px; border-radius: 6px;
        border: 1px solid rgba(0,212,255,0.15); background: rgba(0,212,255,0.04);
      }
      .jn-stat-value {
        display: block; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 18px; color: #fff; font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
      }
      .jn-stat-label {
        display: block; font-size: 9px; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(255,255,255,0.28); margin-top: 2px;
      }
      .jn-log-btn {
        flex-shrink: 0; padding: 10px 18px; border-radius: 6px;
        border: 1px solid #00d4ff; background: rgba(0,212,255,0.08);
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; cursor: pointer; white-space: nowrap;
        transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .jn-log-btn:hover {
        background: rgba(0,212,255,0.18); box-shadow: 0 0 24px rgba(0,212,255,0.25);
        transform: translateY(-1px);
      }
      .jn-log-btn:active { transform: translateY(0); }

      /* Filters */
      .jn-filters { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
      .jn-filter-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
      .jn-filter-label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.28);
        width: 60px; flex-shrink: 0;
      }
      .jn-filter-pill {
        padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
        background: transparent; color: rgba(255,255,255,0.35);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .jn-filter-pill:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
      .jn-filter-pill.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.08); }

      /* Trade list */
      .jn-list { display: flex; flex-direction: column; gap: 8px; }
      .jn-card {
        border-radius: 8px; border: 1px solid rgba(0,212,255,0.15);
        background: rgba(255,255,255,0.03); overflow: hidden; cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }
      .jn-card:hover { border-color: rgba(0,212,255,0.3); background: rgba(255,255,255,0.05); }

      .jn-card__top {
        display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
        padding: 14px 16px;
      }
      .jn-card__date {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        color: rgba(255,255,255,0.4); letter-spacing: 0.06em; flex-shrink: 0;
      }
      .jn-card__pair {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        color: rgba(255,255,255,0.7); letter-spacing: 0.06em; flex-shrink: 0;
      }
      .jn-card__badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
      .jn-card__rr {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: #fff; font-variant-numeric: tabular-nums; margin-left: auto; flex-shrink: 0;
      }
      .jn-card__chevron {
        font-size: 10px; color: rgba(255,255,255,0.22); flex-shrink: 0;
        transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
      }
      .jn-card[data-expanded="true"] .jn-card__chevron { transform: rotate(180deg); }

      /* Badges */
      .jn-badge {
        display: inline-block; padding: 3px 8px; border-radius: 4px;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; border: 1px solid transparent;
      }
      .jn-badge--win   { background: #00ff88; color: #001a00; }
      .jn-badge--loss  { background: #ff4444; color: #fff; }
      .jn-badge--be    { background: rgba(255,255,255,0.18); color: #fff; }
      .jn-badge--long  { background: rgba(0,212,255,0.12); color: #00d4ff; border-color: rgba(0,212,255,0.35); }
      .jn-badge--short { background: rgba(255,140,0,0.12); color: #ff8c00; border-color: rgba(255,140,0,0.35); }
      .jn-badge--acct  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.1); font-weight: 400; }

      /* Expanded content */
      .jn-card__expand {
        max-height: 0; overflow: hidden;
        transition: max-height 0.38s cubic-bezier(0.22,1,0.36,1);
        border-top: 0 solid rgba(0,212,255,0.1);
      }
      .jn-card[data-expanded="true"] .jn-card__expand { max-height: 700px; border-top-width: 1px; }
      .jn-expand-inner { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .jn-detail { display: flex; flex-direction: column; gap: 3px; }
      .jn-detail__label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: #00d4ff;
      }
      .jn-detail__value {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.65); line-height: 1.5;
      }
      .jn-detail__notes {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.5); line-height: 1.65; white-space: pre-wrap;
        word-break: break-word; margin: 0;
      }
      .jn-ask-btn {
        align-self: flex-start; padding: 8px 16px; border-radius: 6px;
        border: 1px solid rgba(0,212,255,0.35); background: rgba(0,212,255,0.06);
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
        cursor: pointer; transition: background 0.2s, border-color 0.2s;
      }
      .jn-ask-btn:hover { background: rgba(0,212,255,0.14); border-color: #00d4ff; }

      /* Load more */
      .jn-load-more-wrap { display: flex; justify-content: center; margin-top: 24px; }
      .jn-load-more {
        padding: 10px 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
        background: transparent; color: rgba(255,255,255,0.35);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .jn-load-more:hover { border-color: rgba(0,212,255,0.4); color: #00d4ff; }
      .jn-load-more:disabled { opacity: 0.3; cursor: not-allowed; }
      .jn-load-more.hidden { display: none; }

      /* State messages */
      .jn-state {
        padding: 48px 0; text-align: center;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.22);
      }

      /* Responsive */
      @media (max-width: 640px) {
        .jn-page { padding: 68px 14px 90px; }
        .jn-header { flex-direction: column; gap: 12px; align-items: stretch; }
        .jn-log-btn { width: 100%; text-align: center; }
        .jn-card__rr { margin-left: 0; }
        .jn-title { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════ NAV BAR ═══════════════════ -->
    <nav class="jv-nav" aria-label="Main navigation">
      <a class="jv-nav__brand" href="/index.html">JARVIS</a>
      <ul class="jv-nav__links" role="list">
        <li><a href="/index.html" id="nav-home">Home</a></li>
        <li><a href="/journal.html" id="nav-journal" class="jv-nav--active" aria-current="page">Journal</a></li>
        <li><a href="/analytics.html" id="nav-analytics">Analytics</a></li>
        <li><a href="/history.html" id="nav-history">History</a></li>
        <li><a href="/calendar.html" id="nav-calendar">Calendar</a></li>
      </ul>
      <span class="jv-nav__user" id="jv-nav-user" aria-label="Current user"></span>
      <button class="jv-nav__hamburger" id="jv-nav-hamburger" aria-label="Toggle navigation"
              aria-expanded="false" aria-controls="jv-nav-dropdown">
        <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
      </button>
    </nav>

    <div class="jv-nav__dropdown" id="jv-nav-dropdown" aria-hidden="true">
      <a href="/index.html">Home</a>
      <a href="/journal.html" class="jv-nav--active" aria-current="page">Journal</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/history.html">History</a>
      <a href="/calendar.html">Calendar</a>
    </div>

    <script>
      (function () {
        var user = localStorage.getItem('jarvis_user') || localStorage.getItem('user_id');
        if (user) document.getElementById('jv-nav-user').textContent = user;
        var btn = document.getElementById('jv-nav-hamburger');
        var dd  = document.getElementById('jv-nav-dropdown');
        btn.addEventListener('click', function () {
          var open = dd.classList.toggle('jv-nav--open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
          dd.setAttribute('aria-hidden', open ? 'false' : 'true');
        });
        document.addEventListener('click', function (e) {
          if (!btn.contains(e.target) && !dd.contains(e.target)) {
            dd.classList.remove('jv-nav--open');
            btn.setAttribute('aria-expanded', 'false');
            dd.setAttribute('aria-hidden', 'true');
          }
        });
      })();
    </script>
    <!-- ═══════════════════ END NAV BAR ═══════════════════ -->

    <!-- Particle field -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <!-- ═══════════════════ JOURNAL PAGE ═══════════════════ -->
    <main class="jn-page">
      <header class="jn-header">
        <div class="jn-header__left">
          <h1 class="jn-title">JOURNAL</h1>
          <p class="jn-subtitle">Every trade. Every lesson.</p>
          <div class="jn-week-pills">
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-total">—</span>
              <span class="jn-stat-label">Trades this week</span>
            </div>
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-winrate">—</span>
              <span class="jn-stat-label">Win rate this week</span>
            </div>
            <div class="jn-stat-pill">
              <span class="jn-stat-value" id="pill-netr">—</span>
              <span class="jn-stat-label">Total R this week</span>
            </div>
          </div>
        </div>
        <button class="jn-log-btn" id="jn-log-btn" type="button">LOG TRADE +</button>
      </header>

      <div class="jn-filters" id="jn-filters">
        <div class="jn-filter-row" id="filter-outcome">
          <span class="jn-filter-label">Outcome</span>
          <button class="jn-filter-pill active" data-group="outcome" data-value="all">All</button>
          <button class="jn-filter-pill" data-group="outcome" data-value="win">Win</button>
          <button class="jn-filter-pill" data-group="outcome" data-value="loss">Loss</button>
          <button class="jn-filter-pill" data-group="outcome" data-value="be">BE</button>
        </div>
        <div class="jn-filter-row" id="filter-pair">
          <span class="jn-filter-label">Pair</span>
          <button class="jn-filter-pill active" data-group="pair" data-value="all">All</button>
        </div>
        <div class="jn-filter-row" id="filter-account">
          <span class="jn-filter-label">Account</span>
          <button class="jn-filter-pill active" data-group="account" data-value="all">All</button>
        </div>
      </div>

      <div class="jn-list" id="jn-list">
        <div class="jn-state" id="jn-loading">Loading trades…</div>
      </div>

      <div class="jn-load-more-wrap">
        <button class="jn-load-more hidden" id="jn-load-more" type="button">Load more</button>
      </div>
    </main>

    <script>
    (function () {
      'use strict';

      /* ── Constants ── */
      const PAGE_SIZE = 20;
      const CORE_FIELDS = new Set(['date','session','outcome','rr','pair','account']);

      /* ── State ── */
      let currentUserId = null;
      let allTrades     = [];
      let filteredTrades = [];
      let displayedCount = 0;
      let activeFilters  = { outcome: 'all', pair: 'all', account: 'all' };

      /* ── Helpers ── */
      function getField(obj) {
        for (var i = 1; i < arguments.length; i++) {
          var v = obj[arguments[i]];
          if (v !== undefined && v !== null && v !== '') return v;
        }
        return '';
      }

      function normalizeOutcome(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'win'  || v === 'w') return 'win';
        if (v === 'loss' || v === 'l') return 'loss';
        if (v === 'be'   || v === 'breakeven' || v === 'break even' || v === 'break-even') return 'be';
        return v;
      }

      function normalizeDirection(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'long'  || v === 'buy'  || v === 'bull') return 'long';
        if (v === 'short' || v === 'sell' || v === 'bear') return 'short';
        return null;
      }

      function tradeDate(t) {
        return new Date(getField(t, 'date', 'traded_at', 'Date') || '');
      }

      function formatDateShort(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleDateString('en-AU', {
            timeZone: 'Australia/Adelaide', day: 'numeric', month: 'short', year: 'numeric'
          });
        } catch (e) { return d.toDateString(); }
      }

      function formatDateFull(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleString('en-AU', {
            timeZone: 'Australia/Adelaide', weekday: 'long',
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
          });
        } catch (e) { return d.toString(); }
      }

      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function readApiError(data) {
        if (!data || typeof data !== 'object') return '';
        var e = data.error;
        if (typeof e === 'string') return e;
        if (e && typeof e.message === 'string') return e.message;
        return '';
      }

      /* ── Particle system (adapted from app.js — no orb dependency) ── */
      var PARTICLE_COUNT = 380;
      var particles = [];
      var particleMode = 'idle';

      function Particle() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this._reset();
      }

      Particle.prototype._reset = function () {
        var speed = Math.random() * 0.3 + 0.04;
        var angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 0.7 + 0.2;
        this.baseAlpha = Math.random() * 0.45 + 0.08;
        this.alpha = this.baseAlpha;
        this.twinkle = Math.random() * Math.PI * 2;
        var r = Math.random();
        if (r < 0.65)      { this.cr = 0;   this.cg = 191; this.cb = 255; }
        else if (r < 0.93) { this.cr = 192; this.cg = 192; this.cb = 192; }
        else {
          this.cr = 255; this.cg = 255; this.cb = 255;
          this.size = Math.random() * 1.0 + 0.2;
          this.baseAlpha = Math.random() * 0.6 + 0.2;
        }
      };

      Particle.prototype.update = function () {
        this.twinkle += 0.018;
        this.vx *= 0.998; this.vy *= 0.998;
        this.vx += (Math.random() - 0.5) * 0.004;
        this.vy += (Math.random() - 0.5) * 0.004;
        this.alpha = this.baseAlpha * (0.72 + 0.28 * Math.sin(this.twinkle));
        this.x += this.vx; this.y += this.vy;
        var W = window.innerWidth, H = window.innerHeight;
        if (this.x < -20) this.x = W + 20;
        if (this.x > W + 20) this.x = -20;
        if (this.y < -20) this.y = H + 20;
        if (this.y > H + 20) this.y = -20;
      };

      Particle.prototype.draw = function (ctx) {
        var a = Math.max(0, Math.min(1, this.alpha));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + this.cr + ',' + this.cg + ',' + this.cb + ',' + a + ')';
        ctx.fill();
      };

      function initParticles() {
        var canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        (function loop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (var j = 0; j < particles.length; j++) { particles[j].update(); particles[j].draw(ctx); }
          requestAnimationFrame(loop);
        })();
      }

      /* ── Login gate (same pattern as app.js) ── */
      function ensureUserId() {
        return new Promise(function (resolve) {
          var existing = localStorage.getItem('user_id');
          if (existing && existing.trim()) {
            currentUserId = existing.trim();
            var navUser = document.getElementById('jv-nav-user');
            if (navUser) navUser.textContent = currentUserId;
            resolve(currentUserId);
            return;
          }

          var style = document.createElement('style');
          style.textContent = [
            '.jn-login-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:grid;place-items:center;z-index:9999}',
            '.jn-login-card{width:min(420px,calc(100vw - 48px));background:rgba(0,10,20,0.92);border:1px solid rgba(0,191,255,0.2);border-radius:16px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,0.7);color:rgba(255,255,255,0.92);font-family:system-ui,sans-serif;backdrop-filter:blur(20px)}',
            '.jn-login-title{margin:0 0 14px;font-size:15px;letter-spacing:0.1em;color:#00BFFF;font-family:"Share Tech Mono","Courier New",monospace;text-transform:uppercase}',
            '.jn-login-input{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid rgba(0,191,255,0.25);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.92);padding:12px 14px;outline:none;font-family:"Share Tech Mono","Courier New",monospace}',
            '.jn-login-input:focus{border-color:rgba(0,191,255,0.6)}',
            '.jn-login-btn{margin-top:12px;width:100%;border-radius:10px;border:1px solid #00BFFF;background:rgba(0,191,255,0.12);color:#00BFFF;padding:12px;cursor:pointer;font-family:"Share Tech Mono","Courier New",monospace;letter-spacing:0.08em}',
            '.jn-login-btn:hover{background:rgba(0,191,255,0.22)}'
          ].join('');
          document.head.appendChild(style);

          var overlay = document.createElement('div');
          overlay.className = 'jn-login-overlay';
          overlay.innerHTML = [
            '<div class="jn-login-card">',
            '<h2 class="jn-login-title">Login</h2>',
            '<input class="jn-login-input" id="jn-login-input" placeholder="Enter your email" autocomplete="email" inputmode="email">',
            '<button class="jn-login-btn" id="jn-login-btn" type="button">Continue</button>',
            '</div>'
          ].join('');
          document.body.appendChild(overlay);

          function submit() {
            var email = (document.getElementById('jn-login-input').value || '').trim() || 'aidenpasque11@gmail.com';
            currentUserId = email;
            localStorage.setItem('user_id', email);
            localStorage.setItem('jarvis_user', email);
            var navUser = document.getElementById('jv-nav-user');
            if (navUser) navUser.textContent = email;
            overlay.remove(); style.remove();
            resolve(email);
          }
          document.getElementById('jn-login-btn').addEventListener('click', submit);
          document.getElementById('jn-login-input').addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
          document.getElementById('jn-login-input').focus();
        });
      }

      /* ── Data fetching ── */
      async function fetchAllTrades() {
        var userId = currentUserId || 'aidenpasque11@gmail.com';

        var [tradesRes, journalRes] = await Promise.allSettled([
          fetch('/api/trades?user_id=eq.' + encodeURIComponent(userId)).then(function (r) { return r.json(); }),
          fetch('/api/journal-trades?user_id=eq.' + encodeURIComponent(userId)).then(function (r) { return r.json(); })
        ]);

        var merged = [];

        if (tradesRes.status === 'fulfilled') {
          var data = tradesRes.value;
          var recs = Array.isArray(data.records) ? data.records : (Array.isArray(data) ? data : []);
          merged = merged.concat(recs);
        }

        if (journalRes.status === 'fulfilled' && Array.isArray(journalRes.value)) {
          merged = merged.concat(journalRes.value);
        }

        merged.sort(function (a, b) {
          return tradeDate(b) - tradeDate(a);
        });

        return merged;
      }

      /* ── Weekly stats ── */
      function getWeekStart() {
        var now = new Date();
        var day = now.getUTCDay();
        var daysToMon = day === 0 ? 6 : day - 1;
        var mon = new Date(now);
        mon.setUTCDate(now.getUTCDate() - daysToMon);
        mon.setUTCHours(0, 0, 0, 0);
        return mon;
      }

      function computeWeeklyStats(trades) {
        var weekStart = getWeekStart();
        var weekTrades = trades.filter(function (t) {
          var d = tradeDate(t);
          return !isNaN(d) && d >= weekStart;
        });

        var total = weekTrades.length;
        var wins = 0, losses = 0, netR = 0;

        weekTrades.forEach(function (t) {
          var outcome = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var rr = parseFloat(getField(t, 'rr', 'RR')) || 0;
          if (outcome === 'win')  { wins++;   netR += rr;  }
          if (outcome === 'loss') { losses++;  netR -= (rr || 1); }
        });

        return {
          total:   total,
          winRate: total > 0 ? Math.round(wins / total * 100) : null,
          netR:    total > 0 ? netR : null
        };
      }

      function renderWeeklyStats(stats) {
        var elTotal   = document.getElementById('pill-total');
        var elWinrate = document.getElementById('pill-winrate');
        var elNetR    = document.getElementById('pill-netr');
        if (elTotal)   elTotal.textContent   = stats.total;
        if (elWinrate) elWinrate.textContent  = stats.winRate == null ? '—' : stats.winRate + '%';
        if (elNetR) {
          if (stats.netR == null) {
            elNetR.textContent = '—';
          } else {
            var sign = stats.netR >= 0 ? '+' : '';
            elNetR.textContent = sign + stats.netR.toFixed(2) + 'R';
            elNetR.style.color = stats.netR >= 0 ? '#00ff88' : '#ff6b6b';
          }
        }
      }

      /* ── Filter pills ── */
      function buildFilterOptions(trades) {
        var pairs    = new Set();
        var accounts = new Set();
        trades.forEach(function (t) {
          var p = getField(t, 'pair', 'Pair', 'instrument', 'symbol');
          var a = getField(t, 'account', 'Account');
          if (p) pairs.add(p);
          if (a) accounts.add(a);
        });

        function addPills(rowId, group, values) {
          var row = document.getElementById(rowId);
          if (!row) return;
          values.forEach(function (val) {
            var btn = document.createElement('button');
            btn.className = 'jn-filter-pill';
            btn.dataset.group = group;
            btn.dataset.value = val.toLowerCase();
            btn.textContent = val;
            row.appendChild(btn);
          });
        }

        addPills('filter-pair',    'pair',    Array.from(pairs).sort());
        addPills('filter-account', 'account', Array.from(accounts).sort());
      }

      function applyFilters() {
        filteredTrades = allTrades.filter(function (t) {
          var outcome  = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var pairRaw  = (getField(t, 'pair', 'Pair', 'instrument', 'symbol') || '').toLowerCase();
          var acctRaw  = (getField(t, 'account', 'Account') || '').toLowerCase();

          if (activeFilters.outcome !== 'all' && outcome !== activeFilters.outcome) return false;
          if (activeFilters.pair    !== 'all' && pairRaw !== activeFilters.pair)    return false;
          if (activeFilters.account !== 'all' && acctRaw !== activeFilters.account) return false;
          return true;
        });
        displayedCount = 0;
        document.getElementById('jn-list').innerHTML = '';
        renderNextPage();
      }

      /* ── Card rendering ── */
      function badgeHtml(outcome) {
        var cls = { win: 'jn-badge--win', loss: 'jn-badge--loss', be: 'jn-badge--be' }[outcome] || '';
        var label = outcome.toUpperCase() || '—';
        return '<span class="jn-badge ' + cls + '">' + esc(label) + '</span>';
      }

      function directionBadgeHtml(t) {
        var raw = getField(t, 'direction', 'Direction', 'long_short', 'side', 'trade_direction');
        if (!raw) {
          var model = String(getField(t, 'model', 'Model', 'MODEL') || '').toLowerCase();
          if (model.includes('long'))  raw = 'long';
          if (model.includes('short')) raw = 'short';
        }
        var dir = normalizeDirection(raw);
        if (!dir) return '';
        var cls = dir === 'long' ? 'jn-badge--long' : 'jn-badge--short';
        return '<span class="jn-badge ' + cls + '">' + dir.toUpperCase() + '</span>';
      }

      function renderCard(trade, idx) {
        var outcome   = normalizeOutcome(getField(trade, 'outcome', 'Outcome', 'OUTCOME'));
        var pair      = getField(trade, 'pair', 'Pair', 'instrument', 'symbol') || '—';
        var account   = getField(trade, 'account', 'Account') || '';
        var rrRaw     = parseFloat(getField(trade, 'rr', 'RR'));
        var rrDisplay = isNaN(rrRaw) ? '—' : rrRaw.toFixed(2) + 'R';
        var model     = getField(trade, 'model', 'Model', 'MODEL') || '—';
        var notes     = getField(trade, 'notes', 'Notes', 'NOTE') || '';
        var dateShort = formatDateShort(trade);
        var dateFull  = formatDateFull(trade);

        var acctBadge = account ? '<span class="jn-badge jn-badge--acct">' + esc(account) + '</span>' : '';

        return [
          '<article class="jn-card" data-expanded="false" data-idx="' + idx + '">',
          '  <div class="jn-card__top">',
          '    <span class="jn-card__date">' + esc(dateShort) + '</span>',
          '    <span class="jn-card__pair">' + esc(pair) + '</span>',
          '    <div class="jn-card__badges">',
          '      ' + badgeHtml(outcome),
          '      ' + directionBadgeHtml(trade),
          '      ' + acctBadge,
          '    </div>',
          '    <span class="jn-card__rr">' + esc(rrDisplay) + '</span>',
          '    <span class="jn-card__chevron">&#9660;</span>',
          '  </div>',
          '  <div class="jn-card__expand">',
          '    <div class="jn-expand-inner">',
          '      <div class="jn-detail">',
          '        <span class="jn-detail__label">Entry Model</span>',
          '        <span class="jn-detail__value">' + esc(model) + '</span>',
          '      </div>',
          '      <div class="jn-detail">',
          '        <span class="jn-detail__label">Date &amp; Time</span>',
          '        <span class="jn-detail__value">' + esc(dateFull) + '</span>',
          '      </div>',
          notes ? [
            '      <div class="jn-detail">',
            '        <span class="jn-detail__label">Notes</span>',
            '        <p class="jn-detail__notes">' + esc(notes) + '</p>',
            '      </div>'
          ].join('') : '',
          '      <button class="jn-ask-btn" data-idx="' + idx + '" type="button">Ask Jarvis about this trade</button>',
          '    </div>',
          '  </div>',
          '</article>'
        ].join('');
      }

      function renderNextPage() {
        var list  = document.getElementById('jn-list');
        var btn   = document.getElementById('jn-load-more');

        if (filteredTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades match the current filters.</div>';
          btn.classList.add('hidden');
          return;
        }

        var from  = displayedCount;
        var to    = Math.min(from + PAGE_SIZE, filteredTrades.length);
        var frag  = '';

        for (var i = from; i < to; i++) {
          frag += renderCard(filteredTrades[i], i);
        }

        list.insertAdjacentHTML('beforeend', frag);
        displayedCount = to;

        if (displayedCount >= filteredTrades.length) {
          btn.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
          btn.disabled = false;
        }
      }

      /* ── Card interaction via event delegation ── */
      document.getElementById('jn-list').addEventListener('click', function (e) {
        var askBtn = e.target.closest('.jn-ask-btn');
        if (askBtn) {
          e.stopPropagation();
          var idx   = parseInt(askBtn.dataset.idx, 10);
          var trade = filteredTrades[idx];
          if (trade) askJarvisAboutTrade(trade);
          return;
        }

        var card = e.target.closest('.jn-card');
        if (card) {
          card.dataset.expanded = card.dataset.expanded === 'true' ? 'false' : 'true';
        }
      });

      function askJarvisAboutTrade(trade) {
        var outcome  = getField(trade, 'outcome', 'Outcome') || '';
        var pair     = getField(trade, 'pair', 'Pair') || '';
        var session  = getField(trade, 'session', 'Session') || '';
        var rrRaw    = parseFloat(getField(trade, 'rr', 'RR'));
        var rrStr    = isNaN(rrRaw) ? '' : rrRaw.toFixed(2) + 'R';
        var dateStr  = formatDateFull(trade);
        var msg = ['Tell me about this trade:',
          pair, outcome, session, rrStr, 'on', dateStr
        ].filter(Boolean).join(' ');
        sessionStorage.setItem('jarvis_pending_message', msg);
        window.location.href = '/index.html';
      }

      /* ── Filter pill interaction ── */
      document.getElementById('jn-filters').addEventListener('click', function (e) {
        var pill = e.target.closest('.jn-filter-pill');
        if (!pill) return;
        var group = pill.dataset.group;
        var value = pill.dataset.value;

        var row = pill.closest('.jn-filter-row');
        row.querySelectorAll('.jn-filter-pill').forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');

        activeFilters[group] = value;
        applyFilters();
      });

      /* ── Load more ── */
      document.getElementById('jn-load-more').addEventListener('click', function () {
        this.disabled = true;
        renderNextPage();
      });

      /* ── LOG TRADE modal (adapted from app.js) ── */
      var tradeFormOpen = false;

      function escHtml(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function renderCustomField(f) {
        var id    = 'tf-' + f.field_name.toLowerCase().replace(/\s+/g,'-');
        var label = escHtml(f.field_name);
        var req   = f.is_required ? 'required' : '';
        var name  = escHtml(f.field_name);

        if (f.field_type === 'dropdown' || f.field_type === 'multiselect') {
          var opts = [];
          try { opts = JSON.parse(f.field_options || '[]'); } catch(e){}
          var multiple = f.field_type === 'multiselect' ? 'multiple' : '';
          var optsHtml = opts.map(function(o){ return '<option value="'+escHtml(o)+'">'+escHtml(o)+'</option>'; }).join('');
          return '<div class="trade-field trade-field--full"><label class="trade-label" for="'+id+'">'+label+'</label><select id="'+id+'" name="'+name+'" class="trade-input" data-custom="1" '+multiple+' '+req+'><option value="">— select —</option>'+optsHtml+'</select></div>';
        }
        if (f.field_type === 'number') {
          return '<div class="trade-field"><label class="trade-label" for="'+id+'">'+label+'</label><input id="'+id+'" type="number" name="'+name+'" class="trade-input" data-custom="1" step="0.01" '+req+'></div>';
        }
        return '<div class="trade-field trade-field--full"><label class="trade-label" for="'+id+'">'+label+'</label><textarea id="'+id+'" name="'+name+'" class="trade-input" data-custom="1" rows="3" '+req+'></textarea></div>';
      }

      async function openTradeForm() {
        if (tradeFormOpen) return;
        tradeFormOpen = true;

        var userId = currentUserId || localStorage.getItem('user_id') || 'aidenpasque11@gmail.com';
        var customFields = [];
        try {
          var r    = await fetch('/api/journal-fields?user_id=' + encodeURIComponent(userId));
          var data = await r.json().catch(function(){ return {}; });
          var all  = Array.isArray(data.fields) ? data.fields : [];
          customFields = all.filter(function(f){ return !CORE_FIELDS.has(f.field_name.toLowerCase()); });
        } catch(e){}

        var today     = new Date().toISOString().slice(0,10);
        var customHtml = customFields.map(renderCustomField).join('');

        var overlay = document.createElement('div');
        overlay.className = 'trade-form-overlay';
        overlay.setAttribute('role','dialog');
        overlay.setAttribute('aria-modal','true');
        overlay.innerHTML = [
          '<div class="trade-form-panel" id="trade-form-panel">',
          '  <div class="trade-form-header">',
          '    <span class="trade-form-title">LOG TRADE</span>',
          '    <button type="button" class="trade-form-close" aria-label="Close">&#x2715;</button>',
          '  </div>',
          '  <div class="trade-form-body">',
          '    <form id="trade-log-form" autocomplete="off" novalidate>',
          '      <div class="trade-form-grid">',
          '        <div class="trade-field"><label class="trade-label" for="tf-date">Date</label><input id="tf-date" type="date" name="date" class="trade-input" value="'+escHtml(today)+'" required></div>',
          '        <div class="trade-field"><label class="trade-label" for="tf-pair">Pair</label><input id="tf-pair" type="text" name="pair" class="trade-input" placeholder="e.g. XAUUSD"></div>',
          '        <div class="trade-field"><label class="trade-label" for="tf-session">Session</label>',
          '          <select id="tf-session" name="session" class="trade-input" required>',
          '            <option value="">— select —</option>',
          '            <option value="Asia">Asia</option>',
          '            <option value="London">London</option>',
          '            <option value="New York">New York</option>',
          '            <option value="London/New York">London/New York</option>',
          '          </select>',
          '        </div>',
          '        <div class="trade-field"><label class="trade-label" for="tf-outcome">Outcome</label>',
          '          <select id="tf-outcome" name="outcome" class="trade-input" required>',
          '            <option value="">— select —</option>',
          '            <option value="Win">Win</option>',
          '            <option value="Loss">Loss</option>',
          '            <option value="BE">BE</option>',
          '          </select>',
          '        </div>',
          '        <div class="trade-field" id="tf-rr-field"><label class="trade-label" for="tf-rr">RR</label><input id="tf-rr" type="number" name="rr" class="trade-input" step="0.01" min="0" placeholder="e.g. 2.5"></div>',
          '        <div class="trade-field"><label class="trade-label" for="tf-account">Account</label><input id="tf-account" type="text" name="account" class="trade-input" placeholder="e.g. Main"></div>',
          '        ' + customHtml,
          '      </div>',
          '      <div class="trade-form-actions">',
          '        <button type="submit" class="trade-submit-btn">SAVE TRADE</button>',
          '      </div>',
          '    </form>',
          '  </div>',
          '</div>'
        ].join('');

        document.body.appendChild(overlay);
        requestAnimationFrame(function () {
          overlay.classList.add('trade-form-overlay--visible');
          var panel = document.getElementById('trade-form-panel');
          if (panel) panel.classList.add('trade-form-panel--visible');
        });

        function closeForm() {
          overlay.classList.remove('trade-form-overlay--visible');
          var panel = document.getElementById('trade-form-panel');
          if (panel) panel.classList.remove('trade-form-panel--visible');
          overlay.addEventListener('transitionend', function () {
            overlay.remove();
            tradeFormOpen = false;
          }, { once: true });
        }

        overlay.addEventListener('click', function (e) { if (e.target === overlay) closeForm(); });
        overlay.querySelector('.trade-form-close').addEventListener('click', closeForm);

        var outcomeSelect = document.getElementById('tf-outcome');
        var rrField       = document.getElementById('tf-rr-field');
        outcomeSelect && outcomeSelect.addEventListener('change', function () {
          if (rrField) rrField.style.display = outcomeSelect.value === 'BE' ? 'none' : '';
        });

        var form = document.getElementById('trade-log-form');
        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          await submitTradeForm(form, customFields, closeForm);
        });

        var dateInput = document.getElementById('tf-date');
        if (dateInput) dateInput.focus();
      }

      async function submitTradeForm(form, customFields, closeForm) {
        var fd      = new FormData(form);
        var userId  = currentUserId || localStorage.getItem('user_id') || 'aidenpasque11@gmail.com';
        var dateVal = fd.get('date') || '';
        var pair    = (fd.get('pair') || '').trim();
        var session = fd.get('session') || '';
        var outcome = fd.get('outcome') || '';
        var rrRaw   = fd.get('rr');
        var rr      = (rrRaw !== '' && rrRaw !== null) ? Number(rrRaw) : null;
        var account = (fd.get('account') || '').trim();

        if (!dateVal || !session || !outcome) {
          showToast('Date, Session and Outcome are required.', true);
          return;
        }

        var custom_data = {};
        customFields.forEach(function(f) {
          var val = fd.get(f.field_name);
          if (val !== null && String(val).trim() !== '') custom_data[f.field_name] = val;
        });

        var submitBtn = form.querySelector('.trade-submit-btn');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }

        try {
          var res = await fetch('/api/log-trade', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              user_id: userId,
              traded_at: dateVal + 'T00:00:00.000Z',
              pair: pair || null,
              outcome: outcome,
              rr: (rr !== null && !isNaN(rr)) ? rr : null,
              session: session,
              account: account || null,
              custom_data: custom_data
            })
          });

          if (!res.ok) {
            var d = await res.json().catch(function(){ return {}; });
            throw new Error(readApiError(d) || 'Save failed (' + res.status + ')');
          }

          closeForm();
          showToast('Trade logged.');
          refreshJournalData();
        } catch(e) {
          var msg = e instanceof Error ? e.message : 'Save failed.';
          showToast(msg, true);
          if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'SAVE TRADE'; }
        }
      }

      function showToast(message, isError) {
        var existing = document.getElementById('jn-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.id = 'jn-toast';
        toast.className = 'trade-toast' + (isError ? ' trade-toast--error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        requestAnimationFrame(function () { toast.classList.add('trade-toast--visible'); });
        setTimeout(function () {
          toast.classList.remove('trade-toast--visible');
          toast.addEventListener('transitionend', function () { toast.remove(); }, { once: true });
        }, 3000);
      }

      /* ── Refresh after logging a new trade ── */
      async function refreshJournalData() {
        try {
          allTrades = await fetchAllTrades();
          var stats = computeWeeklyStats(allTrades);
          renderWeeklyStats(stats);
          buildFilterOptions(allTrades);
          applyFilters();
        } catch(e) { /* silent — existing list remains */ }
      }

      /* ── Boot ── */
      document.getElementById('jn-log-btn').addEventListener('click', openTradeForm);

      async function boot() {
        initParticles();
        await ensureUserId();

        var list = document.getElementById('jn-list');
        list.innerHTML = '<div class="jn-state" id="jn-loading">Loading trades…</div>';

        try {
          allTrades = await fetchAllTrades();
        } catch(e) {
          list.innerHTML = '<div class="jn-state">Failed to load trades. Check your connection.</div>';
          return;
        }

        if (allTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades found. Log your first trade above.</div>';
          return;
        }

        var stats = computeWeeklyStats(allTrades);
        renderWeeklyStats(stats);
        buildFilterOptions(allTrades);
        filteredTrades = allTrades.slice();
        list.innerHTML = '';
        renderNextPage();
      }

      boot();
    })();
    </script>
  </body>
