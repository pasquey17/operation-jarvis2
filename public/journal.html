<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>JOURNAL · JARVIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* ── Unlock scroll ── */
      html, body {
        overflow: auto !important;
        height: auto !important;
        min-height: 100dvh !important;
      }

      /* ═══════════ NAV BAR ═══════════ */
      .jv-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        z-index: 1000; background: rgba(0,0,0,0.85);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0,212,255,0.2);
        display: flex; align-items: center; padding: 0 24px; gap: 0;
      }
      .jv-nav__brand {
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
        white-space: nowrap; flex-shrink: 0; text-decoration: none;
      }
      .jv-nav__links {
        display: flex; align-items: center; gap: 32px; list-style: none;
        margin: 0 auto; padding: 0;
      }
      .jv-nav__links a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 11px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding-bottom: 2px; border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__links a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__links a.jv-nav--active,
      .jv-nav__links a[aria-current="page"] { color: #00d4ff; border-bottom: 1px solid #00d4ff; }
      .jv-nav__user {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        color: rgba(255,255,255,0.3); letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
      }
      .jv-nav__logout {
        margin-left: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.25);
        background: rgba(0, 212, 255, 0.06);
        color: rgba(0, 212, 255, 0.85);
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .jv-nav__logout:hover {
        background: rgba(0, 212, 255, 0.14);
        border-color: rgba(0, 212, 255, 0.55);
      }
      .jv-nav__hamburger {
        display: none; flex-direction: column; justify-content: center; gap: 5px;
        background: none; border: none; cursor: pointer; padding: 4px;
        margin-left: auto; flex-shrink: 0;
      }
      .jv-nav__hamburger span {
        display: block; width: 20px; height: 1.5px;
        background: rgba(255,255,255,0.6); border-radius: 2px; transition: background 0.2s;
      }
      .jv-nav__hamburger:hover span { background: #00d4ff; }
      .jv-nav__dropdown {
        display: none; position: fixed; top: 52px; left: 0; right: 0;
        background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,212,255,0.15);
        z-index: 999; flex-direction: column; padding: 8px 0;
      }
      .jv-nav__dropdown.jv-nav--open { display: flex; }
      .jv-nav__dropdown a {
        color: rgba(255,255,255,0.5); text-decoration: none;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        font-variant: small-caps; letter-spacing: 0.12em; text-transform: uppercase;
        padding: 12px 24px; border-left: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__dropdown a:hover { color: rgba(255,255,255,0.85); }
      .jv-nav__dropdown a.jv-nav--active,
      .jv-nav__dropdown a[aria-current="page"] { color: #00d4ff; border-left-color: #00d4ff; }
      @media (max-width: 768px) {
        .jv-nav__links, .jv-nav__user { display: none; }
        .jv-nav__hamburger { display: flex; }
        .jv-nav__brand { font-size: 13px; }
      }

      /* ═══════════ Journal page layout ═══════════ */
      .jn-page {
        position: relative; z-index: 1; min-height: 100dvh;
        padding: 72px 20px 100px;
        max-width: min(1580px, 100%);
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }

      /* ── Header ── */
      .jn-header {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 16px; margin-bottom: 32px; padding-top: 16px;
      }
      .jn-header__left { flex: 1; min-width: 0; }
      .jn-title {
        margin: 0 0 4px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: clamp(1.5rem,4vw,2.1rem); color: #00d4ff;
        letter-spacing: 0.24em; text-transform: uppercase;
        text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 70px rgba(0,212,255,0.18);
      }
      .jn-subtitle {
        margin: 0 0 20px; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      /* ── Stat pills — bigger ── */
      .jn-week-pills { display: flex; flex-wrap: wrap; gap: 10px; }
      .jn-stat-pill {
        padding: 14px 20px; border-radius: 8px;
        border: 1px solid rgba(0,212,255,0.15); background: rgba(0,212,255,0.04);
        min-width: 110px;
      }
      .jn-stat-value {
        display: block; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 22px; color: #fff; font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em; line-height: 1.15;
      }
      .jn-stat-label {
        display: block; font-size: 9px; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(255,255,255,0.28); margin-top: 4px;
      }

      .jn-log-btn {
        flex-shrink: 0; padding: 10px 18px; border-radius: 6px;
        border: 1px solid #00d4ff; background: rgba(0,212,255,0.08);
        color: #00d4ff; font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; cursor: pointer; white-space: nowrap;
        transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .jn-log-btn:hover {
        background: rgba(0,212,255,0.18); box-shadow: 0 0 24px rgba(0,212,255,0.25);
        transform: translateY(-1px);
      }
      .jn-log-btn:active { transform: translateY(0); }

      /* ── Header actions (FILTER + LOG TRADE buttons) ── */
      .jn-header__actions {
        display: flex; flex-direction: column; gap: 8px;
        align-items: flex-end; flex-shrink: 0;
      }

      /* ── FILTER + toggle button ── */
      .jn-filter-toggle {
        position: relative; padding: 10px 18px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.5); font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        cursor: pointer; white-space: nowrap;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .jn-filter-toggle:hover { border-color: rgba(0,212,255,0.4); color: rgba(255,255,255,0.85); }
      .jn-filter-toggle.jn-filter-toggle--open {
        border-color: rgba(0,212,255,0.5); color: #00d4ff; background: rgba(0,212,255,0.06);
      }
      .jn-filter-dot {
        display: none; position: absolute; top: 7px; right: 7px;
        width: 6px; height: 6px; border-radius: 50%; background: #00d4ff;
        box-shadow: 0 0 6px rgba(0,212,255,0.7);
      }
      .jn-filter-dot--visible { display: block; }

      /* ── Collapsible filter panel (grid clip — smoother than fixed max-height) ── */
      .jn-filter-panel {
        display: grid;
        grid-template-rows: 0fr;
        margin-bottom: 0;
        transition: grid-template-rows 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          margin-bottom 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .jn-filter-panel--open {
        grid-template-rows: 1fr;
        margin-bottom: 22px;
      }
      .jn-filter-panel-inner {
        min-height: 0;
        overflow: hidden;
        padding: 20px 22px 18px;
        background: linear-gradient(
          165deg,
          rgba(0, 212, 255, 0.06) 0%,
          rgba(0, 0, 0, 0.45) 100%
        );
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 12px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 16px 48px rgba(0, 0, 0, 0.35);
      }

      /* ── Filter grid — 3 columns ── */
      .jn-filter-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 24px;
      }
      .jn-filter-row {
        display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
      }
      /* Period + model span full width so pills wrap cleanly */
      #filter-period,
      #filter-model { grid-column: 1 / -1; }
      #filter-model .jn-filter-pill { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .jn-filter-label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.28);
      }
      .jn-filter-pills { display: flex; flex-wrap: wrap; gap: 5px; }
      .jn-filter-pill {
        padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
        background: transparent; color: rgba(255,255,255,0.35);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .jn-filter-pill:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
      .jn-filter-pill.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.08); }

      /* ── Panel footer (CLEAR ALL) ── */
      .jn-filter-panel-foot {
        display: flex; justify-content: flex-end;
        margin-top: 16px; padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .jn-filter-clear-btn {
        background: none; border: none; color: rgba(255,255,255,0.3);
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 10px;
        letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; padding: 2px 0;
        transition: color 0.2s;
      }
      .jn-filter-clear-btn:hover { color: #00d4ff; }

      /* ── Trade list (Notion gallery–style grid) ── */
      .jn-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
        gap: 10px 11px;
        align-items: start;
      }

      /* ── Card ── */
      .jn-card {
        position: relative;
        border-radius: 10px;
        border: 1px solid rgba(0, 212, 255, 0.12);
        border-left: 4px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.4);
        overflow: hidden;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition:
          border-color 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          background 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 12px 32px rgba(0, 0, 0, 0.32);
        width: 100%;
        min-width: 0;
      }
      .jn-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          ellipse 120% 80% at 100% 0%,
          rgba(0, 212, 255, 0.08),
          transparent 55%
        );
        transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .jn-card:hover {
        background: rgba(0, 212, 255, 0.06);
        border-color: rgba(0, 212, 255, 0.22);
        transform: translateY(-2px);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.06) inset,
          0 20px 48px rgba(0, 0, 0, 0.4),
          0 0 40px rgba(0, 191, 255, 0.08);
      }
      .jn-card:hover::after {
        opacity: 1;
      }
      .jn-card[data-outcome="win"] {
        border-left-color: #00ff88;
      }
      .jn-card[data-outcome="loss"] {
        border-left-color: #ff5050;
      }
      .jn-card[data-outcome="be"] {
        border-left-color: rgba(192, 192, 192, 0.35);
      }

      /* Gallery-style cover (Notion board): main chart on top */
      .jn-card__cover {
        position: relative;
        width: 100%;
        /* ~Notion gallery: short strip (~35–42% of compact card), not a tall hero */
        aspect-ratio: 2.35 / 1;
        max-height: 104px;
        min-height: 68px;
        background: rgba(20, 22, 26, 0.95);
        border-bottom: 1px solid rgba(0, 212, 255, 0.12);
        overflow: hidden;
        flex-shrink: 0;
        line-height: 0;
      }
      .jn-card__cover-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        pointer-events: none;
        user-select: none;
      }

      /* ── Card top row ── */
      .jn-card__top {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: 9px 11px 10px;
        min-height: 0;
        gap: 6px;
      }
      .jn-card__bands {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 6px 8px;
      }
      /* Badges / pair / model */
      .jn-card__left {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px 6px;
        flex: 1 1 100px;
        min-width: 0;
      }
      /* Account + RR + chevron */
      .jn-card__right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        margin-left: auto;
      }

      .jn-card__date {
        font-family: "Outfit", system-ui, sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.96);
        letter-spacing: 0.03em;
        line-height: 1.28;
      }
      .jn-card__pair {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        color: #fff; letter-spacing: 0.06em; flex-shrink: 0; white-space: nowrap;
      }
      .jn-card__model {
        flex-basis: 100%;
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 10px;
        color: rgba(255,255,255,0.38);
        letter-spacing: 0.04em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .jn-card__rr {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 12px;
        color: #00d4ff; font-weight: 700; font-variant-numeric: tabular-nums;
        flex-shrink: 0; white-space: nowrap;
      }
      .jn-card__chevron {
        font-size: 10px; color: rgba(255,255,255,0.18); flex-shrink: 0;
      }

      /* ── Badges ── */
      .jn-badge {
        display: inline-flex; align-items: center;
        padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        border: 1px solid transparent; white-space: nowrap;
      }
      .jn-badge--win   { background: #00ff88; color: #001a00; }
      .jn-badge--loss  { background: #ff4444; color: #fff; }
      .jn-badge--be    { background: rgba(255,255,255,0.16); color: #fff; }
      .jn-badge--long  { background: rgba(0,212,255,0.12); color: #00d4ff; border-color: rgba(0,212,255,0.35); }
      .jn-badge--short { background: rgba(255,140,0,0.12); color: #ff8c00; border-color: rgba(255,140,0,0.35); }
      .jn-badge--acct  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.38); border-color: rgba(255,255,255,0.1); font-weight: 400; font-size: 9px; }

      /* ── Trade detail pane (modal body reuses these) ── */
      .jn-expand-inner {
        padding: 13px 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: rgba(0, 0, 0, 0.25);
      }
      .jn-trade-modal .jn-expand-inner {
        background: transparent;
      }
      .jn-detail { display: flex; flex-direction: column; gap: 3px; }
      .jn-detail__label {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 9px;
        letter-spacing: 0.18em; text-transform: uppercase; color: #00d4ff;
      }
      .jn-detail__value {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.65); line-height: 1.5;
      }
      .jn-detail__notes {
        font-family: "Share Tech Mono","Courier New",monospace; font-size: 13px;
        color: rgba(255,255,255,0.5); line-height: 1.65; white-space: pre-wrap;
        word-break: break-word; margin: 0;
      }
      .jn-notion-extras {
        border: 1px solid rgba(0, 212, 255, 0.18);
        border-radius: 12px;
        padding: 12px 12px 10px;
        background: rgba(0, 191, 255, 0.05);
      }
      .jn-notion-extras__head {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #00d4ff;
        margin-bottom: 10px;
      }
      .jn-notion-extras__grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .jn-notion-row {
        display: grid;
        grid-template-columns: minmax(72px, 34%) 1fr;
        gap: 8px 12px;
        align-items: start;
      }
      .jn-notion-row__k {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(192, 192, 192, 0.85);
        word-break: break-word;
      }
      .jn-notion-row__v {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
      }
      .jn-notion-section {
        margin-bottom: 14px;
      }
      .jn-notion-section:last-child { margin-bottom: 0; }
      .jn-notion-section__title {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 8px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(0, 212, 255, 0.55);
        margin: 0 0 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid rgba(0, 212, 255, 0.12);
      }
      .jn-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        margin: 0 6px 4px 0;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.28);
        background: rgba(0, 0, 0, 0.35);
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.82);
        max-width: 100%;
        word-break: break-word;
      }
      .jn-notion-long {
        margin: 0;
        width: 100%;
      }
      .jn-notion-long__sum {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.72);
        cursor: pointer;
        list-style: none;
      }
      .jn-notion-long__sum::-webkit-details-marker { display: none; }
      .jn-notion-long__full {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0, 212, 255, 0.15);
        background: rgba(0, 0, 0, 0.4);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.78);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 240px;
        overflow-y: auto;
      }
      .jn-notion-row__v-chips { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0; max-width: 100%; }
      .jn-card__extras-preview {
        grid-column: 1 / -1;
        margin-top: 6px;
        padding-top: 8px;
        border-top: 1px solid rgba(0, 212, 255, 0.12);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .jn-card__extras-line {
        display: grid;
        grid-template-columns: minmax(52px, 32%) 1fr;
        gap: 6px 10px;
        align-items: baseline;
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 9px;
        line-height: 1.35;
      }
      .jn-card__extras-k {
        color: rgba(0, 212, 255, 0.65);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .jn-card__extras-v {
        color: rgba(192, 192, 192, 0.85);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .jn-trade-photos {
        display: flex;

      (function () {

        var logoutBtn = document.getElementById('logout-btn');

          });

        var btn = document.getElementById('jv-nav-hamburger');

          var open = dd.classList.toggle('jv-nav--open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
          dd.setAttribute('aria-hidden', open ? 'false' : 'true');
        });
        document.addEventListener('click', function (e) {
          if (!btn.contains(e.target) && !dd.contains(e.target)) {
            dd.classList.remove('jv-nav--open');
            btn.setAttribute('aria-expanded', 'false');
            dd.setAttribute('aria-hidden', 'true');

    (function () {

      let allTrades      = [];
      let filteredTrades = [];
      let displayedCount = 0;
      let activeFilters  = {
        period: 'all',

        pair: 'all',
        model: 'all',
        account: 'all',

      /* ── Helpers ── */
      function getField(obj) {
        for (var i = 1; i < arguments.length; i++) {
          var v = obj[arguments[i]];
          if (v !== undefined && v !== null && v !== '') return v;
        }
        return '';
      }

      function normalizeOutcome(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'win'  || v === 'w') return 'win';
        if (v === 'loss' || v === 'l') return 'loss';
        if (v === 'be'   || v === 'breakeven' || v === 'break even' || v === 'break-even') return 'be';
        return v;
      }

      function normalizeDirection(raw) {
        var v = String(raw || '').trim().toLowerCase();
        if (v === 'long'  || v === 'buy'  || v === 'bull') return 'long';
        if (v === 'short' || v === 'sell' || v === 'bear') return 'short';
        return null;
      }

      /* Extract direction from trade — checks explicit field then model name */
      function getTradeDirection(t) {
        var raw = getField(t, 'direction', 'Direction', 'long_short', 'side', 'trade_direction', 'POSITION TYPE', 'Position Type', 'position_type');
        if (!raw) {
          var m = String(getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '').toLowerCase();
          if (m.includes('long'))  raw = 'long';
          else if (m.includes('short')) raw = 'short';
        }
        return normalizeDirection(raw);
      }

      function tradeDate(t) {
        var raw = String(getField(t, 'date', 'traded_at', 'Date') || '').trim();
        if (!raw) return new Date(NaN);
        // "14 Nov 2026" or "21 June 2026" — rewrite to "Nov 14, 2026" which Date() parses reliably
        var dmy = raw.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
        if (dmy) {
          var attempt = new Date(dmy[2] + ' ' + dmy[1] + ', ' + dmy[3]);
          if (!isNaN(attempt.getTime())) return attempt;
        }
        // Normalise PostgreSQL "YYYY-MM-DD HH:MM:SS±ZZ" → ISO 8601 (replace space before digits/sign)
        raw = raw.replace(/(\d{4}-\d{2}-\d{2})\s+(\d)/, '$1T$2');
        return new Date(raw);
      }

      // Returns numeric ms for safe sorting; Invalid Date → -Infinity (sorts to end for "newest")
      function tradeDateMs(t) {
        var ms = tradeDate(t).getTime();
        return isNaN(ms) ? -Infinity : ms;
      }

      /** YYYY-MM-DD in Australia/Adelaide (matches journal date display). */
      function dateKeyAdelaide(d) {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        try {
          return d.toLocaleDateString('en-CA', { timeZone: 'Australia/Adelaide' });
        } catch (e) {
          return '';
        }
      }

      function addDaysToDateKey(dateKey, delta) {
        var p = dateKey.split('-').map(Number);
        if (p.length !== 3 || p.some(isNaN)) return '';
        var t = new Date(Date.UTC(p[0], p[1] - 1, p[2] + delta));
        return dateKeyAdelaide(t);
      }

      function weekdayLongAdelaide(dateKey) {
        var p = dateKey.split('-').map(Number);
        if (p.length !== 3 || p.some(isNaN)) return '';
        var t = new Date(Date.UTC(p[0], p[1] - 1, p[2], 14, 0, 0));
        try {
          return new Intl.DateTimeFormat('en-AU', {
            timeZone: 'Australia/Adelaide',
            weekday: 'long'
          }).format(t);
        } catch (e2) {
          return '';
        }
      }

      /** Monday-start week (Adelaide calendar). */
      function mondayKeyOfWeekContaining(dateKey) {
        var cur = dateKey;
        for (var i = 0; i < 7; i++) {
          if (weekdayLongAdelaide(cur) === 'Monday') return cur;
          cur = addDaysToDateKey(cur, -1);
          if (!cur) break;
        }
        return dateKey;
      }

      function tradeMatchesPeriod(t, period) {
        if (!period || period === 'all') return true;
        var d = tradeDate(t);
        var tk = dateKeyAdelaide(d);
        if (!tk) return false;
        var today = dateKeyAdelaide(new Date());
        if (!today) return true;

        if (period === 'today') return tk === today;

        if (period === 'week') {
          var mon = mondayKeyOfWeekContaining(today);
          var sun = addDaysToDateKey(mon, 6);
          return tk >= mon && tk <= sun;
        }

        if (period === 'month') return tk.slice(0, 7) === today.slice(0, 7);

        if (period === 'year') return tk.slice(0, 4) === today.slice(0, 4);

        return true;
      }

      function formatDateShort(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleDateString('en-AU', {
            timeZone: 'Australia/Adelaide', day: 'numeric', month: 'short', year: 'numeric'
          });
        } catch (e) { return d.toDateString(); }
      }

      function formatDateFull(t) {
        var d = tradeDate(t);
        if (isNaN(d)) return '—';
        try {
          return d.toLocaleString('en-AU', {
            timeZone: 'Australia/Adelaide', weekday: 'long',
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
          });
        } catch (e) { return d.toString(); }
      }

      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function truncate(s, n) {
        var str = String(s || '');
        return str.length > n ? str.slice(0, n) + '…' : str;
      }

      /** Keys already shown as core columns — hide from Notion extras (case-insensitive). */
      var EXTRAS_CORE_NAMES = {
        date: 1, session: 1, outcome: 1, rr: 1, model: 1, notes: 1, pair: 1, direction: 1, trade_images: 1,
        'entry model': 1, 'trade summary': 1, 'position type': 1
      };
      function normalizeExtraKeyName(k) {
        return String(k).toLowerCase().replace(/\s+/g, ' ').trim();
      }
      function isDuplicateExtraKey(k) {
        return !!EXTRAS_CORE_NAMES[normalizeExtraKeyName(k)];
      }
      function parseNotionExtrasFromTrade(trade) {
        if (!trade || typeof trade !== 'object') return null;
        var raw = trade.notion_extras;
        if (raw == null || raw === '') return null;
        if (typeof raw === 'object' && raw !== null && !Array.isArray(raw)) return raw;
        if (typeof raw === 'string') {
          var s = raw.trim();
          if (!s || s === '{}') return null;
          try {
            var o = JSON.parse(s);
            return typeof o === 'object' && o !== null && !Array.isArray(o) ? o : null;
          } catch (e0) {
            return null;
          }
        }
        return null;
      }
      function formatNotionExtraValue(v) {
        if (v === null || v === undefined) return '';
        if (typeof v === 'boolean') return v ? 'Yes' : 'No';
        if (typeof v === 'number' && !isNaN(v)) return String(v);
        if (typeof v === 'string') return v;
        if (Array.isArray(v)) {
          return v.map(function (x) {
            if (x !== null && typeof x === 'object') {
              try {
                return JSON.stringify(x);
              } catch (e1) {
                return '';
              }
            }
            return String(x);
          }).join(', ');
        }
        if (typeof v === 'object') {
          try {
            return JSON.stringify(v);
          } catch (e2) {
            return '';
          }
        }
        return String(v);
      }

      function notionExtraSectionBucket(key) {
        var k = normalizeExtraKeyName(key);
        if (/psychology|mindset|emotion|tilt|narrative/.test(k)) return 'psych';
        if (/htf|ltf|mtf|bias|timeframe|confluence|volume|liquidity|premarket|vp\b/.test(k)) return 'context';
        if (/execution|mistake|plan|checklist|grade/.test(k)) return 'execution';
        return 'other';
      }

      function compareExtraKeysNotion(a, b) {
        function score(k) {
          var n = normalizeExtraKeyName(k);
          if (n.indexOf('session') >= 0) return 0;
          if (n.indexOf('model') >= 0 || n.indexOf('entry') >= 0) return 1;
          if (n.indexOf('psych') >= 0 || n.indexOf('mindset') >= 0) return 2;
          if (n.indexOf('htf') >= 0 || n.indexOf('ltf') >= 0 || n.indexOf('bias') >= 0) return 3;
          return 40;
        }
        var sa = score(a);
        var sb = score(b);
        if (sa !== sb) return sa - sb;
        return String(a).localeCompare(String(b));
      }

      function renderNotionExtraValueCells(val) {
        if (val === null || val === undefined) return '';
        if (typeof val === 'boolean') {

          return '<details class="jn-notion-long"><summary class="jn-notion-long__sum">' + prev + '</summary><div class="jn-notion-long__full">' + full + '</div></details>';
        }
        if (Array.isArray(val)) {

          for (var i = 0; i < val.length; i++) {

          }

      function notionExtrasSectionHtml(trade) {

          if (!rows.length) continue;

      function notionExtrasCardPreviewHtml(trade) {

      function readApiError(data) {

      /* ── Particle system ── */
      var PARTICLE_COUNT = 380;
      var particles = [];

      function Particle() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this._reset();
      }
      Particle.prototype._reset = function () {
        var speed = Math.random() * 0.3 + 0.04;
        var angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 0.7 + 0.2;
        this.baseAlpha = Math.random() * 0.45 + 0.08;
        this.alpha = this.baseAlpha;
        this.twinkle = Math.random() * Math.PI * 2;
        var r = Math.random();
        if (r < 0.65)      { this.cr = 0;   this.cg = 191; this.cb = 255; }
        else if (r < 0.93) { this.cr = 192; this.cg = 192; this.cb = 192; }
        else { this.cr = 255; this.cg = 255; this.cb = 255; this.size = Math.random() * 1.0 + 0.2; this.baseAlpha = Math.random() * 0.6 + 0.2; }
      };
      Particle.prototype.update = function () {
        this.twinkle += 0.018;
        this.vx *= 0.998; this.vy *= 0.998;
        this.vx += (Math.random() - 0.5) * 0.004; this.vy += (Math.random() - 0.5) * 0.004;
        this.alpha = this.baseAlpha * (0.72 + 0.28 * Math.sin(this.twinkle));
        this.x += this.vx; this.y += this.vy;
        var W = window.innerWidth, H = window.innerHeight;
        if (this.x < -20) this.x = W + 20; if (this.x > W + 20) this.x = -20;
        if (this.y < -20) this.y = H + 20; if (this.y > H + 20) this.y = -20;
      };
      Particle.prototype.draw = function (ctx) {
        var a = Math.max(0, Math.min(1, this.alpha));
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + this.cr + ',' + this.cg + ',' + this.cb + ',' + a + ')';
        ctx.fill();
      };
      function initParticles() {
        var canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        (function loop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (var j = 0; j < particles.length; j++) { particles[j].update(); particles[j].draw(ctx); }
          requestAnimationFrame(loop);
        })();
      }

      var DEFAULT_USER_ID = 'aidenpasque11@gmail.com';

      function normalizeTradesApiBody(data) {
        if (!data || typeof data !== 'object') return { records: [] };
        var inner = data.payload && typeof data.payload === 'object' ? data.payload : data;
        return { records: Array.isArray(inner.records) ? inner.records : [] };

      /* ── Data fetching ── */
      async function fetchAllTrades() {
        var userId = currentUserId || 'aidenpasque11@gmail.com';
        var [tradesRes, journalRes] = await Promise.allSettled([
          fetch('/api/trades?user_id=eq.' + encodeURIComponent(userId), { cache: 'no-store' }).then(function (r) { return r.json(); }),
          fetch('/api/journal-trades?user_id=eq.' + encodeURIComponent(userId), { cache: 'no-store' }).then(function (r) { return r.json(); })

        /* Debug: log first trade from each source so we can see exact field names */
        if (tradesRes.status === 'fulfilled') {

      /* ── Weekly stats ── */
      function computeWeeklyStats(trades) {
        // Use Adelaide dateKey so the week boundary matches what's displayed on screen
        var today   = dateKeyAdelaide(new Date());
        var weekMon = mondayKeyOfWeekContaining(today);
        var weekSun = addDaysToDateKey(weekMon, 6);

        var weekTrades = trades.filter(function (t) {
          var tk = dateKeyAdelaide(tradeDate(t));
          return tk && tk >= weekMon && tk <= weekSun;
        });

        var total = weekTrades.length, wins = 0, netR = 0, bestRR = null;
        weekTrades.forEach(function (t) {
          var outcome = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var rr      = parseFloat(getField(t, 'rr', 'RR'));
          if (outcome === 'win') {
            wins++;
            if (!isNaN(rr)) netR += rr;
          } else if (outcome === 'loss') {
            netR -= (!isNaN(rr) ? rr : 1);
          }
          // bestRR considers every trade, not just wins
          if (!isNaN(rr) && (bestRR === null || rr > bestRR)) bestRR = rr;
        });

        var stats = {
          total:   total,
          winRate: total > 0 ? Math.round(wins / total * 100) : null,
          netR:    total > 0 ? netR : null,
          bestRR:  bestRR
        };
        console.log('[Jarvis] weekly stats | week:', weekMon, '→', weekSun,
                    '| trades:', total, '| wins:', wins, '| netR:', netR, '| bestRR:', bestRR);
        return stats;
      }

      function jnCountUp(el, target, prefix, suffix, decimals, durationMs) {
        if (!el) return;
        var start = performance.now();
        function step(now) {
          var t = Math.min((now - start) / durationMs, 1);
          var ease = 1 - Math.pow(1 - t, 3);
          el.textContent = prefix + (target * ease).toFixed(decimals) + suffix;
          if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function renderWeeklyStats(stats) {
        var elTotal   = document.getElementById('pill-total');
        var elWinrate = document.getElementById('pill-winrate');
        var elNetR    = document.getElementById('pill-netr');
        var elBestRR  = document.getElementById('pill-bestrr');

        if (elTotal) jnCountUp(elTotal, stats.total, '', '', 0, 600);
        if (elWinrate) {
          if (stats.winRate == null) { elWinrate.textContent = '—'; }
          else jnCountUp(elWinrate, stats.winRate, '', '%', 0, 600);
        }
        if (elNetR) {
          if (stats.netR == null) { elNetR.textContent = '—'; elNetR.style.color = ''; }
          else {
            var sign = stats.netR >= 0 ? '+' : '';
            elNetR.style.color = stats.netR >= 0 ? '#00ff88' : '#ff6b6b';
            jnCountUp(elNetR, stats.netR, sign, 'R', 2, 700);
          }
        }
        if (elBestRR) {
          if (stats.bestRR == null) { elBestRR.textContent = '—'; }
          else jnCountUp(elBestRR, stats.bestRR, '', 'R', 2, 700);
        }
      }

      /* ── Filter options — dynamic population ── */
      function buildFilterOptions(trades) {
        var pairs    = new Set();
        var accounts = new Set();
        var models   = new Set();

        trades.forEach(function (t) {
          var p = getField(t, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol');
          var a = getField(t, 'account', 'Account', 'ACCOUNT');
          var m = getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL');
          if (p) pairs.add(p.toUpperCase());
          if (a) accounts.add(a);
          if (m) models.add(m);
        });

        function addPills(rowId, group, values) {
          var row = document.getElementById(rowId);
          if (!row) return;
          var pillsWrap = row.querySelector('.jn-filter-pills') || row;
          /* remove previously added dynamic pills (keep static ones) */
          Array.from(row.querySelectorAll('.jn-filter-pill[data-dynamic]')).forEach(function(el){ el.remove(); });
          /* collect static pill values so we don't create duplicates */
          var staticVals = new Set(
            Array.from(row.querySelectorAll('.jn-filter-pill:not([data-dynamic])')).map(function(el){ return (el.dataset.value || '').toUpperCase(); })
          );
          values.forEach(function (val) {
            if (staticVals.has(val.toUpperCase())) return;
            var btn = document.createElement('button');
            btn.className = 'jn-filter-pill';
            btn.dataset.group   = group;
            btn.dataset.value   = val;
            btn.dataset.dynamic = '1';
            btn.textContent = val;
            pillsWrap.appendChild(btn);
          });
        }

        addPills('filter-pair',    'pair',    Array.from(pairs).sort());
        addPills('filter-model',   'model',   Array.from(models).sort());
        addPills('filter-account', 'account', Array.from(accounts).sort());
      }

      /* ── Apply all filters + sort ── */
      function applyFilters() {
        filteredTrades = allTrades.filter(function (t) {
          var outcome  = normalizeOutcome(getField(t, 'outcome', 'Outcome', 'OUTCOME'));
          var dir      = getTradeDirection(t);
          var pairRaw  = (getField(t, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '').toUpperCase();
          var modelRaw = (getField(t, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '').toLowerCase();
          var acctRaw  = (getField(t, 'account', 'Account', 'ACCOUNT') || '').toLowerCase();

          if (!tradeMatchesPeriod(t, activeFilters.period)) return false;
          if (activeFilters.outcome !== 'all' && outcome !== activeFilters.outcome) return false;
          if (activeFilters.direction !== 'all' && dir !== activeFilters.direction) return false;
          if (activeFilters.pair    !== 'all' && pairRaw  !== activeFilters.pair.toUpperCase())   return false;
          if (activeFilters.model   !== 'all' && modelRaw !== activeFilters.model)  return false;
          if (activeFilters.account !== 'all' && acctRaw  !== activeFilters.account) return false;
          return true;
        });

        /* Sort */
        switch (activeFilters.sort) {
          case 'oldest':
            filteredTrades.sort(function (a, b) { return tradeDateMs(a) - tradeDateMs(b); });
            break;
          case 'highestrr':
            filteredTrades.sort(function (a, b) {
              var ra = parseFloat(getField(a, 'rr', 'RR')); ra = isNaN(ra) ? -Infinity : ra;
              var rb = parseFloat(getField(b, 'rr', 'RR')); rb = isNaN(rb) ? -Infinity : rb;
              return rb - ra;
            });
            break;
          case 'lowestrr':
            filteredTrades.sort(function (a, b) {
              var ra = parseFloat(getField(a, 'rr', 'RR')); ra = isNaN(ra) ? Infinity : ra;
              var rb = parseFloat(getField(b, 'rr', 'RR')); rb = isNaN(rb) ? Infinity : rb;
              return ra - rb;
            });
            break;
          default: /* newest */
            filteredTrades.sort(function (a, b) { return tradeDateMs(b) - tradeDateMs(a); });
        }
        console.log('[Jarvis] sort=' + activeFilters.sort + ' first 10 dates:',
          filteredTrades.slice(0, 10).map(function(t) {
            var raw = getField(t, 'date', 'traded_at', 'Date');
            return raw + ' → ' + tradeDate(t).toISOString().slice(0, 10);
          }));

        displayedCount = 0;
        document.getElementById('jn-list').innerHTML = '';
        renderNextPage();
      }

      /* ── Card rendering ── */
      function outcomeBadgeHtml(outcome) {
        var cls   = { win: 'jn-badge--win', loss: 'jn-badge--loss', be: 'jn-badge--be' }[outcome] || '';
        var label = { win: 'WIN', loss: 'LOSS', be: 'BE' }[outcome] || outcome.toUpperCase() || '—';
        return '<span class="jn-badge ' + cls + '">' + esc(label) + '</span>';
      }

      function directionBadgeHtml(t) {
        var dir = getTradeDirection(t);
        if (!dir) return '';
        var cls = dir === 'long' ? 'jn-badge--long' : 'jn-badge--short';
        return '<span class="jn-badge ' + cls + '">' + dir.toUpperCase() + '</span>';
      }

      /**
       * trade_images: JSON array of { url, label } or legacy string URLs.
       * Manual journal: custom_data.trade_images / photos / images (same shapes).
       */
      function tradeImageItems(trade) {
        if (!trade || typeof trade !== 'object') return [];
        var v = trade.trade_images;
        if (v == null && trade.custom_data && typeof trade.custom_data === 'object') {
          v = trade.custom_data.trade_images || trade.custom_data.photos || trade.custom_data.images;
        }
        if (v == null || v === '') return [];
        if (typeof v === 'string') {
          try { v = JSON.parse(v); } catch (e) { return []; }
        }
        if (!Array.isArray(v)) return [];
        var out = [];
        for (var i = 0; i < v.length; i++) {
          var item = v[i];
          if (typeof item === 'string') {
            var su = item.trim();
            if (/^https?:\/\//i.test(su)) out.push({ url: su, label: '' });
            continue;
          }
          if (item && typeof item === 'object' && typeof item.url === 'string') {
            var u = item.url.trim();
            if (!/^https?:\/\//i.test(u)) continue;
            var lbl = typeof item.label === 'string' ? item.label.trim() : '';
            out.push({ url: u, label: lbl });
          }
        }
        return out;
      }

      /** Match Notion caption "TRADE PHOTO:" / variations for card hero image */
      function normalizeCoverLabel(label) {
        return String(label || '')
          .replace(/\s*:\s*$/u, '')
          .trim()
          .toLowerCase()
          .replace(/\s+/g, ' ');
      }

      function isTradePhotoCoverLabel(label) {
        var k = normalizeCoverLabel(label);
        if (!k) return false;
        if (k === 'trade photo') return true;
        if (k.indexOf('trade photo') !== 0) return false;
        var rest = k.slice('trade photo'.length);
        return rest === '' || /^[\s:\-–—]/.test(rest);
      }

      /** @returns {{ url: string } | null} */
      function tradeCardCoverItem(items) {
        if (!items || !items.length) return null;
        for (var i = 0; i < items.length; i++) {
          if (isTradePhotoCoverLabel(items[i].label)) return items[i];
        }
        return items[0];
      }

      function tradePhotosSectionHtml(trade) {
        var items = tradeImageItems(trade);
        if (!items.length) return '';
        var thumbs = items.map(function (it, ix) {
          var cap = it.label ? it.label.replace(/\s*:+\s*$/,'').trim() : '';
          var lineLabel = cap || ('Chart ' + (ix + 1));
          var dataCap = cap;
          return (
            '<div class="jn-photo-item">' +
            '  <span class="jn-photo-caption">' + esc(lineLabel) + '</span>' +
            '  <button type="button" class="jn-photo-open" data-src="' + esc(it.url) + '" data-caption="' + esc(dataCap) + '" aria-label="Expand chart">' +
            '    <img class="jn-photo-thumb" src="' + esc(it.url) + '" alt="' + esc(lineLabel) + '" loading="lazy" decoding="async" />' +
            '  </button>' +
            '</div>'
          );
        }).join('');
        return (
          '<div class="jn-detail">' +
          '  <span class="jn-detail__label">Charts</span>' +
          '  <div class="jn-trade-photos">' + thumbs + '</div>' +
          '</div>'
        );
      }

      /** Cover image block for modal (same TRADE PHOTO rule as compact cards). */
      function tradeModalHeroHtml(trade) {
        var imgItems = tradeImageItems(trade);
        var coverItem = tradeCardCoverItem(imgItems);
        if (!coverItem || !coverItem.url) return '';
        return (
          '<div class="jn-trade-modal__hero">' +
          '  <img class="jn-trade-modal__hero-img" src="' + esc(coverItem.url) + '" alt="" decoding="async" />' +
          '</div>'
        );
      }

      /** Entry Model, date, notes, charts, Ask Jarvis — same markup as legacy inline expand. */
      function tradeDetailPaneHtml(trade, idx) {
        var model = getField(trade, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '';
        var notes = getField(trade, 'notes', 'Notes', 'NOTE', 'TRADE SUMMARY') || '';
        var dateFull = formatDateFull(trade);
        var parts = [];
        if (model) {
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">Entry Model</span><span class="jn-detail__value">' +
              esc(model) +
              '</span></div>'
          );
        }
        parts.push(
          '<div class="jn-detail"><span class="jn-detail__label">Date &amp; Time</span><span class="jn-detail__value">' +
            esc(dateFull) +
            '</span></div>'
        );
        if (notes) {
          parts.push(
            '<div class="jn-detail"><span class="jn-detail__label">Notes</span><p class="jn-detail__notes">' +
              esc(notes) +
              '</p></div>'
          );
        }
        parts.push(notionExtrasSectionHtml(trade));
        parts.push(tradePhotosSectionHtml(trade));
        parts.push(
          '<button class="jn-ask-btn" data-idx="' + idx + '" type="button">Ask Jarvis about this trade</button>'
        );
        return '<div class="jn-expand-inner">' + parts.join('') + '</div>';
      }

      function openTradeModal(idx) {
        var trade = filteredTrades[idx];
        if (!trade) return;
        var modal = document.getElementById('jn-trade-modal');
        var scrollEl = document.getElementById('jn-trade-modal-scroll');
        var titleEl = document.getElementById('jn-trade-modal-title');
        var panel = document.getElementById('jn-trade-modal-panel');
        if (!modal || !scrollEl || !panel) return;

        var outcome = normalizeOutcome(getField(trade, 'outcome', 'Outcome', 'OUTCOME'));
        var pairRaw = getField(trade, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '';
        var dateShort = formatDateShort(trade);
        titleEl.textContent = pairRaw
          ? dateShort + ' · ' + String(pairRaw).toUpperCase()
          : dateShort;

        panel.setAttribute('data-outcome', outcome);

        scrollEl.innerHTML = tradeModalHeroHtml(trade) + tradeDetailPaneHtml(trade, idx);
        modal.removeAttribute('hidden');
        modal.setAttribute('aria-hidden', 'false');

        try {
          document.body.style.overflow = 'hidden';
        } catch (e1) {}

        try {
          document.getElementById('jn-trade-modal-close').focus();
        } catch (e2) {}
      }

      function closeTradeModal() {
        var modal = document.getElementById('jn-trade-modal');
        var lb = document.getElementById('jn-lightbox');
        if (!modal) return;
        modal.setAttribute('hidden', '');
        modal.setAttribute('aria-hidden', 'true');

        var scrollEl = document.getElementById('jn-trade-modal-scroll');
        if (scrollEl) scrollEl.innerHTML = '';

        try {
          if (!lb || lb.hasAttribute('hidden')) {
            document.body.style.overflow = '';
          }
        } catch (e) {}
      }

      function renderCard(trade, idx) {
        var outcome   = normalizeOutcome(getField(trade, 'outcome', 'Outcome', 'OUTCOME'));
        var pair      = getField(trade, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '';
        var account   = getField(trade, 'account', 'Account', 'ACCOUNT') || '';
        var rrRaw     = parseFloat(getField(trade, 'rr', 'RR'));
        var rrDisplay, rrColor;
        if (!isNaN(rrRaw)) {
          rrDisplay = rrRaw.toFixed(2) + 'R';
          rrColor   = '';
        } else if (outcome === 'loss') {
          rrDisplay = '-1R';
          rrColor   = '#ff4444';
        } else {
          rrDisplay = '—';
          rrColor   = '';
        }
        var model     = getField(trade, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '';
        var dateShort = formatDateShort(trade);

        var modelDisplay  = model ? truncate(model, 26) : '';
        var acctBadge     = account ? '<span class="jn-badge jn-badge--acct">' + esc(account) + '</span>' : '';
        var pairHtml      = pair ? '<span class="jn-card__pair">' + esc(pair.toUpperCase()) + '</span>' : '';
        var imgItems = tradeImageItems(trade);
        var chartHint = imgItems.length ? '<span class="jn-card__photo-hit" title="' + imgItems.length + ' chart(s)">IMG</span>' : '';
        var coverPiece = '';
        var coverItem = tradeCardCoverItem(imgItems);
        if (coverItem && coverItem.url) {
          coverPiece =
            '  <div class="jn-card__cover" aria-hidden="true">' +
            '    <img class="jn-card__cover-img" src="' + esc(coverItem.url) + '" alt="" loading="lazy" decoding="async" />' +
            '  </div>';
        }

        return [
          '<article class="jn-card" data-outcome="' + esc(outcome) + '" data-idx="' + idx + '">',
          coverPiece,
          '  <div class="jn-card__top">',
          '    <span class="jn-card__date">' + esc(dateShort) + '</span>',
          '    <div class="jn-card__bands">',
          '      <div class="jn-card__left">',
          '      ' + outcomeBadgeHtml(outcome),
          '      ' + directionBadgeHtml(trade),
          '      ' + pairHtml + chartHint,
          modelDisplay ? '      <span class="jn-card__model">' + esc(modelDisplay) + '</span>' : '',
          '      </div>',
          '      <div class="jn-card__right">',
          '      ' + acctBadge,
          '      <span class="jn-card__rr"' + (rrColor ? ' style="color:' + rrColor + '"' : '') + '>' + esc(rrDisplay) + '</span>',
          '      <span class="jn-card__chevron">&#9660;</span>',
          '      </div>',
          '    </div>',
          notionExtrasCardPreviewHtml(trade),
          '  </div>',
          '</article>'
        ].join('');
      }

      function renderNextPage() {
        var list = document.getElementById('jn-list');
        var btn  = document.getElementById('jn-load-more');

        if (filteredTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades match the current filters.</div>';
          btn.classList.add('hidden');
          return;
        }

        var from = displayedCount;
        var to   = Math.min(from + PAGE_SIZE, filteredTrades.length);
        var frag = '';
        for (var i = from; i < to; i++) frag += renderCard(filteredTrades[i], i);

        list.insertAdjacentHTML('beforeend', frag);
        displayedCount = to;

        if (displayedCount >= filteredTrades.length) {
          btn.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
          btn.disabled = false;
        }
      }

      /* ── Chart lightbox ── */
      function openJnLightbox(src, caption) {
        var lb = document.getElementById('jn-lightbox');
        var imgEl = lb && lb.querySelector('.jn-lightbox__img');
        var capEl = document.getElementById('jn-lightbox-caption');
        if (!lb || !imgEl) return;
        imgEl.src = src || '';
        imgEl.alt = caption ? caption : 'Chart';
        if (capEl) {
          var c = caption ? String(caption).trim() : '';
          if (c) {
            capEl.textContent = c;
            capEl.removeAttribute('hidden');
          } else {
            capEl.textContent = '';
            capEl.setAttribute('hidden', '');
          }
        }
        lb.removeAttribute('hidden');
        lb.setAttribute('aria-hidden', 'false');
        try {
          document.body.style.overflow = 'hidden';
        } catch (err) {}
        try {
          document.getElementById('jn-lightbox-close').focus();
        } catch (err2) {}
      }

      function closeJnLightbox() {
        var lb = document.getElementById('jn-lightbox');
        var imgEl = lb && lb.querySelector('.jn-lightbox__img');
        var modal = document.getElementById('jn-trade-modal');
        if (!lb) return;
        lb.setAttribute('hidden', '');
        lb.setAttribute('aria-hidden', 'true');
        if (imgEl) imgEl.src = '';
        try {
          if (!modal || modal.hasAttribute('hidden')) {
            document.body.style.overflow = '';
          }
        } catch (e) {}
      }

      document.getElementById('jn-lightbox-close').addEventListener('click', function () {
        closeJnLightbox();
      });
      document.getElementById('jn-lightbox-backdrop').addEventListener('click', function () {
        closeJnLightbox();
      });
      document.addEventListener('keydown', function (ev) {
        if (ev.key !== 'Escape') return;
        var lb = document.getElementById('jn-lightbox');
        if (lb && !lb.hasAttribute('hidden')) {
          closeJnLightbox();
          return;
        }
        var modal = document.getElementById('jn-trade-modal');
        if (modal && !modal.hasAttribute('hidden')) {
          closeTradeModal();
        }
      });

      document.getElementById('jn-trade-modal-close').addEventListener('click', function () {
        closeTradeModal();
      });
      document.getElementById('jn-trade-modal-backdrop').addEventListener('click', function () {
        closeTradeModal();
      });

      /* ── Card / modal: photo zoom, Ask Jarvis, open detail (Notion-style) ── */
      document.addEventListener('click', function (e) {
        var inList = e.target.closest('#jn-list');
        var inModal = e.target.closest('#jn-trade-modal');
        if (!inList && !inModal) return;

        var photoBtn = e.target.closest('.jn-photo-open');
        if (photoBtn) {
          e.preventDefault();
          e.stopPropagation();
          openJnLightbox(
            photoBtn.getAttribute('data-src') || '',
            photoBtn.getAttribute('data-caption') || ''
          );
          return;
        }

        var askBtn = e.target.closest('.jn-ask-btn');
        if (askBtn) {
          e.stopPropagation();
          var tAsk = filteredTrades[parseInt(askBtn.dataset.idx, 10)];
          if (tAsk) askJarvisAboutTrade(tAsk);
          return;
        }

        var card = e.target.closest('.jn-card');
        if (card && inList) {
          var idx = parseInt(card.getAttribute('data-idx'), 10);
          if (!isNaN(idx)) openTradeModal(idx);
        }
      });

      function buildAskJarvisPrompt(trade) {
        var pair = getField(trade, 'pair', 'Pair', 'PAIR', 'instrument', 'symbol') || '—';
        var outcome = getField(trade, 'outcome', 'Outcome', 'OUTCOME') || '—';
        var session = getField(trade, 'session', 'Session', 'SESSION') || '—';
        var model = getField(trade, 'model', 'Model', 'MODEL', 'ENTRY MODEL') || '';
        var notes = getField(trade, 'notes', 'Notes', 'NOTE', 'TRADE SUMMARY') || '';
        var account = getField(trade, 'account', 'Account', 'ACCOUNT') || '';
        var rrStr = (function () {
          var r = parseFloat(getField(trade, 'rr', 'RR'));
          return isNaN(r) ? '—' : r.toFixed(2) + 'R';
        })();
        var dir = getTradeDirection(trade);
        var lines = [
          'I want your honest take on this single trade from my journal (focus on this setup only).',
          'Please give: (1) a brief rundown of the trade, (2) what was solid vs weak in the idea or execution, (3) one concrete lesson or tweak for next time. Be direct and supportive.',
          '',
          '--- TRADE ---',
          'Date/time: ' + formatDateFull(trade),
          'Pair: ' + pair,
          'Direction: ' + (dir ? dir.toUpperCase() : '—'),
          'Outcome: ' + outcome,
          'R multiple: ' + rrStr,
          'Session: ' + session
        ];
        if (account) lines.push('Account: ' + account);
        if (model) lines.push('Entry model: ' + model);
        if (notes) lines.push('My notes: ' + notes);
        return lines.join('\n');
      }

      function askJarvisAboutTrade(trade) {
        try {
          sessionStorage.setItem('jarvis_pending_message', buildAskJarvisPrompt(trade));
        } catch (e) {}
        window.location.href = '/index.html';
      }

      /* ── Filter pill interaction ── */
      document.getElementById('jn-filters').addEventListener('click', function (e) {
        var pill = e.target.closest('.jn-filter-pill');
        if (!pill) return;
        var group = pill.dataset.group;
        var value = pill.dataset.value;
        pill.closest('.jn-filter-row').querySelectorAll('.jn-filter-pill')
            .forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        activeFilters[group] = value;
        applyFilters();
        updateFilterDot();
      });

      /* ── Filter panel toggle ── */
      function updateFilterDot() {
        var hasActive = activeFilters.period    !== 'all'    ||
                        activeFilters.outcome   !== 'all'    ||
                        activeFilters.direction !== 'all'    ||
                        activeFilters.pair      !== 'all'    ||
                        activeFilters.model     !== 'all'    ||
                        activeFilters.account   !== 'all'    ||
                        activeFilters.sort      !== 'newest';
        var dot = document.getElementById('jn-filter-dot');
        if (dot) dot.classList.toggle('jn-filter-dot--visible', hasActive);
      }

      (function () {
        var toggle  = document.getElementById('jn-filter-toggle');
        var panel   = document.getElementById('jn-filter-panel');
        var label   = document.getElementById('jn-filter-toggle-label');
        var isOpen  = false;

        toggle.addEventListener('click', function () {
          isOpen = !isOpen;
          panel.classList.toggle('jn-filter-panel--open', isOpen);
          panel.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
          toggle.classList.toggle('jn-filter-toggle--open', isOpen);
          label.textContent = isOpen ? 'FILTER −' : 'FILTER +';
        });

        document.getElementById('jn-filter-clear').addEventListener('click', function () {
          activeFilters = {
            period: 'all',
            outcome: 'all',
            direction: 'all',
            pair: 'all',
            model: 'all',
            account: 'all',
            sort: 'newest'
          };
          document.querySelectorAll('#jn-filters .jn-filter-pill').forEach(function (p) {
            var isDefault = p.dataset.value === 'all' ||
                            (p.dataset.group === 'sort' && p.dataset.value === 'newest');
            p.classList.toggle('active', isDefault);
          });
          updateFilterDot();
          applyFilters();
        });
      })();

      /* ── Load more ── */
      document.getElementById('jn-load-more').addEventListener('click', function () {
        this.disabled = true;
        renderNextPage();
      });

      /* ── LOG TRADE modal (shared: /js/log-trade-modal.js) ── */
      async function openTradeForm() {
        try {
          var mod = await import('/js/log-trade-modal.js');
          await mod.openLogTradeModal({
            getUserId: function () {
              return (
                currentUserId ||
                localStorage.getItem('jarvis_user') ||
                localStorage.getItem('user_id') ||
                'aidenpasque11@gmail.com'
              );
            },
            fetchTradeRowsForPrefill: async function () {
              return Array.isArray(allTrades) ? allTrades : [];
            },
            readApiErrorMessage: readApiError,
            showToast: showToast,
            onTradeSaved: async function () {
              await refreshJournalData();
            },
          });
        } catch (e) {
          console.warn('[journal] log-trade modal', e);
        }
      }

      function showToast(message, isError) {
        var existing = document.getElementById('jn-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.id = 'jn-toast';
        toast.className = 'trade-toast' + (isError ? ' trade-toast--error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        requestAnimationFrame(function () { toast.classList.add('trade-toast--visible'); });
        setTimeout(function () {
          toast.classList.remove('trade-toast--visible');
          toast.addEventListener('transitionend', function () { toast.remove(); }, { once: true });
        }, 3000);
      }

      async function refreshJournalData() {
        try {
          allTrades = await fetchAllTrades();
          renderWeeklyStats(computeWeeklyStats(allTrades));
          buildFilterOptions(allTrades);
          applyFilters();
        } catch(e) { /* silent */ }
      }

      /* ── Boot ── */
      document.getElementById('jn-log-btn').addEventListener('click', openTradeForm);

      async function boot() {
        initParticles();
        await ensureUserId();
        var list = document.getElementById('jn-list');
        list.innerHTML = '<div class="jn-state">Loading trades…</div>';
        try { allTrades = await fetchAllTrades(); }
        catch(e) { list.innerHTML = '<div class="jn-state">Failed to load trades. Check your connection.</div>'; return; }
        if (allTrades.length === 0) {
          list.innerHTML = '<div class="jn-state">No trades found. Log your first trade above.</div>'; return;
        }
        renderWeeklyStats(computeWeeklyStats(allTrades));
        buildFilterOptions(allTrades);
        applyFilters();
      }

      // ── Premium animation layer ──

      // Title letter-by-letter reveal
      (function initTitleReveal() {
        var titleEl = document.querySelector('.jn-title');
        if (!titleEl) return;
        var text = titleEl.textContent;
        titleEl.textContent = '';
        text.split('').forEach(function(ch, i) {
          var span = document.createElement('span');
          span.className = 'jn-title-letter';
          span.style.animationDelay = (i * 0.07) + 's';
          span.textContent = ch === ' ' ? ' ' : ch;
          titleEl.appendChild(span);
        });
      })();

      // Card scroll-in with stagger via IntersectionObserver
      var jnCardObserver = new IntersectionObserver(function(entries) {
        var idx = 0;
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            (function(card, delay) {
              setTimeout(function() { card.classList.add('jn-visible'); }, delay);
            })(entry.target, idx * 55);
            idx++;
            jnCardObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });

      // Watch for new cards injected by renderNextPage
      var listEl = document.getElementById('jn-list');
      if (listEl) {
        new MutationObserver(function() {
          listEl.querySelectorAll('.jn-card:not(.jn-observed)').forEach(function(card) {
            card.classList.add('jn-observed');
            jnCardObserver.observe(card);
          });
        }).observe(listEl, { childList: true, subtree: false });
      }

      boot();
    })();
    </script>
  </body>
</html>
