<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Root-relative URLs: deployment auth/redirect quirks can mis-resolve plain "css/" and "js/" paths. -->
    <base href="/" />
    <title>JARVIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="jarvis-home">
    <!-- ═══════════════════ NAV BAR (inlined from nav.html) ═══════════════════ -->
    <style>
      .jv-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 0;
      }
      .jv-nav__brand {
        color: #00d4ff;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 15px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
        text-decoration: none;
      }
      .jv-nav__links {
        display: flex;
        align-items: center;
        gap: 32px;
        list-style: none;
        margin: 0 auto;
        padding: 0;
      }
      .jv-nav__links a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 13px;
        font-variant: small-caps;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__links a:hover { color: rgba(255, 255, 255, 0.85); }
      .jv-nav__links a.jv-nav--active,
      .jv-nav__links a[aria-current="page"] {
        color: #00d4ff;
        border-bottom: 1px solid #00d4ff;
      }
      .jv-nav__user {
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.06em;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .jv-nav__logout {
        margin-left: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 255, 0.25);
        background: rgba(0, 212, 255, 0.06);
        color: rgba(0, 212, 255, 0.85);
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .jv-nav__logout:hover {
        background: rgba(0, 212, 255, 0.14);
        border-color: rgba(0, 212, 255, 0.55);
      }
      .jv-nav__hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .jv-nav__hamburger span {
        display: block;
        width: 20px;
        height: 1.5px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 2px;
        transition: background 0.2s;
      }
      .jv-nav__hamburger:hover span { background: #00d4ff; }
      .jv-nav__dropdown {
        display: none;
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        z-index: 999;
        flex-direction: column;
        padding: 8px 0;
      }
      .jv-nav__dropdown.jv-nav--open { display: flex; }
      .jv-nav__dropdown a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 12px;
        font-variant: small-caps;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 12px 24px;
        border-left: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }
      .jv-nav__dropdown a:hover { color: rgba(255, 255, 255, 0.85); }
      .jv-nav__dropdown a.jv-nav--active,
      .jv-nav__dropdown a[aria-current="page"] {
        color: #00d4ff;
        border-left-color: #00d4ff;
      }
      @media (max-width: 768px) {
        .jv-nav__links, .jv-nav__user { display: none; }
        .jv-nav__hamburger { display: flex; }
        .jv-nav__brand { font-size: 13px; }
      }
    </style>

    <nav class="jv-nav" aria-label="Main navigation">
      <a class="jv-nav__brand" href="/index.html">JARVIS</a>
      <ul class="jv-nav__links" role="list">
        <li><a href="/index.html" id="nav-home" class="jv-nav--active" aria-current="page">Home</a></li>
        <li><a href="/journal.html" id="nav-journal">Journal</a></li>
        <li><a href="/analytics.html" id="nav-analytics">Analytics</a></li>
        <li><a href="/calendar.html" id="nav-calendar">Calendar</a></li>
      </ul>
      <span class="jv-nav__user" id="jv-nav-user" aria-label="Current user"></span>
      <button class="jv-nav__logout" id="logout-btn" type="button">Logout</button>
      <button class="jv-nav__hamburger" id="jv-nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="jv-nav-dropdown">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </nav>

    <div class="jv-nav__dropdown" id="jv-nav-dropdown" aria-hidden="true">
      <a href="/index.html" class="jv-nav--active" aria-current="page">Home</a>
      <a href="/journal.html">Journal</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/calendar.html">Calendar</a>
    </div>

    <script>
      (function () {
        var user =
          localStorage.getItem("jarvis_user") || localStorage.getItem("user_id");
        if (user)
          document.getElementById("jv-nav-user").textContent = user;
        var logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", function () {
            try {
              localStorage.removeItem("jarvis_user");
              localStorage.removeItem("user_id");
            } catch (e) {}
            window.location.href = "/index.html";
          });
        }
        var btn = document.getElementById("jv-nav-hamburger");
        var dropdown = document.getElementById("jv-nav-dropdown");
        btn.addEventListener("click", function () {
          var open = dropdown.classList.toggle("jv-nav--open");
          btn.setAttribute("aria-expanded", open ? "true" : "false");
          dropdown.setAttribute("aria-hidden", open ? "false" : "true");
        });
        document.addEventListener("click", function (e) {
          if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove("jv-nav--open");
            btn.setAttribute("aria-expanded", "false");
            dropdown.setAttribute("aria-hidden", "true");
          }
        });
      })();
    </script>
    <!-- ═══════════════════ END NAV BAR ═══════════════════ -->

    <!-- Full-screen particle field — z-index 0, behind everything -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

<div class="jarvis-viewport jarvis-os">
      <div class="hud-frame" data-hud-frame>
        <div class="hud-grid">
          <section class="hud-core" aria-label="Intelligence core">
            <div class="orb-stage">
              <div class="orb-mount">
                <canvas id="orb-canvas" width="700" height="700" aria-hidden="true"></canvas>
              </div>
            </div>
          </section>

          <div class="hud-deck">
            <section class="snapshot" id="system-snapshot" aria-label="System snapshot">
              <div class="snapshot-top">
                <div class="snapshot-top__text">
                  <span class="snapshot-eyebrow">Quant telemetry</span>
                </div>
                <span class="snapshot-live">
                  <span class="snapshot-live__dot" aria-hidden="true"></span>
                  Live uplink
                </span>
              </div>

              <div class="metric-strip">
                <article class="metric-cell">
                  <span class="metric-cell__ix">01</span>
                  <div class="metric-cell__body">
                    <div class="snapshot-label">Win-rate</div>
                    <div class="snapshot-value" id="snap-winrate">—</div>
                  </div>
                </article>
                <article class="metric-cell">
                  <span class="metric-cell__ix">02</span>
                  <div class="metric-cell__body">
                    <div class="snapshot-label">Avg R:R</div>
                    <div class="snapshot-value" id="snap-avgrr">—</div>
                  </div>
                </article>
                <article class="metric-cell">
                  <span class="metric-cell__ix">03</span>
                  <div class="metric-cell__body">
                    <div class="snapshot-label">Expectancy</div>
                    <div class="snapshot-value" id="snap-expectancy">—</div>
                  </div>
                </article>
                <article class="metric-cell">
                  <span class="metric-cell__ix">04</span>
                  <div class="metric-cell__body">
                    <div class="snapshot-label">Trade count</div>
                    <div class="snapshot-value" id="snap-total">—</div>
                  </div>
                </article>
              </div>

              <div class="snapshot-foot">
                <div class="snapshot-foot__bar" aria-hidden="true"></div>
                <div class="snapshot-insight" id="snap-insight">Syncing ledger…</div>
              </div>
            </section>

            <div class="comm-dock">
              <div class="comm-dock__body conductor">
                <div class="chat-scroll" id="chat-scroll">
                  <div id="chat-standby" class="chat-standby">
                    <div class="standby-orb" aria-hidden="true"></div>
                    <span class="standby-title">STANDING BY</span>
                    <span class="standby-sub">Transmit a message to begin</span>
                  </div>
                  <div id="chat-history" class="chat-history" aria-live="polite"></div>
                </div>
                <form class="chat-form" id="chat-form" autocomplete="off">
                  <button type="button" id="chat-log-trade-btn" class="chat-log-trade-btn">LOG TRADE</button>
                  <input
                    type="text"
                    id="chat-input"
                    name="message"
                    placeholder="Transmit to Jarvis..."
                    autocomplete="off"
                    enterkeyhint="send"
                  />
                  <button type="submit" id="chat-send" class="chat-send">Send</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      /* ── Base ── */
      html, body { height: 100%; margin: 0; overflow: hidden; }
      html { font-size: 14px; }
      body.jarvis-home { background: #050a14; }

      /* ── Viewport: fills exactly below fixed nav ── */
      .jarvis-home .jarvis-viewport {
        margin-top: 52px;
        height: calc(100vh - 52px);
        padding: 0 40px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── HUD frame fills viewport ── */
      .jarvis-home .hud-frame {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      /* ── Two-column grid fills frame ── */
      .jarvis-home .hud-grid {
        flex: 1;
        display: flex !important;
        align-items: stretch;
        gap: clamp(1rem, 2.5vw, 2rem);
        min-height: 0;
      }

      /* ── Left panel: 420px, orb perfectly centred ── */
      .jarvis-home .hud-core {
        width: 420px;
        max-width: 420px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 52px);
      }

      /* ── Right panel: fills remaining space, full height ── */
      .jarvis-home .hud-deck {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 52px);
      }

      /* ── Mobile ── */
      @media (max-width: 900px) {
        .jarvis-home .jarvis-viewport { padding: 0 16px; height: auto; overflow: visible; }
        .jarvis-home .hud-grid { flex-direction: column !important; align-items: stretch; padding-bottom: 24px; }
        .jarvis-home .hud-core { width: 100%; max-width: 100%; height: auto; }
        .jarvis-home .hud-deck { height: auto; }
      }

      /* ── Font overrides ── */
      .jarvis-home .snapshot-eyebrow,
      .jarvis-home .snapshot-live { font-family: "Share Tech Mono","Courier New",monospace; }

      /* ── Orb stage: pass-through flex centre ── */
      .jarvis-home .orb-stage {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Orb canvas: 500px desktop ── */
      .jarvis-home #orb-canvas {
        width: 500px !important;
        height: 500px !important;
      }
      @media (max-width: 900px) {
        .jarvis-home #orb-canvas { width: clamp(240px, 80vw, 340px) !important; height: clamp(240px, 80vw, 340px) !important; }
      }
      @keyframes ds-orb-breathe {
        0%, 100% {
          filter: drop-shadow(0 0 28px rgba(0,212,255,0.42))
                  drop-shadow(0 0 70px rgba(0,191,255,0.18))
                  drop-shadow(0 20px 52px rgba(0,80,180,0.12));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 56px rgba(0,212,255,0.72))
                  drop-shadow(0 0 110px rgba(0,191,255,0.36))
                  drop-shadow(0 28px 70px rgba(0,140,240,0.22));
          transform: scale(1.02);
        }
      }
      .jarvis-home .orb-mount {
        animation: ds-orb-breathe 4s ease-in-out infinite;
        will-change: filter, transform;
        transition: filter 0.4s ease;
      }
      .jarvis-home .orb-mount:hover {
        filter: drop-shadow(0 0 72px rgba(0,212,255,0.85))
                drop-shadow(0 0 140px rgba(0,191,255,0.45)) !important;
      }
      @media (prefers-reduced-motion: reduce) {
        .jarvis-home .orb-mount { animation: none; filter: drop-shadow(0 0 40px rgba(0,212,255,0.55)); }
      }

      /* ── Telemetry: shrinks to content height, never grows ── */
      .jarvis-home #system-snapshot {
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        background: rgba(5,10,20,0.72);
        border: 1px solid rgba(0,191,255,0.15);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .jarvis-home #system-snapshot::before {
        content: "";
        position: absolute;
        left: 0; top: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(0,212,255,0.7) 35%, rgba(0,212,255,0.4) 65%, transparent);
        opacity: 0.9;
        pointer-events: none;
      }
      .jarvis-home .snapshot-top { margin-bottom: 0.8rem; padding-bottom: 0.2rem; }
      .jarvis-home .snapshot-insight { font-family: "Outfit",system-ui,sans-serif; line-height: 1.55; color: rgba(255,255,255,0.72); }

      /* ── Stat cards ── */
      .jarvis-home .metric-strip {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }
      @media (max-width: 900px) {
        .jarvis-home .metric-strip { grid-template-columns: repeat(2, 1fr); }
      }
      .jarvis-home .metric-cell {
        background: rgba(5,10,22,0.6);
        border: 1px solid rgba(0,191,255,0.12);
        border-radius: 12px;
        padding: 16px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 0;
        transition: background 0.2s, border-color 0.2s;
      }
      .jarvis-home .metric-cell:hover {
        background: rgba(0,212,255,0.05);
        border-color: rgba(0,212,255,0.22);
      }
      .jarvis-home .metric-cell .metric-cell__ix { display: none; }
      .jarvis-home .metric-cell .metric-cell__body { display: flex; flex-direction: column; gap: 8px; }
      .jarvis-home .metric-cell .snapshot-label {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #00d4ff;
      }
      .jarvis-home .metric-cell .snapshot-value {
        position: relative;
        font-family: "Outfit",system-ui,sans-serif !important;
        font-weight: 200 !important;
        font-size: 40px !important;
        color: #ffffff !important;
        letter-spacing: 0.03em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        padding-bottom: 14px;
        text-shadow: 0 0 30px rgba(0,212,255,0.4);
      }
      .jarvis-home .metric-cell .snapshot-value::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 40px;
        height: 2px;
      }
      .jarvis-home .metric-cell:nth-child(1) .snapshot-value::after { background: #00ff88; }
      .jarvis-home .metric-cell:nth-child(2) .snapshot-value::after { background: #00d4ff; }
      .jarvis-home .metric-cell:nth-child(3) .snapshot-value::after { background: #00d4ff; }
      .jarvis-home .metric-cell:nth-child(4) .snapshot-value::after { background: #8899aa; }

      /* ── COMMS TERMINAL ── */
      .comm-dock__body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .comms-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px 9px;
        border-bottom: 1px solid rgba(0,212,255,0.18);
        background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, rgba(5,10,20,0.5) 100%);
        flex-shrink: 0;
      }
      .comms-header__label {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 8px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: rgba(0,212,255,0.65);
      }
      .comms-header__status {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 7px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(0,212,255,0.45);
      }
      .comms-status-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #00d4ff;
        box-shadow: 0 0 6px rgba(0,212,255,0.9);
        animation: comms-dot-pulse 2.2s ease-in-out infinite;
      }
      @keyframes comms-dot-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

      /* ── Message scroll: fills panel, small top padding in place of removed header ── */
      .jarvis-home .chat-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        padding-top: 10px;
      }

      /* ── Empty standby state ── */
      .chat-standby {
        flex: 1;
        min-height: 160px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        pointer-events: none;
      }
      .chat-standby.hidden { display: none; }
      .standby-orb {
        width: 20px; height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, rgba(0,212,255,0.9), rgba(0,100,200,0.5));
        box-shadow: 0 0 12px rgba(0,212,255,0.65), 0 0 28px rgba(0,212,255,0.2);
        animation: standby-orb-pulse 3s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes standby-orb-pulse {
        0%,100% { box-shadow: 0 0 10px rgba(0,212,255,0.55), 0 0 24px rgba(0,212,255,0.18); }
        50%     { box-shadow: 0 0 18px rgba(0,212,255,0.85), 0 0 42px rgba(0,212,255,0.35); }
      }
      .standby-title {
        font-family: "Share Tech Mono","Courier New",monospace;
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #00d4ff;
      }
      .standby-sub {
        font-family: "Outfit",system-ui,sans-serif;
        font-size: 13px;
        font-weight: 300;
        color: #8899aa;
        letter-spacing: 0.01em;
      }

      /* ── Chat panel: flex:1, fills all remaining deck height ── */
      .jarvis-home .comm-dock {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(0,212,255,0.25);
        background: rgba(5,10,20,0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
          0 0 0 1px rgba(0,212,255,0.06) inset,
          0 28px 80px rgba(0,0,0,0.6),
          0 0 60px rgba(0,212,255,0.05);
      }
      .jarvis-home .comm-dock::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(0,191,255,0.06) 1px, transparent 1px);
        background-size: 22px 22px;
        pointer-events: none;
        z-index: 0;
      }
      .jarvis-home .comm-dock::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0,212,255,0.28), transparent);
        animation: ds-scan-line 7s linear infinite;
        pointer-events: none;
        z-index: 10;
      }
      @keyframes ds-scan-line {
        0%   { top: 0; opacity: 0; }
        4%   { opacity: 1; }
        96%  { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      /* ── Input bar: pinned to bottom, never shrinks ── */
      .jarvis-home .chat-form {
        flex-shrink: 0;
        padding-bottom: 12px;
      }
      .jarvis-home .chat-form input[type="text"] {
        height: 56px;
        font-size: 16px;
        padding: 0 24px;
        box-sizing: border-box;
      }
      .jarvis-home .chat-send {
        height: 56px;
        padding: 0 32px;
        font-size: 14px;
        font-family: "Outfit",system-ui,sans-serif;
        font-weight: 600;
        letter-spacing: 0.1em;
        background: #00d4ff;
        color: #000000;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s, box-shadow 0.2s;
      }
      .jarvis-home .chat-send:hover {
        background: #ffffff;
        box-shadow: 0 0 20px rgba(0,212,255,0.5);
      }

      .jarvis-home[data-mode="chat"] .chat-scroll {
        border-color: rgba(0,212,255,0.1);
        background: linear-gradient(165deg, rgba(5,10,20,0.3) 0%, rgba(0,18,40,0.3) 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      }
      .jarvis-home .msg { border-radius: 16px; }
      .jarvis-home .msg--user { border-right: 2px solid rgba(0,212,255,0.45); }
      .jarvis-home .msg--jarvis {
        font-family: "Outfit",system-ui,sans-serif;
        font-weight: 300;
        font-size: 17px;
        line-height: 1.9;
        color: #dce8ff;
        border-left: 2px solid rgba(0,212,255,0.4);
        padding: 16px 20px;
        background: rgba(0,212,255,0.03);
      }
      .jarvis-home .chat-form input::placeholder {
        font-family: "Outfit",system-ui,sans-serif;
        font-size: 14px;
        font-style: italic;
        color: #8899aa;
        opacity: 1;
      }
      .jarvis-home .chat-form input:focus { border-color: rgba(0,212,255,0.6); }

      /* ── Page load entrance stagger ── */
      @keyframes ds-enter { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
      .jarvis-home .orb-stage        { animation: ds-enter 0.85s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
      .jarvis-home #system-snapshot  { animation: ds-enter 0.85s cubic-bezier(0.22,1,0.36,1) 0.3s both; }
      .jarvis-home .comm-dock        { animation: ds-enter 0.85s cubic-bezier(0.22,1,0.36,1) 0.5s both; }
      .jarvis-home .comms-header     { animation: ds-enter 0.85s cubic-bezier(0.22,1,0.36,1) 0.65s both; }
    </style>

    <!-- Chart lightbox (same behaviour as journal.html — zoom in-page, no new tab) -->
    <div
      id="jn-lightbox"
      class="jn-lightbox"
      hidden
      role="dialog"
      aria-modal="true"
      aria-label="Chart preview"
    >
      <div class="jn-lightbox__backdrop" id="jn-lightbox-backdrop" tabindex="-1"></div>
      <button type="button" class="jn-lightbox__close" id="jn-lightbox-close" aria-label="Close">
        &times;
      </button>
      <figure class="jn-lightbox__figure">
        <img class="jn-lightbox__img" src="" alt="" decoding="async" />
        <figcaption class="jn-lightbox__caption" id="jn-lightbox-caption" hidden></figcaption>
      </figure>
    </div>

    <script type="module" src="/js/app.js"></script>
    <script>
      (function () {
        var hints = [
          "Ask about your best performing model...",
          "What was my worst trade this week?",
          "Am I overtrading on Fridays?",
          "Where is my edge breaking down?"
        ];
        var idx = 0;
        var input = document.getElementById("chat-input");
        if (!input) return;
        setInterval(function () {
          if (document.activeElement !== input && !input.value) {
            idx = (idx + 1) % hints.length;
            input.placeholder = hints[idx];
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
