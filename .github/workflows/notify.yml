name: Jarvis Build Notifications

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ JARVIS BUILD UPDATE\nCommit: ${{ github.event.head_commit.message }}\nTime: $(date)\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
